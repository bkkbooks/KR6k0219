body:
  text: 論心用雙持犯結制罪學者皆云心用雙持犯但論化業不犯制罪余昔亦同此見於會元等處並約化業注釋今詳諸文義則不可既云持犯犯則結罪但教行則臨事約教須遵法式心用依修對治常時攝念二種持犯教相不濫罪各有歸何不依明但從臆說教行雙持如別已明心用雙持於茲略敘如戒疏云一上若據心用以明持犯一切諸戒並二持犯何者是耶且如淫戒順戒禁防即止持義觀厭現前無思染穢縱有境逼三時不樂名為作持違作止犯違止作犯疏文順戒禁防顯非托事造境觀厭無思即是對治攝念記云凡持一戒必起護心望離過邊名成止持望起護邊復是作持兩犯亦爾違教作惡必無對治記文此記文約持戒顯心用之相其實心用一則通一切戒二則通一切時以凡對境持一戒淨皆心用止作二持之功若非操履有常何能對境無染對境持戒即止持此從教判起心防敵即作持治念離犯即止持此二約心用論記中凡持一戒一句即對境具緣持戒教上止持必下並出心用義看讀者不可魚魯言離過者即離不作治念律制犯吉之過起護者即作觀對治也違教者即違諸戒對治及常爾一心之制乃止犯也作惡者即作犯也作惡之言有淺有深淺據忘念起妄深據造境為非此中正據忘念當知造境為非亦由忘念不攝也又疏二上云言對治者對淫制學離染行不淨觀等對盜制學少欲知足行對殺制修慈悲愍物行對妄制修實語行等疏文此云制行不行違制也又疏同上云起對治行明不犯法如諸戒對治此指慈悲少欲等為不犯法也依修成就不犯行也則據不犯法起不犯行若於此法生情厭背懈怠不修即是托不犯法以成犯行疏文詳彼疏文初約犯法明犯行不犯行次約開不犯法明犯行不犯行後約對治不犯法明犯行不犯行前二並據犯制豈得對治獨不論犯制乎此言對治即前疏云觀厭義也以後照前則前心用言犯犯制明矣又疏同上云大妄開戲笑淫摩開淨授離衣開念捨等若忘失念皆有小犯是名犯行當自攝持名不犯行疏文若心用對治念力堅強忽逢上緣定不失念失念少犯豈非心用結制之明據也記云失念者非謂染著前事但遇此緣彌須謹護忘念即犯記文記家雖有此語亦未見明指心用犯制致使從來而無定論又事鈔引律云佛制攝持威儀比丘若出若入屈伸俯仰攝持衣鉢若飲食若服藥大小便利若睡若覺若來若去若坐若臥若語若默常爾一心若違此制並結其犯又如母論利根比丘房則入入作念食則口口作念衣則著著作念若鈍根者初得衣食總作一念等彼文切觀常爾一心即對治之異名也常爾既云結犯違治豈不有罪又復須知對治非唯在戒常爾不但房衣是則對治常爾通於善惡諸境制令一心攝護雖云諸境用但一心只就一心顯於持犯作念攝持即作持無違教制即止持教制即律中制令攝念之文也失念妄覺即作犯故違律制即止犯止犯即違教吉羅作犯亦吉即惡覺餘思染心看女并懈怠忘念等皆犯吉是也遠離兩犯即成二持義極明矣問此與教行雙持有何異耶況復對治常爾皆律所制今依修奉即是依教而行豈非教行答雖皆依教結犯有異心用據平時用心勤隋約教有違順顯雙持犯教行據臨事造作約教有違順顯雙持犯的實明義心用約心教行據法如衣鉢之有三如羯磨之須四緣制聽一切事法皆有制作法式作須遵依豈不見疏云若據教行必托境生依教奉行作而無犯者是也資持云心用雙持通一切戒觀修止緣通約化業並非制教彼指觀念之法是化教行業如行宗問云觀行屬化那云制學答制名乃通約罪可判彼文彼意謂心用但犯化罪故判觀行屬於化也今意不同對治教念雖屬化教律制須修不修違制如前引示義豈不明問疏云教行即是依教奉行之義何以鈔云教謂律教行謂對治與疏不同未知何意答作者隨時兩皆合法鈔云教者即收教行記約衆共兩行衣鉢行護等釋之行謂對治正召心用記約衣食四儀常爾一心等釋之疏中具明心用教行收教出義二種無濫鈔中不分二種之別故以教行二字兼而收之各有意也推此鈔文一可證上謂心用教行並約行相有違有順二可證上謂常爾一心與於對治其義是一也又如戒疏三輪判教正取於憶念判於律藏蓋取律中佛制比丘常爾憶持之義亦可證前對治常爾並通一切違皆結犯也問憶持之制通於經論如善思念之作是觀等是也若然則乃通被道俗之教若比丘有犯則應俗衆亦有犯耶答勸憶之語雖通經論然俗在事亂犯非力分推佛所制正為內衆況對治常爾及當思惟是莫思惟是當念是莫念是等明載律文正制內衆既是正制違則有罪俗非正制違與不違一切無過故得疏云道則反俗常有時功近遣塵欲遠清諸惑若不念持何能通會疏文此明制內違則有犯義又明矣問對治觀念為事為理答凡佛設教為存出離然恐極鈍之機未達空理但以有作之心憶持攝念止成事行縱以空慧憶持亦未稱佛本志要須圓機上達真正出家菩薩以唯識妙觀照於舉心動念無非究竟一實境界是為域心於處方見常爾之妙也問失念結罪三宗何分答如釋五例及答芿師文中略已辨明無惜一見嘉熙庚子歲佛忌日志辨二止并八九名義止犯一位準疏鈔文標名有二一不學止犯二事法并句分八九罪列本枝顯持犯重輕廣識心之明昧文義雖然詳委講學寡於討論今略申明大科分二初明二止犯次辨八九句初中又三初標據次略釋三決疑初中鈔云止犯心中有作犯如人畜衣過日造房不乞是若望不學止犯無作犯等記云止犯有二上明事法止犯若下簡不學止犯次略釋記主正據此文分二止犯記文科節甚相顯然初為事法者即一切制聽事法也文明房長且舉別戒以顯止中有作之義若通而言之凡作一事舉一法持則雙持犯則兩犯故違教制即止犯妄行造修即作犯而此二犯從一事生止則一品吉羅作則隨篇輕重作歸前位止在此收皆因事法而有乃名事法此止犯即教行雙持犯中止犯也不學者一下壇場違本志願或頓心棄善或漸起慢求或懸思教行不明或臨事造修有昧不學無知二罪並得蓋由不學致茲成犯召斯二罪名不學止犯但不學人智有昧明心分漸頓凡於事法識疑不識三心差降故此二罪歷四行二九之中彰輕重有無之相令知罪網難逃俾識犯懺不濫故也三決疑又二初決事法問不學止犯名出鈔文前引可見事法止犯出何文耶答鈔云對事造去呼修以名止犯疏又云所對事法怠而不修皆名止犯等是則據文立號絲毫無妄問對事造修何名止犯答此示教行雙持犯義略見前釋廣在諸文問怠而不修即止息不作此止何得兼作答不修之名通作不作此據造作故違教制即是不修如不乞不說豈不然耶行宗云事法止犯於善事法故違不作文亦是此義不可錯消問可名事法作犯否答作犯體通善惡事法雖通善惡望作義一故無異號但名作犯止犯一位論犯義別一於教行愚昧二故違教制據斯以分乃立二目請究祖懷必不徒爾次決不學問不學止犯通惡事法否答如作淫盜犯根本外更得不學無知二罪豈不通耶問不學止犯通二持否答前云不學無知歷四行二九豈不通耶但持有等差義須詳示當知利器精持方得名為學者設有疑妄並開不犯不學無知唯結不學然不學人亦有三品疏鈔具顯此不繁引雖是不學對境止非本罪不犯亦名持律不妨愚昧教行自得不學無知資持云非謂不學一向無持非謂學人永無有犯但望學心有進有止故兩分之等問戒疏總義云對教不學止犯對事不學止犯九十別義云翻解止犯翻修止犯并及鈔中教行不學止犯對事以明止犯記主但立不學事法二止犯名比對祖師三處所標為同為異答二三雖殊通收無異不學即對教翻解事法即對事翻修恰然相符在文可見問事法不學二止犯義在諸文何獨引鈔通塞文耶答實通諸文但記家因釋此文立二止號故今特引令知所出大科第二明八九句又分三引據引釋決疑初且引據鈔云次論止犯或八或九又云言八句者對教不學以明若對事明亦有兩箇九句等疏云對教不學唯八句對事不學九句通有等次引釋八九句法欲知其相請以資持止犯中可學九句照之可見但八則除本列枝九則本枝並結鈔中又云九句者上品四句者有十六罪中品四句有八罪下品一句但犯根本無不學無知等十六及八罪且舉枝不說根本此九句中自含根條並列尋圖可見也資持云八句中此謂隨對事法心緣不解結不學無知犯門解義必須有罪既無根本下品不立故唯八句等是則或八或九雖殊不學無知不別當知句法之興為顯不學之罪故行宗釋戒疏四行二九位列文云第四門中唯明不學無知止犯罪相有無輕重隨一事法皆須二九等如此指明文相無濫苟或未達更詳示之言八句對教者此謂懸思教相事法冥昧意思說戒不曉行事心緣製衣三如未識籌量羯磨罔知四緣等九句對事者斯乃臨事造修不明行相如臨說恣錯謬行事造作衣鉢不識制量造房愚於妨難畜長暗於日限等將懸思歷於八句結不學無知枝條之罪第九下品既非造修不犯根本既識事犯又非冥昧犯門唯據有罪無罪此句不立若於造修行事錯謬亦先於八句歷顯根條下品第九明白心犯雖無枝條乃有根本故得立之對教對事或八或九其相顯明如斯分釋粗可知之也三決疑問疏鈔八九句法乃是昔解去取如何答祖師既無斥奪焉可私心去取細推其義亦是相因而用且如對教八句於義自分承用豈分今昔之殊復於對事九句例分二九豈非相因耶問古今列句同異如何答古謂惡事法上聖不制學故止持作犯通可不可於善事法聖制須學無不可學今謂善惡事法並是可學臨事迷忘非學可得是故可不可學遍該四行類通法界也問上云八九句法並顯不學無知何以二記以八句屬不學止犯九句屬事法止犯是則八句收不學無知九句但收違教耶又乃公違疏文八九並云不學答疏文八九並云不學正為皆顯不學無知也記將八九分對二止亦據鈔云八句對教不學九句對事以明今詳分對不無意焉須知止犯位中根本是違教罪枝條是不學罪八句中唯顯枝條不該根本故將八句屬於不學九句中正犯根本傍得枝條且從正犯以收故以九句屬事法止犯此即違教罪也要須得意莫滯名言如懸思教門不曉事法此則八通事法又如造修事法昏昧教制斯乃九通不學是則事法及與教門不學之與無知並通八九但以懸思對八造修對九故為異耳問疏鈔止犯八句並引房長其義如何答斯蓋造房不乞畜長不說皆由不學愚教犯根本殘提之外更得不學無知下品一句既識達教行但犯根本無有枝條疏鈔特舉為顯下品有本無枝之義前示可見問有人見止犯位中房長殘提便謂此罪屬於止犯其義如何答不然由彼不曉文中為顯下品有本之義故此妄消殊不知殘提自屬作犯根本之罪若謂止中列殘提便屬止者亦應作中列不學無知枝條之罪便屬作耶文中所舉房長等戒具雙持犯隨舉無在妄傳久矣如拆四難已為辨之無惜一觀問止中列作莫是止犯心邊有作犯麼答前云於止犯中列房長殘提乃顯下品罪相有無如前答可見若止犯心邊有作犯乃雙持犯義如過量造房心故違尺量妄作衣鉢必故違三如之類由妄作一事二犯並起違制即止妄修即作由止有作由作成止故云止犯心邊有作犯事鈔通塞門約教行心用二種論通義可見也須知持犯一章諸門意別若雙持犯義當見疏鈔持犯體狀門及鈔通塞備而明之若諸句法約根本歷於三心對顯不學無知有無輕重之相如此分之粗知蹊徑問妄修一事為得幾罪答妄修作犯違制止犯更得不學無知四罪具矣又四行列罪自有等差兩持二九并止犯八句唯顯枝條不列根本兩犯二九根條並列根本據隨成輕重句法不因此義枝條據三心不同分句由此而作識則一向無犯疑則二皆吉羅不識之心不學結吉無知犯提更有事開犯結並見諸文可謂持犯之相實深非積學洞微窮幽盡理者斯義難見也寶慶三仲冬於靈芝為客書重釋事鈔持犯篇通塞文鈔云若就修行解止持者對境䇿持為修行也此中止持正據隨對惡境具緣持戒者是也與下心用教行中二止持名月義別也如止殺盜先修慈悲少欲等行以行成故名作持望境不起名止持即止中有作也止殺盜即遵制持戒修慈等即起觀對治欲臨境不犯於戒須平時對治有功治功成故對惡不作故云望境不起也是則由作成止止不離作故云止中有作止據臨境離過作據用心對治又復須知止持有二一對善事作無違制此止歸下作持論通也二對惡境順戒離過正是此位與心用作持論通如上可見若就修行解作持者此作持對制聽善事善法依教䇿修名作持與前止門作持名同義別前約心用起觀此據隨對事法依教而作也如欲誦戒羯磨先止外緣望離粗過名止後善行成名作即作中有止也誦戒等稟制教也止外等修對治也事法乃多且舉誦戒羯磨是常行故人事往反懈怠作惡並名外緣以平時憶本受願有善必行橾履既堅故臨衆事能止於外緣也望隨對事法各有離過之止為細此乃平時通止名粗也此中作據教行乃依教而行也止屬心用乃止息外緣也假止成作作不離止故云作中有止也若細論通塞此心用止持與前心用作持自可論通教行作持望無違教即兼止持亦止作自通鈔家且約相成故以心用止持與教行作持論於通也作犯心邊有止犯如人作惡先不學善是等類也上句論通如下釋義作惡即作犯翻上修行止持於殺盜等事具緣成犯者是也不學等即止犯翻上止中作持謂不修慈悲少欲等對治行也作犯據違戒止犯據心用由止成作故作通止也問此中作犯與下作犯同異如何耶答此於惡事法造境為非下於善事法故違妄作此二作犯並屬根本隨篇輕重也問心用作犯犯相如何答由對治心劣故乃隨緣動念觸境生情如惡覺餘思染心看女等皆犯吉羅是也問此中止犯與下何異答此屬心用下據教行此二止犯並是違制皆吉羅也但心用約心教行據法如前心用結制文中可見也止犯心中有作犯如人畜衣過日造房不乞是上句標通如下釋義畜衣過日作犯也違不說淨止犯也造房作犯也不乞止犯也亦由止成作故作通止也何耶因故不說淨致過日犯提由故不乞法致房成犯殘問此中合云作中有止何云止中有作耶答欲異前科作惡與心用論通此中教行止作論通隨舉無在亦是由止成作之義也問此中止犯理合翻前修行依持何故前持中以止外緣心用論通今犯中以房長教行止作論通又復前舉制法此舉聽事未審何意答此作持止犯門中凡修事法或違或順具有心用教行二種持犯前作持中在文雖以教行作持與心用止持論通於義亦可教行作持與教行止持自論於通心用止持亦可與心用作持自論於通今止犯中在文雖獨以教行止作自論於通約義亦可心用止作自論於通以凡舉一事持則具教行心用二種雙持犯則具二種雙犯所以文中互舉也又復教行雙持犯若別據戒本止有二十六戒具雙持犯若通一律藏但是制聽善事善法臨事造修有違有順並具雙持犯故得持中據通舉制法犯中據別舉聽事以犯照持前後交映顯並具也問止犯有幾答不學事法二種別也此中正屬事法教行止犯義兼心用不學止犯無兼通義非此中論也問記釋此文云二持即心用雙持二犯即教行雙持其義如何答此記家考文不細也鈔中二持論通亦非全據心用且如止持止殺盜等乃即犯戒教上止持慈悲少欲方屬心用又如作持說戒羯磨乃屬教行止外緣等方為心用豈可一槩云二持據心用耶斯蓋凡持戒淨必假對治故以止不犯戒與對治心用論通欲行衆法須止外緣故以教行作持與心用止持論通也二犯中若作犯翻上心持文理極順如前可見記云作惡論犯戒不學據制科此釋義迂學者難曉余注會元雖且順記心實未安又止犯中雖非翻前作持於義兼通亦如前示問此止犯與殺盜等作犯論通得否答此事法止犯與殺盜等作犯無相成義不可論通所以此位獨約畜長造房等論通蓋有相成之義故也由此等事法持則雙持犯具兩犯不相捨也嘉熙己亥日山出重答欽師境想問行宗殺戒境想句欽依止立問作圖刊以易之後因宗師答而闢之復板如舊今於講次略考諸說欽老之作固無可取因師之答亦多不明世雖傳寫莫詳是非或依文讀句意趣冥然故不得已又如答釋并決彼圖激發學者小留心哉并境想通相亦出於後幸為一覽嘉熙己亥台州日山敘欽師問因師答日山又答一問直疑為涉幾境若唯一境疑起無從且如張作王疑祇由張起王疑心不涉張如何得疑若云涉張則兼二境與後互疑為張為非如何分異答言直疑者謂於一境猶預莫分心不異緣故言直也如云為張人耶非張人耶乃至杌木作句例同是以圖中但云張疑非疑畜疑杌疑斯言謂矣由此而知則與互疑逈然天別又答直疑唯專一境略如前答或於本境起疑或直於異境起疑須知此圖諸直疑句並就異境起疑作句問家不曉舊答不明轉添昏暗且如圖中單缺張是本境故有王疑等句雙缺王是本境故有張疑等句大漫雙缺人非畜三皆是本境故有杌疑一句並就異境此義最明若於本境起疑如諸戒境想第二句事義分曉不勞具出問單缺直疑著張作字雙缺直疑何無王作非作等語答著無不著皆亦無在但單缺直疑著張作者為顯境定心差故雙缺直疑不著王作等語為表心境俱差故必竟此疑皆就異作在文可見二問單缺直疑中何故不立張作張疑句者若既不立互疑中何立張疑句互疑既得立直疑何不立又單缺直疑既不立雙缺直疑何以立耶答單缺張作王疑心差境定若標張姓不應本題由是張疑逈不可立雙缺疑之語正是俱差若改從王即為當境故於二處不可混同又互疑作句非獨互張三趣當心應須減半豈得却將為張之語例同張疑句耶又答單缺直疑不立張疑句者蓋問家不曉圖中直疑盡就異境作句故有此疑也互疑心涉二境為張等語有何不可雙缺直疑張是異境作句當然問單缺直疑若立張作張疑句有何過耶答此即境想第二句立有何過舊答不思謂不可立者非也蓋此中直就異論故無此句如前已示後當更說三問單缺直疑中既有王疑句雙缺直疑中何無王疑句耶答單缺心差境定王疑人類無殊乃結重夷自成根本雙缺境差心轉王疑又是相當若起王疑不成雙缺是則前為心轉可立王疑後是雙差不應稱境又答單缺直疑王是異境故可以立雙缺直疑王是本境故不可立餘如前說舊答不明未克再示若爾非畜杌中何得立耶答如後可見四問互疑中何以不立為張為王句耶若不立者則攝境不盡又若立者句法則多如何會通耶答直疑則四境各辨互疑乃四趣迭論各辨須立於王四境方足迭論四趣參作方得互名若更加王則同人類既非交雜互義安成是知直立互除其義方顯若或更加王句又是心境相當不唯句法仍多抑亦不成於互若云張王境別殺戒誤犯錯開既成重夷豈不參雜即知此句定不可加又答互疑中為張為王義亦可立但疏中列句局疏云疑有十句判罪定疏云一夷九蘭若立為張為王人境不殊罪合是夷應改疏云二夷八蘭耶若更添一句應云十一句耶二途有妨故不可立克心論境張王自別心緣二境猶豫不決豈非互義但疏家別有深意是故不立此句記依疏出不敢妄加問何為互疑答切詳互義必緣二境交互不決故云互疑如圖中諸互皆立六句前三就本異生疑後三於異境起互後三句中若通本境即涉三境又究前後諸文及思世間事義多於一事不決或緣二事不決少有緣三而起疑者設或有者自歸後三句攝問家列句於互疑中牒境重重太成穿鑿又無所據復乃直疑與互相濫並非可取問單雙二缺互疑列句上下一同未審何意答缺心單雙雖殊至於論互無非四境交雜且約本異互涉作句故得上下一同無別所以五問雙缺中王境來差不立王疑句者何以非畜杌來差乃立非畜杌句耶答若立王疑句不成心境差人類隨相應還成究竟罪三趣非人類三境正未差前心既緣人後轉為非畜不妨心境轉方便結偷蘭以故不立王三趣應須列又答雙缺王差直疑不立王是本境作句起異故不可立互疑不立句不可多罪不可改如前已示非畜杌差非疑等句雖有與本相當句法須爾不可不立若不立者何應疏中四十之數又且無妨雙缺之義非等來差即境缺也為非等疑即心缺也是知記圖列句深有其意六問尅心雙缺直疑中並以張本境立句何故大漫雙缺直疑不用三本境立句大漫既不用尅心何得用又大漫互疑中亦以三本境立句直疑何不用耶答大漫之設其境至寬三趣有心杌為異境其或三趣皆列直疑正是相當但起杌疑始成方便所以圖中唯存一句尅心既局四境當前各趣生疑應須別列互疑心涉兩境句法不可一端直則一境獨明互則三趣交作是顯上義明若秋蟾前合後開深有所以又答此蓋不曉記圖直疑就異作句互疑二境交涉故有此問如前已決非不了然大漫雙缺直疑三是本境故唯就異但立杌疑一句互疑既涉二境故立為人為杌等句有何不可七問小漫中疑但九句除尅心中初句者今若改張為人亦合具十何但九耶答小漫人趣皆害前境不簡張王若或改張為人正是有心當境既云心差境定不應又作人疑是則還依記中除初一句又答若改張為人合有人作人疑句此句理亦應立正是境想第二缺心結蘭之句但疏家前後辨缺文中恐濫心境相當並不出此一句欲使學者易曉皆就本異互涉作句如前盜戒疏中小漫辨疑云為人非人物為人畜生物為人無主物下妄戒云漫心辨疑有六記云漫即小漫疑兼有互直有三句記出互中三句並就異境論互如云為非為畜等上引盜戒疏自作句乃就本異論互準此二文則互具六句并作中三句即疑心具九此圖準上諸文立句不敢妄作故無人疑之句設有此疑則準境想第二自可知矣立句出沒作者通變豈宜偏局耶八問雙缺直疑中並立張疑者未審此疑相狀如何耶答相狀如初答中既有準繩無疑再惑又答直中論疑是張非張其相易見問家意欲妄作故有此問無足議也九問文中直疑者單就異境而立何故疏文盜戒立句為人為非此則本異兩兼豈獨異境耶若云此是互疑者下妄語小漫互疑何就異境立三句法若或更加本境則有六句耶答直疑起心本異俱得異境如前王等本境如後張疑但不異緣皆通作句盜妄兩戒俱是互疑盜戒但出本境前三妄戒唯論後三異趣應知六句前後相成若加直疑恰為九句則知疏記出沒互彰不曉來由張為妨難又直疑局一境起通於本異圖中就異作句如前已明盜妄立句並就互論如舊答就盜戒涉本異互論舊答云盜戒但出本境者非圖中前三句是也妄中就異境論互圖中後三句是也準文立句豈虗托乎十問疏文妄戒自有小漫句法今此依何而立與後疏文不同耶答妄戒句法與此應同但單缺互疑通略人趣記文於此具足出之下順疏家且分六句影略互現製作常規良由不曉直疑故使作句有多有少如前盜戒小漫想疑雙缺但各立三總有九句亦應以妄戒疑中六句返破祖師不合立三前後異同以為無據耶準彼驗此人異互彰一代雄詮莫不皆爾故律中境想唯二十六戒具足出文自餘諸戒疑想並同但是略之無別所以聖心明斷豈得致疑又答妄戒但云漫心辨疑有六不分大小之殊盜戒明云小漫疑無直互之別今此殺中方標直四互六據文唯局克心大小二漫復令準作記家考核諸文詳究義理具而出之何有不同之疑乎詳上圖中一違祖教二乖義意且直疑為張為王等句乃緣二境互涉起疑豈得云直又詳互句牒境重重不遵祖典穿鑿太過又小漫中直疑濫互如前已行互疑二句上半本異論互下半就異論互與記何殊豈特改作公違師訓又大漫中唯立直句據何文義疏云餘大小漫心境缺想並准克論句法多少約義斟酌直互大槩須準繩規設謂疏無明文理義亦難偏局如三趣通害杌替其處或直緣杌起疑或緣非杌互起機情萬別心念千差如何一定單雙二缺唯論互三至於作句又濫於互全成戲論記圖所立於教有憑於義周足直於一境上起互收二境乃至多境但使心涉彼此名名為互豈非義足後紹興年中有會稽定師亦出圖相大略與上欽師是同但於大漫想疑各唯一句與上為異今但破欽師之義定師所出自然無取學者亦不須傳從費紙墨請知之豫因觀疏記具缺初二兩緣出義立句無非本於諸戒之未境想之文學者討論少懷通貫又復諸戒境想句數四五不定如疏簡辨且依轉想皆具五句今先以具缺初次二緣收於境想五句次以境想後四通收缺想缺境及單雙直互等疑庶使枝文易知指掌且依殺戒餘戒例此正出小漫克心大漫亦隨決明上圖中境想二五疑句二就本境起五從異境生據是直疑若唯依文詮相不了是故疏家更分直互歷境顯異乃有多句缺想亦爾餘義見前答文諸句之下結罪輕重並在記中更不細出㭊然夢庵持犯四難持犯一門義趣幽隱非積學洞微誠難通解一日忽得夢庵之文題曰持犯四難謂雙單難辨止作難明句法難定事法難顯初得之寶而藏之近與同儔議論持犯因究彼文但得破他一端全非祖意且持犯之難傳來乃久自古義學之家知難釋難者斯人解矣而夢庵乃知持犯之難猶為達者而於釋難義理偏僻似無可取今將疏鈔明文對㭊彼語使雙單止作顯然曲直是非昭矣庶幾後鋭不墜於邪坑俾同舟善知於誠教耳嘉定癸酉春滄洲出
