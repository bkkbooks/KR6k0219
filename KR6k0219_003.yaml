body:
  text: 答日本芿法師教觀諸問日本芿師為法之切於慶元間泛舶東來彼時先師如庵開法景福芿即依學十有餘年緣異音不解每別席指教芿乃討論分陰不廢大小部文一宗教觀無不通達後遊參諸方彼有不入其門者妄測堂奧之淺深於是作疑而激學者余嘗會語扣知彼懷而非實疑也彼文一出餘二十年將謂公心義士必能洞之豈期因此反多妄議茲以學徒請與決之故略為敘冗迫夏課義多未安苟有正者而我師焉庚寅中制日山述先謄彼疑次列今答彼云五義分通疑今決分二初決妄傳二答彼疑初中有謂吾祖依五義分通判四分為大乘者殊不知南山深位高懷建宗判教映古奪今大小有歸偏圓不濫於唐麟德改元撰內典録分判一代經論四分屬小明矣業疏三宗出體四分正當空宗雖義蘊分通教終局小故靈芝亦云過分小乘者得其傳也但於小教四門入道四分屬空同彼成實且分通之義乃佛隨機不思儀用故吾祖云大小二乘理無分隔對機設藥除病為先故鹿野初唱本為聲聞八萬諸天便發大道雙林告滅終顯佛性而有聽衆果成羅漢以此推之悟解在心不違教旨文今此一律義蘊大乘蓋由佛世小乘座廗別有一類利機大乘緣熟不泥小法佛以不思議力或令於小而得大益如沓婆等或於小中密說大乘如捨財識見等意便不滯小果終會佛乘為後開顯而作先容也曇無德師一是小中密得大益之機二得法等涅槃開扶之旨深體如來權巧之意採集律部全以大乘而為宗體所以前後律序多陳大義如相召佛子施生成佛等故吾祖云斯人博考三機殷鑒兩典包括權實統收名理結集茲藏者是也問五義分通為出於佛為出部主答觀後二義似出部主斯亦部主體佛而作考論諸義並出於佛部主但體權建實建宗立教而已矣問此宗義既當大應即教歸大攝耶答此宗教即是律律乃局小義雖是大教非大攝約教判宗還屬於小問前云四分屬空同彼成實未審二文有深淺否答成實但得空門入道教義故略與四分空義是同而四分匪唯屬空亦通佛乘是知四分旨趣超過成實問記主云彼明諸法緣生故空故名空宗但有名字故名假宗以名求義正同成實何謂超過耶答四分屬空少與彼同切詳五義深通佛乘故過彼論是故四分之空即大乘空故記主云深取大乘空義故名經部師是知此律空又過彼問據本律中何處文義而言空耶答諸義分通無非空義捨財非重空義又顯蓋由四分機利了法皆空教隨機說故召此律乃屬空門但空非局小如前已明故吾祖云四分一律義當大乘虗通無係故發誠言事無滯結是也若爾有宗不達法空耶答教門差別並因當時機見之異一類機緣計五陰諸法為之實有佛亦隨之謂法皆實推折諸法窮逐我人故得破法粗相兼證法空即屬有門又有一類達法皆空佛謂諸法一切皆假體之即空乃屬空門機有利鈍見分空有教門深淺行相緩急並出聖懷下凡難盡問如上所辨四分一律義雖通大教終屬小世何妄傳判攝有濫答推彼妄傳不無所以只緣南山疏鈔建立圓宗欲遮外疑而設問云如上所片須識宗途律是小乘豈懷大解矛盾自扣如何會通答大小俱心律儀不異卿不見前出家學本故興此難非矛盾也何況四分通明佛乘等五義如後學者夢中觀海議者道聽途說晚進相傳故多妄計大底欲繼南山之宗須遍覽南山之文詳究南山旨趣然後判文釋義萬無失一何不究心濫稱其裔祖屬莫伸良由於此然上所引問答乃立圓決疑之文以圓決小無小不圓況此四分義通大乘於圓又便故云何況濟緣釋云意謂縱是小教於理自融何況本部非局偏小義又明矣往往學者鮮曾究此肆意妄談或云依分通而立圓宗或云依分通而判為大非唯屈喪祖懷抑亦自揚寡陋之醜今更決彼五疑識者必能鑒也初沓婆厭無學疑此但厭於果縛依身非是厭於所證真理故律本但云此身不堅固不云厭無漏若爾一切羅漢誰不厭患果縛依身或可是毗曇所說羅漢住壽行歟然則用此何為義通決云乃厭果縛非厭所證者今撿律文云沓婆摩羅子得阿羅漢住靜處思惟心自念言此身不堅固我今當以何方便求牢固堅法我今宜以力供養分僧臥具差次受請等斯即沓婆回心向大既云此身不堅固乃知無常生滅終歸空寂既求堅固法乃知法身常在是為實道佛令白二差為知事行利他行即大士之兼懷修福業以莊嚴也細詳此義由知所證非究竟故厭此身不堅固況來固堅法之語非厭所證而何則與其餘羅漢厭於果縛灰身滅寂者不同日而語毗曇有云住壽行者彼計此外更無所證亦乃不知別有堅固之法故特留身久住於世與此不同焉將為難次疑施生成佛道云此則部主回向之辭也若以此為義通有部律亦應義通何故彼有部律尼戒本亦云福利諸有情皆共成佛道決云施生成佛道即戒序云施一切衆生皆共成佛道雖是部主回自向他歸源無二曠濟之懷誠乃體出本宗通大之義即合涅槃扶談之旨故涅槃云菩薩堅固持如是遮制之戒與性重戒等無差別護持如是諸戒已悉以施於一切衆生等文見第十卷聖行品有部諸律並無此語十誦五分僧祇戒本序末並云慚愧得具足能得無為道唯根本有部戒本末云福利諸有情皆共成佛道以彼諸文詳定此語有情則唯六凡佛道則局釋迦縱是通大記主亦曾決云施小為大無非分通故諸部中時有斯意但不如四分宗旨灼然如是則何疑之有三疑相召為佛子云佛子之名言有通別而言之三乘弟子莫非皆是從佛而生故諸律中並稱釋子豈異佛子別而論之二乘無繼佛種之義故佛子名局在菩薩是故小乘部中設有佛子之言應是通途之謂也決云相召佛子即本律序云如是諸佛子佛子亦如是等今以三意定於佛子非召二乘一者本部蘊大意南山雖撮五義以遮外疑其實分通義談一部如戒本前序云稽首禮諸佛之後序云三世諸佛皆尊敬戒又律文中提婆害佛諸比丘慰言諸佛常法又云戒淨有智慧便得第一道以上諸義證今佛子即召大士二部主解大意如前引斯人博考三機等可見是則部主解圓識大知佛權巧小中談大引偏歸圓特揚佛子之名乃召出家菩薩三諸部不同意撿尋十誦五分僧祇諸部律本戒序並無佛子雖諸部戒序皆云合十指爪掌供養釋師子彼召教主與此不同正是小乘無他佛之謂也他律有云四姓出家咸稱釋子斯召釋迦之子與佛子之義又遠矣考彼驗此佛子屬大何以疑乎四疑捨財用非重此是宗部異計何開義通例如淨地當部開之以資小根餘部閇之還同大乘若然餘部亦應義通耶況財既捨已僧用何罪而結吉羅應知此是小教之方便也若依大心直任四海也決云捨財用非重謂比丘畜物犯長須作羯磨捨財悔罪已物仍還主事同新得僧用不還違教犯吉非成重盜則知四分行人心智明達了法本空而於財物不生執著如前引示可以知之事鈔又云若依他部即十誦等律一捨已後無反還求彼律無還主義任僧處斷僧用不犯違教吉羅是則空有兩宗淺深可見彼疑云是宗部異計者正緣是宗部異計故四分之計勝於他部矣又以淨地為妨者然捨財無係乃機之高懷淨地開遮是佛之謀略今論分通須求機見淨地之開閇各一時之緣起四分因賊餓比丘故聽十誦僧祗因外俗譏故閇何以因此而分大小耶又復既云分通顯非全大焉得以大心直任四海而為妨乎五疑塵境非根曉云此亦小宗偏計非大乘義如彼法相大乘以明根境識等九緣和合故眼能見色乃至意唯知法故荊溪引大乘義破小乘異見如彼輔行若爾祖師何認小部異計以立義通耶決云塵境非根曉如小乘戒謂見聞觸知律自解云見者眼識能見耳識能聞鼻舌身識能觸意識能知識即是心又律序云備具三種業當審觀其意又成論云是三種業皆但是心離心無思無身口業等是故此宗取境成業皆推心識即顯分通不談七八讓於大教有宗諸部計根了境眼耳鼻等為浮塵根見聞覺知即勝義根且見聞覺知本即是心彼不談心故計成業推於勝義業疏引云身口七業皆是色中有損益故雜心論云色者一切身口業是色性因四大故是則彼宗能造是色所造亦色本宗能造是心所造非二彼宗動身口色成遠方便此宗重緣向念即入犯科彼宗戒防七支此宗同禁十業若爾彼部都不言心耶答不然且五陰十八界惡覺餘思五停四念等諸部通談但彼所計了境成業推於根色故非通大彼疑云境非根曉小宗偏計非大乘義者小不談心今推心識非大而何又引大乘眼能見等為妨疑者且大乘中或言根見理必在識不言可知如涅槃云從於身口獲無作色以是無作色因緣等又十住婆娑云律儀善根有二種作者是色無作非色等豈可才見此義便判彼文屬於有部須觀教門大體理味淺深宗計大小方可判攝天台所謂佛法不思議唯教相難解豈不然乎彼疑又云荊溪以大乘義破少異見者此以大斥小廢權立實佛祖常理何足怪耶彼云增受菩薩戒疑決云欲決此疑先敘教意次決彼疑初教意者諸佛極證戒唯一乘首演寂場名為心地小機昧己力不堪任降跡鹿園方便提誘於一乘中摘取小分為五十具爾時也小不堪大大不容小然後以小調停機漸通利故說善戒欲受菩薩戒者以五十具而為方便戒標八重但列後四淫殺已制指同篇聚是以梵網斥二乘為邪見學則有違善戒指小法為方便不學成犯前頓後漸彼斥此收二部雖異皆佛權巧又復善戒之中小為方便乃彰大從小入指同篇聚即顯小與大通重樓四級喻於四戒前小後大次第而發教意顯然而與南山所立不同如後可見彼問若南山意以白四受具而發圓體者更受菩薩戒否若云受者一發圓體則三聚具備而更受何為故諸傳中全不見祖師自增菩薩戒驗知白四即發圓體故不用更受也況復如來在世諸聲聞等開顯之後不云更受菩薩戒若謂不受南山既依善戒以五十具為菩薩戒方便經中譬以四重樓閣若不受者則缺彼一級彼經云若欲受菩薩戒者先發大乘心而受優婆塞乃至比丘戒若不受比丘戒受菩薩戒者無有是處又業疏云向不緣慈如何容大意在後也此豈非更受大哉若言既發圓體故更不可受者則比丘戒亦不可受以五戒沙彌戒已發圓體故汝會此難而言五戒沙彌戒未具比丘儀法故必須登壇者比丘亦未具菩薩儀法故必須大乘作法受也此問古來異諍未見其善今重設問端願聞一徹請不俟再斫細為明判次決彼疑此疑非一日矣講學之妄口耳相傳逮今不絶今欲決之唯在考文及細思義文義才明疑無不遣大為二科一推立法之意二究圓決之由此之二意並在祖文學者宜自尋之在理或當何必求人推立意者事鈔及羯磨經受戒篇中一依律文建立受法且無一言涉於善戒鈔明三品發心為成三品受具上品令發大心期在白四而成三聚經引多論慈悲之文唯成上品大心而受出家本務度生為先欲使依體起行故須運慈行受初受若不標高大之心終後何以成異常之行所以首令起慈運菩薩大心納菩薩大戒為立行之本成佛之基深有由矣斯蓋鈔經兩立受緣正本四分此宗機利達法皆空至於行受不礙受緣但有志願戒隨願感亦復此宗教雖是小義當大乘所以上品一受全依大義直納大戒准教立法自成一家據何而言為後方便況鈔於正受前明云今受成三聚乎業疏釋經欲比丘受具即納大戒有所承據乃云如善戒經菩薩戒本七衆所受者是此文即是引證之辭從古不詳便謂祖師令依善戒次第而受一何誤哉疏中又云向不緣慈如何容大意在後者斯謂發心緣慈期在白四而納三聚以發心而望正受故云後也今求立意唯據鈔及經疏記中考文少實語尚遲疑下更去取縱記順彼經意後既圓決今亦無用弊風久扇習熟生常聞余此說或為駭然吁聞義不能徒是吾憂也二圓決者據前所明上品一受納戒雖周猶涉權乘疑情未遣是故祖師於業疏出體文中準法華涅槃開扶妙旨立一圓教圓開圓發圓受圓持義載疏文非不明了今時行受須本圓宗前乃依宗立法尚無後受之疑況今圓受若教若行無非究竟一實之談縱有餘疑亦須氷釋何得不思一恣妄言依宗立法以圓決通前後相須共成一受在文極明又況祖師立圓非依善戒如何一混以失其源及撿諸記據文出意兩不濫通如濟緣云准此經意必更受大資持云善戒經中七衆所受為大方便斯乃出彼經意必須受大濟緣又云如是心受即納圓體如是心持即成圓行又云若發此心即發此體又云前並小教此是大乘以大決小不待受大即圓頓義等資持云能造所發全體是識更無別法又云既知受體當發心時為成三聚隨持一戒即同三聚文斯文並伸今立即於小法便納三聚不須後大又濟緣問云此與菩薩戒體如何分異戒體章釋云體同緣異等又問云既發此體後用受菩薩戒否若不須受即應約大判持犯耶若云須受則無作業為重發否戒體章釋云體須約圓行必依受從當教故乃至云既開大解依小律儀即成大行豈須棄捨方曰大乎彼文據斯伸釋不須受大明又問云教有分齊何須此示答為成本宗分通義故何以然耶如前善戒五十具等迭為方便等斯出善戒經意小是方便還須受大又云假宗知權不住方便等既云不住方便則顯於小便成究竟詳此文意謂善戒小為方便且據有宗當分之小若四分機緣達諸法體空相為假有豈於受法而生滯礙心志既大不妨於小而納大法正是深通佛乘之義假宗教義尚乃如此況今立圓扶顯不須後大理又昭然問依圓行受即小受大記主伸明又加分曉既依圓納無法不具豈獨依小而判持犯未免偏局答約義互具依小亦得約教相判未免有過如下當明難文中云具戒亦不須受以五十戒已發圓體等者今謂不然若發此體豈為比丘亦菩薩體亦是佛體須知祖師立教要使圓發妙解達法唯心圓融無礙至於行法還須依律五十具三遵律作法體圓妙故何妨重發行無違故方曰圓機問若行無違體重發者今更云受大有何不可答非謂祖師不容更受但祖師依律立法行受不涉善戒彼之善戒是漸入義小是方便大為究竟今家圓旨乃全即小便成究竟教旨別故何須依彼汝若智解圓妙更欲受大有何不可不妨始終皆發圓體今告諸師須體祖師圓義教彼受者圓發三誓圓納三聚圓成三行不可又依善戒四級而云壇上所受且為大戒方便非唯屈喪祖懷抑致異宗謗辱至祝至祝問白四發圓體疑愚嘗於斯一事遍請益於浙間宗師有云發而增受大有云發則不用增大雖是增不增不同於發圓之說是同雖聞斯言於義未明今設十難輒扣義關非故作疑而起戲論唯欲自預精通其旨亦以塞於他妨而已決云吾祖以四分是大令發大心即納大戒更立圓融導使開圓解了達諸法能所泯亡境緣微妙究竟一相故正受時勇發三誓攬彼無邊三聚善法由心業力結為戒體既納三聚何須後增受如業疏云智知境緣等文意極明彼以緣法而為妨者斯乃特為昧教妄傳而設也彼豈不知立法據教彼此不同納體約心大小無異亦如荊溪云戒無大小由受者心期等可準知也若謂大乘圓體須依大乘緣法者則梵網有云千里無師許自誓受豈須緣法識者洞之則下十疑盡成戲論何必須決繁費紙墨奈以世多愚昧執妄為是未免因筆以決諸疑初大小相濫難曰登壇白四是小乘教三聚羯磨即大乘法大小教門豈可混濫若言發大乘心故即小而得大者其何局在四分宗耶設依有部若發圓心亦應謂發圓宗戒體然則有部受戒或發圓體或發空宗四分亦應然所以但依發心不依法故如此立義非是宗骨顛倒大小混濫耶豫決云教門大小一往而分大小兼通理無分隔如前可見依宗立法以圓決顯唯今一宗有斯深致何混濫乎有雖無大既經開顯亦可白四即納大戒二師緣相違難曰圓宗戒體元依現前一人而發豈可壇上十師所發耶夫受戒法大乘小乘俱緣如法方乃發戒若有違則定不發也故擇大乘戒師云必須具能五德六蔽有一不如不任為師今何義故輒說壇上發圓宗體耶決云彼依大受須和尚闍梨此依小法必三師七證人雖有異納體約心無妨彼此況今壇上和尚闍梨與彼無別彼難又云大小兩乘須具緣如法方發戒者小遵律制一不可違必須如法故可知矣而彼大戒梵網地持高昌纓珞雜撰制旨六本不同立法各異或多或少彼此相違以六本相望互有不具應各不如法也況彼羯磨兩出乃殊何者為是若六本皆得則緣法不具亦納得戒今依壇上納圓何疑若謂緣法為發勝解今壇上諸緣豈不發解勝耶又云擇大戒師須五德六蔽者亦未若律文揀衆是非十德五緣最為精要彼既可作大戒師此焉不可授圓體三問遮相違難曰大乘先請和尚阿闍梨二師問七遮若有一遮現前不許受戒小乘但問二逆然則問遮不全豈可發戒耶決云大小問遮各有所本小依律文大准梵網大抵遮難為淨機器今十三難十六遮淨器極矣何不發戒如自誓等全不問遮亦納戒體此何不可四願期相違難曰白四即期盡形圓宗是盡未來若口昌盡形心期未來際豈非還同虗誑耶若爾不兩得乎非心所期故不可發形俱非盡未來故不可發圓戒決云期願之義如業疏中思願兩分測思圓解達法究竟微妙之體任運徹至未來何待期而後至願期稟行盡報持奉形終願謝但虧行功不妨無作無有窮盡故正受時思心緣境願期盡形不妨兩得五作法相違難曰受戒作法大小不同受大依大受小依小豈可妄用乎彼小乘中尚有異部不妄通用如加衣法捨僧祇取十誦等也何況大乘受戒不用三聚羯磨而用小乘法發圓體則如彼下官望大臣位寧可得乎決云應知受戒全在用心故業疏云餘雖從緣還期心本等是則心大戒大緣法何礙乎餘見第二答中又以加衣為難者受戒乃納體加衣即隨行納體由心大小不異隨行據教取捨須明何礙之有六徵求發體難曰言發圓體者與形俱為並發為相即發為單發耶若言並發於一法中何發兩體設計並發亦妨圓義若言即發今應反問所言即者為理即為事即耶若言理即此義不然以受戒作法不涉理談若言事即二非與心種盡形與未來十師與一人白四與三聚並相違法如何相即若言單發圓體資持既云為扶本宗驗知本宗體亦有焉決云彼以形俱與圓體並難蓋不知祖師依宗行受之旨鈔明發心業疏空宗正義出體並大乘義祖師以前弘律諸師不知四分旨趣俱依成非二出體疏決斥云不知何目強名非二據此決斥則見祖師依宗出體不在非二所以疏推能造反考所發與昔全別據斯文意依四分而受非形俱可比況後立圓融會空有扶顯今受無非識種至論其體本即一法空有各計皆不知實如昧玉為石及謂非石有知是玉指破前二謂石非石無非玉也如疏云愚人謂異就之起著智知境緣本是心作所發之體無非識種如前玉譬可以知也體既一法彼但妄計今以圓決執情既開體無彼此何得以並即同異而為難乎彼又言理言事者當知圓頓教中事乃即理之事理乃即事之理全性成修即小受大發起業體縱從身口搆造體有相狀名之為色乃即心即性之色誰可言議而稱量哉七受隨相違難曰隨行持護必依受體未審令隨何體而行護耶若云俱護如燒身臂指捉畜二寶則大乘得福小乘犯罪沽酒謗毀菩薩則重聲聞則輕如此持犯輕重千差如何通會兩方免過若言但依小者圓體既發若不持護豈非違體耶若違體而依別行護則是受隨相違之失也例如義淨四分受體而隨行有部決云彼謂既納圓體隨行持護為雙為單者當知若小若大各滯一端未免偏局今釋此難先明受體次出持護以義相關故也今論圓受即發大心發心既大即納大法一言大法無出三聚今依善戒纓絡等經以示其相在家出家大乘小乘一切律儀戒行並攝律儀聚八萬四千法門為攝善法聚四弘四攝化導衆生等法即攝衆生聚然此諸法體實無殊隨舉一法即具律儀攝善攝生三聚之法此即教之依法起行即具斷惡作善度生一切諸行此即行也微妙教行舉一通收斯約義判若據教相如上引示律儀一聚既大小通受應須大小通持犯亦俱犯如善戒經云菩薩若犯比丘四重亦失波羅提木叉戒汙菩薩戒等此文可據豈非依大依小盡成偏局其間燒身捉寶等事在教雖大小相違若從行判菩薩利廣從大為優如資持中辨也大小各懺等義如釋五門中上明律儀餘之二聚稱體秉行若有慢違應須准律違教結吉如此伸明則無受隨相違之過也問切詳勝鬘智論南山靈芝等諸文並只點小即大未見有文令大小俱受方曰圓體又復既達法法唯心隨舉一法即具諸法何須備受答然上諸文但在決小使開妙解令大小融通體無差別今論受行應須備盡教門苟取此遺彼豈為上達況復三聚法相攝盡一切大小教門既發三誓必納三聚圓機上達智解既妙遍歷法門行行皆妙是則持犯不可偏判八結犯相違難曰圓教瞥爾四分重緣分齊各別不可相亂若重緣結罪則違圓教若瞥爾結則從來律學還成無用律中最要莫過持犯今既不用何勞學耶決云且圓宗微縱定犯吉羅亦依律制但律本一也隨機三別有宗動色空宗重緣乃依十誦四分判也圓宗微縱即準涅槃蓋五篇七聚涅槃扶談即成了義此經有云出家菩薩持息世譏嫌戒與性重無別羅剎乞微塵浮囊菩薩不與微塵浮囊喻微縱犯吉斯據明矣況空有行相既經法華開顯涅槃扶談在教則必為圓妙究竟上乘在機則名真是聲聞亦號出家菩薩今稟圓教發圓解納圓體修圓行是則機教俱圓若持若犯並準圓判無非律乘九懺罪相違難曰若懺罪時直依大乘懺而可滅犯戒罪耶若云祖師不許是故立懺六聚法若然體既是大乘罪不依大懺而可滅者乎若云亦發大乘心作六法而滅業道罪可否若云可滅祖師亦不許故更立三觀若云不滅違汝立義彼受戒時則云發大乘心故於壇上即發圓體今行懺法亦應例云發大乘心故作律懺即滅業道而何云不滅耶又何故一是圓一是不圓耶決云難謂既納大乘圓體直作大乘懺而滅制罪又白四制法納大乘體應六聚法滅業道耶又復受懺要在發心不拘行法也上出難意下為決通當知不然詳究祖教受隨諸行一則須發大乘圓解二乃無違律制行法如受具足戒必在白四若懺制罪須依律行但使解圓行妙即性成修受具則三聚圓成懺制則分清化業引文證之如鈔云測思明慧冥會前法等業疏云智知境緣但唯一識等此即用大乘圓解受具戒之明文又云常思此行即攝律儀又云今識前緣域心於處等此即達唯心開大解持奉小行之明文又鈔懺篇云五衆犯罪理事兩緣事則順教無達唯識等記云事順教者謂依律懺歷事緣境當照起心知唯本識隨緣動念趣向於理此即用唯識妙觀依律行懺之明文是則吾祖教門無非理事圓融真俗並運受隨皆妙即上品持律之最也問妙發圓解受具足戒則一切法究竟圓滿應發圓解行六聚懺化制二罪盡淨無餘耶答受戒在心體唯一法罪分化制義約須殊制罪乃一期違教依律懺成罪必清淨化業乃積妄所結應難頓遣律懺兼觀雖云俱淨至於化業俱可分除懺悔位長經中具載豈不然耶十教典無據難曰所言受小法即圓體者典據在何耶如彼善戒經雖云為納後菩薩戒先發大乘心受五十具而為方便祖師順經或云受菩薩戒必假七衆為方便乃得大戒或云為成三聚或云意在後也而不云受即是乎若指多論以上品發心者此義不然彼是小教中共二乘菩薩戒只可應以上品心受小戒為後菩薩方便爾何謂以云直是也若云指彼即為圓宗諸部律中亦說三乘發心應亦是圓宗乎若爾非唯大小顛亂亦四分通大義何獨乎若指勝鬘大論此亦不然彼但說大乘遍學未論大小受法儀式故祖師又引法華十方佛土中唯有一乘法則約開顯而示行者所歸而已豈會於此即發圓體乎請義有文據發明祖意決云彼難白四小法納大乘圓體據何教典者此義從古未明余前答增受文中已為決顯當知白四而納大戒正本四分義當大乘令發上品慈悲大心而白四即納菩薩大戒至業疏中恐人疑云今受小戒那令起慈受大戒耶故引善戒決證七衆所受三歸白四皆發菩薩三聚但引彼證小受大不依彼次第受義今之圓受止是決小即大開蕩情執至於作法不異於前所求典據如上述也難文所引諸文皆非正義並如前決圓宗所依疑問曰依何經論立此圓教耶若云依法華涅槃開顯而立者夫三宗戒體正出業疏而往尋彼疏圓宗一章全不見說依開顯立但於總囑文方引法華令知所歸耳何為以此圓教之所依耶若云依四分律此大亂教門何者如來教法有大有小有制有化以律為制經論是化以三藏為小摩訶𮕢是大且却問言四分為制為化為大為小若言非化非大是制是小者制教但明事相持犯小犯不通圓宗之談若爾四分立圓義在何耶況四分一律於何處說圓教唯識之名義耶若云五義分通是又不然以彼即是本部分通之義故若以彼為圓宗何須更立空宗耶是以撿圓宗章都不見云依四分律立圓教體乎故正出體云熏本藏識成善種子所言藏識名義從何而得若爾畢竟依何經論立圓教名義耶決云須知圓教之立正本法華開會涅槃扶談即記主云捨此二經餘無此義是也吾祖業疏準義立圓決體示行後勸修方引二經證令有據顯體行以皆圓達受隨之兩妙在文其顯請自尋之彼又以大小不分為難者正緣小非究竟以大決顯使達小行皆即一實譬若萬派之水歸於一海何有不分之過又立化制為難者且毗尼戒相乃法華所開涅槃所扶今依二經立圓決顯豈有化制異耶四分分通非圓所本不足為難又云識種從何立者須知藏識善種見梁攝等諸大乘論良由善惡業體實本一心但小機昧己或計身口所成或計六識所造是故如來於小教中或說為色或說非色並不了義至於大教深契上機說一切法唯心本具全心發生是則凡有所為善惡諸法無非藏識心業種子譬浪從海起濕性無殊是為了義故梁攝等括了義之極談顯行體之究竟當知諸經但泛明善惡行相論中詳辨善惡業體才言行相必談業體種所談業種為顯行體論乃通經義必相貫今依開會決顯教門故准論文明示體相使識體究竟發趣知歸矣一心三觀疑問曰唯識所入云三性觀為一心圓觀為次第觀歟若云次第觀唯識既是圓人所行豈可次偏觀乎故歸敬儀中或云隨其發足畢約兩緣或云初後心齊或云真俗並觀業疏即云觀中此等諸文豈非初心圓觀耶若云一心圓觀者大違本論何者彼立四位唯識修相各別似真不同初以似法似義入分別性次以四尋思入依他性後以四如實智入真實性方乃緣中入地證真爾前二觀自然具足矣是知本論三觀次第全無初心圓修之義若爾祖師立義恐失本寄乎又南山自引唯識四位凡聖通學而雖通他難難實未知何者唯識觀自有三種空有真也他人所難難唯識即是中通唯識非謂凡夫願樂所修空有唯識名同其體不一空有唯識本被地前於願樂位修之何怪伏請明斷文義一徹決云欲決此疑先敘三性及三無性後當釋通彼疑言三性者論云阿梨耶識說名應知依上相三種自性一依他性二分別性三真實性說名應知相又云世尊說法有三種一染污分二清淨分三染污清淨分於依他性中分別性為染污分真實性為清淨分依他性為染污清淨分等彼文此謂諸塵妄念種種分別由一識變乃此識中具分別性也妄念及諸外塵皆此識有隨緣義能依染淨諸緣而起乃此識具依他性雖依他起真淨不變乃此識有真實義已上約一識本具釋若約用觀起修於方便位中先以依他性遣分別性一切諸法唯識所變但是妄計見有諸法體相皆空即翻分別為無相性此是從假入空若唯滯空二乘何異故以空照假謂一切法體即唯識假何所生即翻依他為無生性然後達一切法空假不二四性叵得即翻真實為無性性住於中道位入初地上明鈍根別修若圓機所修於願樂位中三諦一境三性圓修即於分別了非分別任運三性不相捨離無非中道下更釋通彼疑然南山立義必符論文如鈔疏敬儀淨心誠觀等處具有圓觀次第之義圓觀義者如前三觀塵露中已辨次第義者歸敬儀中引論三祇三劫等語豈不明乎又云然則性識昏明推步通局等又云愚智淺深賢聖位階由解行之遠近致利鈍之乖異是故論中菩薩約位具列五十餘階故知無分別智念念利鈍等又云示位地淺深開行相之階漸令修趣之士踐跡可期若為說萬行齊修方衢同進則心路茫然不知蹤緒故教跡殊異如能一以貫之則大觀於日月矣請詳文中民明通局利鈍遠近等語豈非明圓別兩修乎又復論中以金藏土譬於三性豈非圓義又云從願樂位至究竟位名觀中豈非初後心齊耶又云菩薩有三種一者凡位二者聖位從初發心訖十信以還並是凡位十解以上悉屬聖位十解即十住也方便位中三性圓修前後文煩不暇具舉則見南山圓觀及本論文豈為無據至於行位淺深因果次第不無其例如華嚴等經通披圓別兩機及別行位多從次篇彼疑云南山通他難者見敬儀真俗篇撫掌大笑等文斯吾祖於歸敬儀始從發心下凡便令真俗並觀有違論中登住方修之義故便他難云吾聞真俗並觀登住方修如何下凡僭他上聖等答唯識通四位在凡不學何有克聖之期等疑家云南山難實未知者意謂彼難以深位所修中道唯識而難南山發心並觀立義太高反自答云唯識四位凡聖通學若通凡者則願樂空有唯識正當地前人修何須立難是為南山難實未知若然者非唯難意未知抑且自違發心並觀之義今謂疑家一則未曉論中圓修則登住修真鈍修則登地修真儀文難意乃取論中圓義登住真俗並觀而難南山所立二乃錯認答文凡局三賢聖乃初地故有未知之誚然不知儀文初後心齊及發足並修等則信住已前便令真俗並觀故云在凡至於登住破惑證真故云克聖如此釋通非唯知其難意亦且立觀有據請細披文其理自見唯識通四位疑問若云通四位繩智既滅入真實觀則但通達真如理境於唯識智滅而不起故論云唯識亦滅離若云不通論并祖文云唯識通四位又所言唯識者為召能觀耶為召所觀耶決云此有二義一者能觀觀體即是中道唯識亦即一實境界不論機之利鈍莫非以此開解依此起修故通四位如論云一切法實唯有識以識為相真如為境依此境界隨聞信樂入信樂位占察經云依一實境界修信解等二者利智圓修中道唯識妙觀貫於初後故云通四位前答略引可以自明彼引論文唯識亦滅離為難者此乃論文歷別修義願樂位中以依他照分別如見繩似蛇達依他是識則了蛇是妄繩乃是實若智圓觀妙則似唯識及繩智皆滅唯以中道唯識妙觀契中道唯識妙理據此鈍修雖觀分似真皆名唯識不妨唯識之名通於四位文云唯識滅離者乃翻依他性為無生性入真實性乃去似入真無違唯識也唯識修相疑問本論明修唯識觀則用無分別智其智相貌自有五種一離非思惟故二離非覺觀地故三離滅想受故四離色自性故五於真實義不異分別故未審離此五義畢竟如何決云且無分別智離此五義唯一平等實相妙惠成因感果莫不由此若非此智何以徹無明之邊際見法界之源底者乎今更依論略舉修相初願樂中正觀意言分別以四尋思觀了別六塵次四如實觀伏滅塵想得入唯識觀中先以依他性遣分別性次以真實性遣依他性如論云如此菩薩由入似義顯現意言分別故得入分別性由入唯識義故得入依他性若捨唯識想已是時意言分別先所聞法熏習種類菩薩已了別伏滅塵想以一切義中由無分別智證得住真如法界至此願樂位滿次入見位所以先得無別智由通達真俗故今於此位深行福惠真俗並觀然入唯識三無性中真如智境非散動故顯入此觀乃有三義一真境二奢摩他三毗鉢舍那論云大乘中五百定等名奢摩他如理如量二智名毗鉢舍那以四善根暖頂忍世第一而為依上故世第一最後一剎那定由先了別無相性故更思量所緣既無能緣必不得生由此了別故能伏滅唯識之想唯識既滅從後剎那更進一念即入初地論問云由無分別智滅障立因得果故入唯識觀入觀後無分別後智其用云何答若依無分別智正說諸法因果無有功能以此智無分別故須用後智菩薩於諸法中自無顛倒如自所證亦能為他說諸法因果為得此二用故修後智已上見道竟次入修位有究竟位由前通達真如欲成三種佛身更踐十重法界二智雙明無分別智并的得智三慧研習聞思修也修慧生起如理如量二智緣極通境出世無分別智及無分別智後所得奢摩他毗鉢舍那寂靜無倒由後所得舍摩他毗鉢舍那智於無量數百千俱胝大劫中數數修習故得轉依由轉依故菩薩作心云我今必定應得三種佛身自他兩利更修加行兼行十波羅蜜盡破十種無明顯唯識之究竟見法界以圓明萬德備嚴三身並顯略言如此餘見論文上且約次第若論圓修初後皆妙如上已示矣相空分別空疑問相宜觀與分別空為同為異若云同相空是小菩薩所行乾慧等位修之唯識空即大菩薩所修信住行等修之彼此門異根分大小豈可混濫哉若既同者何勞立相空觀耶又於唯識中開方便空立為一位者亦何不開依他立為一位耶若云不同二空名義無不同故天親釋論而會者乎決云只緣他宗判相空觀即願樂位收地前四十心人致芿師有此疑也然不知疏云初淺滯教謂境是空又云觀事是空知無我人善惡等相靈芝云雖發大心未窮心本如諸般若所被初心等是則相空但證空理然唯識觀願樂位人雖未證中道唯識必聞中道理隨聞信樂與淺滯教證空理人不同日而語余亦評之久矣三觀塵露曾與決之右決二十疑皆宗部要論學者不明或有異聞無吝惠施
