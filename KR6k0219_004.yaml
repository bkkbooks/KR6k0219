body:
  text: 重受戒父豫主巾峯壇席纍行重受今因日本忍師泛舶遠來探閲律藏明達受緣微有所礙戒非增上自疑先受力乞重增世多昧者輒生疑阻逆彼高懷因考律論及諸祖明文決彼迷情使教門無擁大分三段初引據者先引有宗多論不立重受事鈔中一云薩婆多宗戒不重發亦不重受罪不重犯依本常定故羅漢心中下品戒等云云次引空宗成論立重受義鈔引成論云有人言波羅提木叉有重發否答云一日之中受七善律儀隨得道處更得律儀本得不失勝者受名其七善者謂五戒八戒十戒具戒禪戒定戒道戒共戒也又薩婆多師資傳云重受增為上品本受不失僧傳云宋元嘉七年賓沙門求那拔摩至揚州許請尼重受曰夫戒定慧品從微至著若欲增明甚相隨喜至元喜十年有僧伽拔摩此云衆鎧於揚都南林戒壇為僧慧照等五十人尼慧果等三十三人重受具戒有慧義法師難曰先賢聖哲共有常規豈獨改異何穆衆望僧伽答曰五部之異自此常理相與棄俗本為弘法法必可傳何忤衆情又問曰夫戒非可見之色也頃見重受戒者或依舊臘次或從後受為始進退之間足致深疑答曰人有二種故不一類若年歲不滿胎月未充則今受為始若年已滿便入得戒之位但疑先受有中下心理須更求增勝而重受戒即依本臘而為定也乃至曰戒有九品下為上因至於求者心有優劣所托緣起亦有不同別受重發有何障礙等南山壇經云余以乾封二年二月八日及以夏初既立戒壇仍依法載受具戒于時前後預受者二十七人等芝薗集云夫戒者截苦海之舟航發萬善之端緒三乘聖賢之所尊敬歷代祖師之所傳通但受之者心有明昧學有精粗而不能一揆故有初受者焉重增者焉等二立義者原其戒也即一佛乘修言而教則有殊得意而體實無異須知文文即性法法歸源玄邈若虗空深廣同法界所謂深戒上善亦曰戒德難思而欲受者直須知齊佛量法達唯心心法圓融境緣皆妙能緣所緣始終一念三誓三聚前後皆如是為上品心方稱上品戒契如來本志合南山圓宗苟一念有差一毫有礙難逃數寶之呵豈免徒勞之責呪或不逢良導不具諸緣虗上戒德之瓶妄受明珠之喻後或講聞始悟閲教方知憶前受或劣或無嘆經生虗消虗喪知非改過見義勇為決欲重增必憑至教載惟大覺慈心益物豈唯在於當機教網被時故實通於末世蓋空有傳集之不同致教門去留之乃異有宗局狹遺之豈在於重登四分通深得之匪專於再受鈔文所謂接俗揩定御法無准薩婆多之責也人法有序軌用多方曇無德之褒也此方重受僧傳廣明疏鈔壇經略提梗槩如前列示俾之有教可憑更在資深方見於心為慊三釋疑者問今言重受的義若何若據成論七戒各受何見重義有門十誦五十具三亦次第受豈不為重答重受之要唯據發體體性幽微宗計有異如多論中下心受五上心受十後五發上前五仍下體不增發體既不增故於前五不為重受彼宗不立正據於斯縱使三戒皆發上心必應三體前後性別由彼所計能造是色所造亦色雖非見對體是障礙故業疏云然為四大造更相障礙據所可分故名色也由體是色不相融通隨其所發各各局定故不言重成實空宗業由心造體相虗融隨緣轉變從勝受名如下心受五中心受八增發前五並為中品上心受十前八增上亦復如是故就一體次第增起增小為大增狹為廣增劣為勝其猶添波於海水濕性無殊但淺深之有異耳亦猶加皂於黑服色體一同但鮮舊之乃別耳重發重受粗為可曉問重發重受如何分別答資持云重發據多戒重受約一戒若爾論明重發那見重受答由體重發即得重受由彼七受一體發故問據教重增宗歸成實如何立義乃約圓乘答據彼空宗縱云上品猶屬偏擁須究佛懷及明開會無法不妙無戒不圓吾祖疏鈔所明發心准文約義雖列三品為在格量令知深淺的窮祖意全依圓旨妙發上心期感圓戒故名上品鈔疏之中示上品相皆云為成三聚及教開懷妙發身心總虗空界容受法界微妙善法記以上心對唯識觀又云如是心受即發圓體今云增受須依南山宗旨圓發三心圓成三聚方為究竟上上品戒問吾祖教門自唐至今盛行天下孰其不知上心圓旨豈有受者尚滯中下答教門雖顯機器乃殊或能授寡陋開導無方或所受愚蒙識心昏散絲毫落妄千里乖差其猶周孔之道訓人以善賢之不肖今古咸然何怪之有問業體一也空有何殊答如來隨機故於一法或召色心或召非二種種不同諸家論師不體佛意隨名執體各計為宗如涅槃云我於經中或說為色諸比丘便說為色或說非色諸比丘便說非色皆由不解我意於是祖師窮究佛懷立圓推體即一識種既得佛意心色非二隨名認體皆得其實言是心者謂此業體全心本具唯心發生能緣所緣能發所發無非心故言是色者乃即性之色猶即水之波了色真源達色邊際得色實相則前有宗雖得色名不知實故言非二者體既唯心故云非色實有相狀故言非心言種子者然此業種即性本具諸緣搆造全性發現體有功能出生衆善故名種子南山考體旨在於斯問壇場既納圓體更須增受菩薩戒否答如他文已辨請自尋之問重受之旨如前可知業體差殊會之可領且重受人事同新入位分年臘何以決之答如前已引僧伽甚明若前受年登即依本臘或虧年月今受為初學是也問前既得戒犯重名邊或戒先無難逃賊住二途有礙重受若何答如前引示幸自有例可攀可條可准佛開重受正為當今諸祖相承必非妄據求那言甚相隨喜僧伽謂必可傳南山達壇親行靈芝長書陳秉然諸祖行受時當像季機雜純浮邊罪賊住豈一無違諸師皆四依示現窮達化源豈不明難之有無受之可否今括疏鈔壇經僧傳重受之文並無一句言及難障竊詳諸祖意必有由蓋戒之有無難之成否凡小莫測唯佛能知但在依教隨順前機為之重受無非誘接總是結緣今引諸文證顯機性差別業理幽微智未及佛如何妄詳迷者及此好為一明齊僧傳云魏文帝三年設無遮會帝問此土僧尼得戒靈驗衆無敢對有一比丘請往西國問諸得道於是發足長安往至西竺問一羅漢答稱小聖不知得否即為入定上升兜卛問彌勒佛佛答得戒斯明得戒非凡小所知也如涅槃諍論品云善男子我於經中作如是說若有比丘犯四重已不名比丘不復能生善芽種子譬如焦種不生果實等我諸弟子聞是說已不解我意唱言如來說諸比丘犯重禁已失比丘戒此執無也善男子我於經中為純陀說四種比丘一者畢竟到道無學二者示道初二三果三者受道通內外也四者汙道薄地凡四重者即是汙道我諸弟子聞是說已不能我意唱言如來說諸比丘犯四重已不失禁戒此執有也請視上文得戒失戒有邊名賊豈宜妄量隨二執之非傷重受之教其可得乎又珠林云智嚴法師在俗曾受五戒有所虧犯出家受具疑不得戒禪觀不成遂往西竺咨詢達道亦遇羅漢不敢與決為嚴入定上詢彌勒報稱得戒嚴喜而回觀斯一節犯邊明矣不妨得戒是知機有明昧志有勤墮犯有成否不可以一毫之粗見礙千古之通規涅槃又云若犯四重五逆謗法名為破戒有因緣故則可拔濟若披法服常懷慚愧生護法心建立正法我說是人不名破戒若據此文有慚愧人雖犯無罪亦不失戒今重受者莫非心生慚愧信樂志深縱有所犯豈成邊障若謂必有賊住一難者且賊住之難律因為飢餓故濫竊形服為同說戒盜聽羯磨詐稱年臘輒受禮施名為賊住今出家者心懷正信縱聞羯磨意非剽竊據僧祇律或暗愚鈍或緣餘念不記初後皆不為障今時久在教門尚於作法不能曉了況餘泛泛或致愚魯何因識達或被緣奪終無前後如斯引示可決疑情又復作惡犯戒律中尚有開緣今發善心勇志重增當今末世實為希有如來隨機之教豈無誘道之方不可局執難緣阻彼高興涅槃四依宜在一用略茲敘釋達者鑑之紹定癸巳冬日山迷戒體正義直言細色決有分通決空圓通空有正顯分大業疏戒體正義一門始末文義皆是大乘與昔全別中間再述空有乃是引古騰計意在對破決顯能決之文盡出祖懷俱為正義但先就計義尚含容故後立圓分明指示識藏種子方顯其實初順有門談體是色然有宗諸師一謂體是身口所成二計體有損益故判為色如前引示雖據雜心俱舍無非皆是如來權巧隨機而說諸師不曉乃成宗計今立正義且順彼計以色決色謂一切衆生造善造惡所發業體相貌顯然故名為色乃全心即性之色微細難知凡小莫測唯佛如來種智圓明窮盡業性實知實見如實而說顯前所計雖亦名色不知其實故總斥云意言如此假宗中鈔及今經上品既令受大今依受出體須約大論初略標古計由下示今立業既心起色豈他成則內外色心等法全是一心隨緣變造故云分心成色乃顯能受之心起得其實身口之具體亦虗融蓋準此律大義而有此示能造既融所發之體豈是非二且順教限故云強目考下重顯體用決前空計雖依成實由彼止是小教空門與四分旨取不同彼云心造且據六識今謂諸法體唯一心隨緣變造文云本由心生者發起有從也還熏本心者依持得所也心既真常體乃微妙故得熏習有力用也心道冥昧者戒業之體隱密難知也體是心業故云心道如雜心論召無作為思顯道亦名業道等是也止可名通者諸師通體止在循名也故約等語重牒前計斥其不知雖云非二猶是強立又復前有宗中直決所發之體昔云假色今謂細色此假宗中乃決能造顯於所發昔謂作戒能造體是色心無作異前體名非二今決能造造能在六起必因八所發之體豈是他法是則能所方知其的假宗諸師以色心五義推窮業體全不知實故又斥云不知何目強號非二濟緣云且附權意故云強目又云今取道意識達體貌即知二非附權而立故云強耳彼文若體權取通意者豈唯四分一切小乘若教若行皆附權立若取通意無非一實有宗假色非強號耶今謂不然兩云強號前且順古後是斥非文意若此何必他求蓋南山已前弘律諸師不達四分宗旨但依成實非二出體故此決之若爾此宗正義以何為體答受既納大體依大出如前敘釋心生熏心體是心種義實昭然但教限局在文尚隱後圓決教扶顯種子名問記釋心生熏心等文並約六識子何相違答就文釋義不亂宗途理當如此不妨記主意自明白如云即此乃是示體之處豈不然哉須知此科正是考出無作體是心種決前不知也請細讀文其義自顯又況攝大乘釋論云眼等六識生滅不定餘識間起熏習種子不得成就阿梨耶識不生不滅體唯是一常受貪欲等六識所熏成世間果報等準此文決六不受熏今文熏心若謂熏六恐非疏意疏接假宗能決文後立問答云如正義論熏本識藏此是種子能為後習何得說為形終戒謝答種由思生要期是願願約盡形形終戒謝行隨願起功用超前功由思生隨心無絶故偏就行能起後習不約虗願來招樂果記云此問所來由後圓教決此二非以為識種識既常存種則不滅即違今家命終失義故探取後文為難文若云探取後圓者何不直於圓教後難耶今謂此問即躡前科大乘之義以難戒謝也由前依宗約大考體能生所熏唯一真常所發業體豈隨形謝此問之來其意若此但正義所立的在識種前順宗計語尚暗含今特指決故云如正義等顯此生熏即是藏識顯此業體即是種子彰常存之義俾問意分明復使學者曉前能決即大義也問能決既即大義何不顯談識種答四分雖大教猶在小所以文隱而義明也若爾此問答中顯談識種豈非混亂答若不顯陳何彰問意正恐混亂故立問決問此問答中既談識種後圓教中何再出耶答此問答中且顯四分後圓教中通決空有不妨重示餘如前決問記釋疏中答文思願行等並約受論其義如何答約受釋文其義雖善但述意未明致學者多昧須知思即能緣能受之心願即盡形斷惡納戒之誓行即隨願而起奉持之志若唯思願而無持心不發戒體如戒疏釋共戒同戒云前列共者明同受願也後列同者明同隨行也若受戒時且論受願無思學行則但虗願不感戒也又鈔云若但有受無持心者受戒不得又云寧起行用不須願求據此諸文必須持心方感戒也今文以願期有謝戒種無亡而通來難受既無獲何論無亡文中上二句示思願之別次二句示釋願期有謝行下明戒種無亡思之一字即同鈔中測思明慧之思皆指圓人能緣能受六識意思也但圓解微妙舉心動念皆不思議以此心受戒體何量成體之功推行為勝故云行隨等行力雖勝論其所自還須思妙是知妙思非唯發體亦起行功二皆微妙故得隨生死心綿綿無絶故云功由等問有宗云感生集業其行在隨與此故偏就行能起後習義何異耶答有宗體無力用全假隨行而成集業此中體具妙能假行莊嚴行全體起體假行成若無行功體難終續故云偏就等問此云後習乃推於行後云牽習而推於體其義若何答此論習勝種存故推於行後論起習之能故推於體又復此雖推行行全體起後雖就體體假行成請考二文義可見矣問思願行三心間起相續不斷共圓戒品何以疏中種存推於思心後習推於行力未詳何義答極有理也且善惡諸行悉由現前一念造成業種心堅業堅心廣業廣今圓受微妙故體無終極體既無盡力用難量至於顯發體用要在行力莊嚴故當深堅行學奉持之心始於初受念念無違及乎受後對境防敵心心無間不思議力展轉熏習相續無窮滌除妄業顯淨心體即成聖果故云不約虗願來招樂果如是推之行力超前義可見矣問大小兩乘皆云戒謝義有何別答小教言謝行體俱失何耶由彼小教能發所依皆即六識命終之時六識隨去體亦隨滅行亦無續大教乃論心具心造造雖在六全八而起如海之浪也能所發既皆常住體有何謝但是願行形終則止故云戒謝大小不同其義若此今文問答正據後義問地是無記結界亦發無作受戒納體何得須論受心答地是無記功推能秉要緣限域衆念業力結成無作納戒不爾體是道基非能所而不克法為行本非授受以何歸故得事鈔羯磨受前具緣並列五種要須能所相應方發無作戒業經不云乎戒是生死舟航正法根本必須緣集相應有違雖受不得斯蓋稟法修道要在前機體備功成必須緣具當知戒法佛佛相承師師相授授非虗授要須前機受心分明方顯傳授之益受非易受必須澄心一毫無妄方彰領納不虗豈非受戒發體唯推受者心耶故事鈔云戒者以隨器為功行者以領納為趣而能善淨身心稱緣而受者方克相應之道此文明矣何得昧焉疏云後約圓教明戒體者戒是警意之緣也以凡支無始隨妄興業動興妄會無思返本是以大聖樹戒警心不得隨妄還淪生死故律中云欲修梵行盡苦源者便命召之入聖戒數此根利也後漸澆濁不可示本乃就傍緣廣開衢路終依心起妄分前境初言體者乃此章正意也前標分云二陳體狀是也但體非孤起必攬法成法之偏圓體之粗妙由機執之異也今出圓體須究設教本意決偏小執情受全心起境緣心作方顯其體乃是識種苟不究能受所受之妙何以見能成所成之圓略提如此更就文釋警意緣者推戒功也警即戒義戒是能警意即所警對境防警雖有萬差成業之本唯在於意故須警之文雖在圓義通空有有宗警意但禁身口以彼唯制在於七支也空宗言警禁在重緣此宗通大制同十業也圓之論警義又天殊能警既妙所警亦融推佛本意凡所設教無非佛乘況經開會殊途同歸一乘妙戒究竟圓明圓人持奉機教俱妙真俗並運修性全彰豈唯上業直破無明如斯警意豈思議哉以下約義科三初七句究佛懷以明教意次故下顯隨機暫施小法三終下約圓實決小不了初中言返本者復本淨心也不隨妄者意在破惑也斯以大乘實義而推戒功次中利乃小中之利但會偏空不明中道宿世戒緣種熟一唱善來納法具足鈍者既昧唯心制須託境受必假緣方便立法曲順彼機三中決上二受迷法異心受從外入蓋不知全心而起故也問既云受依心起則不用諸緣亦無法可受耶答非圓教學子必未識心唯心之理雖未明見義載祖文非不分曉當知下凡介爾一念廣大圓融包遍一切豈有諸緣及所受法而出心外一切諸法既唯心遍豈有緣法而非唯心是則依緣納法並由心起近有人云圓宗中不列受法故壇場行受非可論圓蓋不知圓宗但在開決機教無非一實使開妙解受成究竟至於緣法悉依經別又圓宗正在決小記中返云此借偏文以證圓戒偏乃圓家之物何須言借偏即是圓豈云引證余意未安也問此既已決偏小下愚人等又何重決答此則且以圓義決於小法然諸劣機不體權意空有異執通於滅後故須更決問前第三門既出異執後何再明答前且引示令知昔非未彰決會此正義中以圓決小以智決愚使機教但圓俾能所皆妙也疏云愚人謂異就之起著或依色心等記謂愚人通指諸計或下二句正決當今所受之體前明細色已破有宗今此唯決四分作無作耳記文問記主於戒體章中破斥隆師妄謂疏家三宗迭廢其義甚明今記云四分細色已破有宗圓宗種子唯決假體豈非三宗迭廢耶答古來義學不細考記錯會此文以為三宗迭廢相延至今子亦未省然不知細色乃大乘義細色種子其義是一細色決假色種子決非二並是以大決小即非迭廢記意如此何不細推任從臆說乎問記謂此文唯決四分其義如何答記家意謂有宗假色已用細色決之空宗非二未曾會決故以此文唯決四分今更難云立圓應在通圓空有何得出體唯決四分耶答通圓空有理不在言今受既依四分上品大受體是心種教限所拘未敢明示故前考體但云心生熏心在文尚隱若非圓決教門何得法體明顯細詳圓意乃正決於今受也記云唯決四分與我意別疏又云智知境緣本是心作不妄緣境智知謂圓機明慧了達境緣如記所示境即前境緣即戒法作謂造作當知若境若法本即一心隨緣遍造故並云心作如鈔云觀事是心豈不然耶又經云一切唯心造即斯義也一切諸法既唯心具心造全體是心真如微妙圓融廓徹絶思絶議無相無形疏欲掃蕩妄著故云不妄緣境正是真諦泯一切法也問造義如何答推其能造雖本六識全八而起故異小教此之造作即隨緣義當見次科第六緣念猶如伎兒亦如幻師所成幻相迷謂實有識者謂無問戒律教法乃是佛說何為心作答諸佛說法常依二諦一切教門乃於真理假名建立真俗雖異無非一心教從此有故云心作雖則戒由妄立妄全是真真俗相即豈離一心又云但唯一識隨緣轉變有彼有此斯明真識隨緣而遍所謂俗諦立一切法也緣即衆生心念乃成業之緣也真理無礙隨念而起記云不守自性隨染淨緣造黑白業者是也不守自性謂體理無礙染淨緣即善惡心念善念成人天及四聖惡念成四惡趣則十界依正由一念造此據從因感果言之又復若執念為念則十界依正紛然而有若了念非念則能所境緣平等一相故起信云若離妄念則無一境界者是也占察經云若無覺知即無一切境等今記前依楞伽三識圓融之義開發行者使觀妄即真了浪即水如云真如隨緣不變不與妄合為真識不變隨緣和合現起為現識餘之七識為分別事識引經證云譬如巨海浪無有若干相諸識心如是異亦不可得是則但了一念圓融微妙則能緣所緣能受所受究竟一相諸法未嘗增一念未嘗減即於彼此達無彼此即於差別了達無差別下云了妄即妄是真又云知業達業實際作法則全性成修言受則不從外入如是開解如是論受方契圓宗納法究竟問前云境緣後云隨緣此二緣字義有何別答前召戒法後召心念並因緣義也問約何義故召戒為緣復與受前總別諸緣有何異耶答總別為納體之緣戒法是立行證果之緣即疏云戒是警意之緣者豈不然耶問上云境緣緣即戒法未審戒法與境同異若何答若了境緣究竟一實無非唯識有何彼此至於約事約相不無同異境是色心戒是佛制但有言句體非色心異可知矣若芝園云但留名句文遍在塵沙界文如云淫戒殺戒戒豈離境是為同矣問今論於受為受境耶受戒耶答受謂受戒諸文甚明但戒之所起不離於境如鈔云戒發所因還偏法界者是又如犯戒犯必托境今論於受戒從境起如此引明義又顯矣又云欲了妄情須知妄業此二句正述受意情即瞥起妄念此囑惑道業即行心運造此屬業道情業雖並六識意思蓋是無始結成妄惑蘊積八識染濁習氣觸境生情動成結業今此圓機妙達境緣了妄即真知業是識至於無始微細妄種卒難頓淨又復欲證妙果須憑妙行故須受戒持戒也問若論戒限但止業非何能破惑答此謂圓機妙達唯心則見秉行作用一念之心圓明微妙業何所起惑何不破圓受圓持疏記甚明又云故作法受還熏妄心於本藏識成善種子上句能熏次句所熏於下謂去妄顯真攬真成體作法之言通於能所能謂十師深明圓旨舉法皆如所即受者頓開圓解達法唯心始請師終白四妙熏妙用念念現前如此作法豈思議哉疏中但云作法不言發三誓納三聚致使學者從來未徹當知既達唯心則三誓三聚豈非唯心況是圓機發則盡發受則遍受豈同聲聞但徒斷惡唯受篇聚又鈔敘發心而云為成三聚彼明發心為成今圓受而為成之言正在作法況下疏明隨行令三聚並持則見作法已納三聚上能熏竟所熏中妄心即上妄情忘業也問熏妄心者妄即六心六不受熏如前可見今何論熏答前謂小教心唯六識以大斥小六不受熏今圓實教妄乃全真之妄六即體全是八前引楞伽三識其義明矣又如注中海浪之喻豈不然耶問受心亦現前一念妄心亦現前一念何分能所答受心之體真淨圓明妄心之體穢染昏結發動受心以真奪妄以淨除染以明破昏即記云此心反妄即是真心是也問妄乃無始結成一夕受心何能頓淨答圓達唯心究竟一實一發勝心發亦究竟如敬儀云發心必究初後心齊亦即楞伽一發真歸源十方界消殞若此作法以真奪妄妄何所依如燈破暗明未嘗增暗未嘗減了妄即真妄體何動若爾發心作用使成究竟何須歷劫修斷答圓人見理雖初浚一如克論所見不無明昧如智論云如人於暗室中然燈照諸器物皆悉明了更有大燈益復明審菩薩智惠雖與煩惱習合能得諸法實相猶如前燈亦能照物諸佛智慧盡諸煩惱習亦得諸法實相猶如後燈倍復明了等成體中問前論成業唯左現前一念何云於本識成耶答既發圓解了妄即真真即藏識識體圓融隨緣而起結成戒種前之起妄亦在此識今成戒種亦在此識故云於本也斯則圓人以不思議善心熏不思議識藏攬不思議善法成不思議業種也上論作熏若無作熏當見下文問言善種者為始成耶為本有耶答種子之義如釋圓教五門并解十業章及答芿師文已為辨明恐不見彼更略示之一言於種修性不同言性種者即一真識具隨緣義名之為種言修種者昔於何日曾受佛戒搆成業種應知全性成修全修是性如水為浪濕性同也但緣守心不固隨緣成染造業輪回宿種所牽今獲重受非性種不能相續至今無修種不能遇緣重受種雖本有望前隨染今重顯發故云成也深加勝心業力資熏搆攬無邊善法莊嚴則此種體功力勝妙又復種子體全是識此識前無力用今假熏成而有功力能生後果乃名種子攝論中義也疏又云由有本種熏心故力有常能牽後習起功用故於諸過境能憶能持能防本種熏心者種即無作為能熏心即八識為所熏由能受心妙所發無作功能力用皆不思議一能熏滌八識妄染二能發起後習後習有二一於現報能憶持防二則習氣力強展轉資熏盡未來際或受或持皆是今日無作力用作憶持防三據是隨作行心運為細詳所自皆是無作功力發現當知二六時中起善起惡悉由善惡業種任運使然問能熏之義唯推無作須隨行否答受時無作雖有功能還須隨行作與無作資顯受種同共熏滌八識也問無作業種既能任運防歒何得更起惡念答發心不妙念力不堅業種力弱故被惡欺強惡習熟觸境而起如古今達士得處既深始終固守皆無作之力如鈔云上品高達能受能持者是也無作熏義如記自明瞥爾有犯等義釋五門及答芿師文已明疏又云是故行人常思此行即攝律儀用為法佛清淨心也上文雖論無作功力若無行功何能嚴果是故自此以下正明依體起行又復前文論受須達境緣即妙唯識今明起行須論大小無殊因果不二用斯五句融會開解行方圓妙文局初聚章義貫下二依而作之應云是故行人常思此行即攝善法用為報佛圓明心也準記應云自在心也是故行人常思此行即攝衆生用為應佛平等心也前云智知今云行人並召能受能持之士此行即白四所受三聚行也恐昧宗致猶同昔見止奉篇聚故囑依受起行圓修三聚文中三聚因行也三佛果德也既云用為乃即因是果也三心體一約義分異當知三聚亦即一心三佛亦即一心也故文結云清淨心也記文以三誓三聚三德三佛交絡融會蓋體是唯心融通無礙相雖差別如水上波體即真諦相即俗諦相全體起俗不離真於上諸法措舉其一無非三諦圓融微妙圓受圓持其義若此斯即祖師圓義記中明之又顯且如三聚大小通收其中小行在彼劣機所修唯斯脫苦故為小乘若圓機上達了一切法悉是唯心豈小乘行而非唯心如來隨機小是似名字說大乃契實而談吾祖弘律教乃囑小恐諸行者猶滯權乘故取大乘中了義前決受法即一唯識此決隨行大小因果即清淨心佛於法花雖已決顯至於傳演尚有滯情故特稟佛嘉模重敷妙旨問有云圓受止納小法隨中方修三行其義何耶答此不究祖師立法令依上品且上品心即是大義今經又依多論起慈悲心既發大乘心即納大乘戒況鈔明云為成三聚則白四作法納三聚明矣鈔及今經並無一言今受止得小法為後方便又無一言語及善戒從古妄傳蓋失考祖文故也問前假五句與後以妄等文義有何別答前乃開解後示起行雖圓人解妙舉行皆如至於法相須識差別歷行要須遍周斷證不無次第見理不無淺深也學者至此應須通曉餘如記中問如斯論受還用更受菩薩戒否答據此疏記義理分曉何須更受如前諸文中已與決顯疏又云今識前緣終歸大乘故須域心於處矣今必對昔若在佛世法花已前並名為昔二乘小器既昧唯心不明一實為之愚人法花開顯深悟一乘是為今識若佛滅後南山已前故為之昔空有異計全昧歸源故為愚人亦為不識立圓融會妙達諸法即唯一心大小體同受隨無別如此了達豈非今識言前緣者指戒法也前云境緣唯識決法無殊次思此行即是三聚顯行無別今又斥世不智宗致執受是小今須達法花開顯會小歸大小亦一乘豈非終歸大乘也心體深廣微妙莫測故云大也運載衆生直至寶所故云乘也當知大乘即一心也餘義如前常思等文已釋明也故須等語正囑行者用觀持奉常符妙理一切作為常置此心於中道唯識如理之中斯須無妄故云域也鈔又云測思等語前云智知等言皆受戒得處也又前常思此行等句此科今識前緣之文並隨行得處也又鈔云五衆犯罪理事兩緣等懺罪得處也又復如前引鈔出家學本受戒篇令開妙解懺篇無生明唯識觀今疏圓宗融會受隨意使以唯識妙理為安心之處若得此處則法法皆圓行行皆妙念念皆常頭頭合道無能所相無因果相無染淨相無聖凡相清淨圓明微妙廓徹方得稱之微妙大乘是謂究竟域心之處前云常思此行即攝律儀此云今識前緣終與大乘其語雖異其義實同不可才逢此說便向教相上求葛蕂裏走須知三聚大乘全體是何嗟乎學者動經年﨟無箇入頭由於謹切提示之言不能留心用意甓雞捕徒自啾啾終無大見沉屈己靈抑絶宗旨實可痛傷問言前緣者指何為前答今決隨行望受為前問前云境緣今但云緣未詳何意答前文論受受必假境今明隨行唯指制法故但云緣也疏又云大小俱心律儀不異上句即前智知境緣本是心作等義下句即前常思此行即攝律儀等義前決境緣小法實唯一心與大無別又決此行即攝律儀清淨心也則顯大小教門體無有異疏指出家學本即唯識妙觀顯教觀相須方成圓受究竟一如問記云為成本宗分通義者此意如何答本宗分通亦通佛乘與圓無別但教囑小不可混濫故須別立扶而成之若爾本宗分通可立圓成有宗無大圓不可會耶答此文且據今受又是所承而云扶成本宗通圓空有諸文甚明無足疑矣又復才成本宗便成有部何以故蓋空能兼有故嘉熙庚子冬日山出四諍要論問凡情迷倒諍競千差何為四種而能攝盡答君子小人諭義爭利世分善惡出家入道與世懸殊諍因名利非教所被縱有諍論捨於教行餘何所評惑為教相而生或因舉治而起或犯罪懺評有濫或秉法被事乖差以斯四種攝無不盡察病立教數極於此問四諍七滅病小藥多何相當之有答大聖觀病設藥必無差濫病分輕重故九品之不同藥有總通故分對而無爽戒疏贊云病藥觀對機用權儀得非是乎問諸文或云七藥或謂七滅藥滅互舉其義若何答藥從服食調治得名滅據藥行病差立號故義鈔云毗尼名滅以無為體若對經文現前等七名藥也皆云毗尼即滅也問七皆云藥即法也皆云毗尼毗尼名滅未審此二與現前中法與毗尼何分同異答現前中法與毗尼與下六同諍起雖異至於用滅無非五現前三現今更明下六中藥法同異憶念不癡罪處三種藥即是法如義鈔云憶念等三法藥同體是也自言治者若對下品藥只即法但取自言即滅於諍無別法故若對中品法是揀人單白藥即自言也多人語者法即羯磨藥取多語草覆一種法藥同體如下對品更細明之問法藥同異於斯略悉法滅先後其相如何答如前義中法藥同者滅亦無異法藥殊者法先滅後如言諍上中及犯諍中品法是單白必在先作後用教評或取多語或取自言諍方滅也上略決法藥滅三種下詳示分品用藥及生事諍問言覓犯三約何分品答覓諍三品能諍為下狂犯為中具犯為上詳斯一諍約境分三言犯二諍據在臨時酙酌諍情分上中下用藥始之如義鈔云覓中三品上中下定言犯二諍執情流轉不定用藥無準是也上明分品下示隨品用藥問言諍三品用藥如何答下品情輕三現即滅諍情既輕不須集衆但一二德人喚兩諍人面對各敘人現德人引教證勸法現既引教證是非可見諍情即息毗尼現也由彼諍者暗教成競教旨既明疑暗自遣當知此中法藥體一義不無異軌度不濫名法勸諭調治名藥若對法滅軌用調諭並囑於法教明諍息故為滅也中品言諍情是次重須衆同詳衆混智愚或雜持毀難伏前人先作一白揀集智人後作一白出彼破戒不誦戒等却喚兩爭面聚各敘人現德人引三藏教詳而評之并上單白并法現也引教明白判息諍情毗尼現也既須作法六和無乖僧現既秉羯磨應須法地界現問戒疏云法現須僧作法詳評毗尼現前須用羯磨有德同評又義鈔云五中法指羯磨又云羯磨判滅名毗尼疏鈔二文法與毗尼語似相濫如何明之答若約進用法先滅後若以義詳羯磨揀德即兼滅義後正滅時乃彰法用故得法滅文義互舉如義鈔法與毗尼更無別體軌用名作法能滅名毗尼者是若爾法現一種正指何法答準義鈔云法者揀集智惠羯磨藥者正用三藏教法判者是也文據此法藥雖殊義類是同并囑法現斯二力行諍息無處名為滅也問以滅是毗尼分判為毗尼今五現中正取何義答戒疏云毗尼現前有德同評等斯取分判義也義鈔云毗尼者勿不皆是諍無之處此取滅義也義鈔又云羯磨判滅名毗尼者此雙取判滅義也上品言諍兩朋相援應集屏處先作一白揀集智人破戒無德作法出之評量兩諍誰是誰非然後公集一處僧現前也喚兩爭人面對迷情人現白二羯磨差行壽人法現顯露覆耳三種隨時籌有二種一完一破如法捉完非法捉破如法人多道理應是此多人語藥也諍情即息毗尼現前界現可知又義鈔云如法多者彼應作白言諍事已滅準此應更作一單白滅方究竟若如法少應作亂起去待如法人多後更與滅問正行籌時是非無語何為多人語耶答行籌之人應先告之如是語人捉完籌如是語人捉破籌後但數籌以籌表語也問此言諍中但爭教理未必有犯戒經何云多滅罪相答諍之既多身口乖違豈非犯耶問覓諍三品用藥如何答下品覓諍清人被謗或有錯舉數詰不止而生競諍上座德人喚兩爭人各取自言清淨無犯人現與白四法法現憶記無犯藥也諍情即息毗尼現也僧界可見問用揀人單白否答據義鈔云憶念不癡罪處所中僧應揀取具不愛等四文準此應須揀人諸文未見用法若論中品狂時曾犯狂止無違衆謂有犯數誥舉覓遂生其諍衆中德人喚取自言狂犯無心狂止無犯故與白四證彼不癡實無有犯上品多犯德人詰舉前後語逸遂生其諍僧作白四徵取處所諍情方息未伏本罪又彼剛戾觸惱僧多白二羯磨更重治奪七五事待彼伏順方與解也問何以此中亦云自言答義鈔云不現前不自言皆不如法正謂憶念等也況自言乃治懺常法但非正滅諍故不在藥數也問犯諍三品用藥如何答下品諍輕三現滅之能懺所懺議犯誤濫而生其諍上座德人喚兩爭人面對各敘人現問取所懺自言著實法現也亦藥也自言無隱諍即息也毗尼問自言是藥何云法現答如義鈔云或自言懺法名法者是此即法藥體同約義分異軌用名法調治名藥也問何以自言為毗尼現答義鈔云或以自言懺滅名為毗尼者是斯亦體同義異有軌用義名為法具決判義為毗尼問自言是藥藥但滅諍何云懺法答所言懺者無非彰露已犯斷相續心今既自言情無私隱知過自悔必無續念如義鈔云自言草覆罪諍俱滅是應單提下可作此懺上三不得問單提已下可一向自言懺否答不然聖人立法各有其旨此因滅諍情念決徹可云但淨餘非因諍還須依法中品次重五現滅之應須集衆僧現兩爭面述人現單白和僧法現其所懺者自言引過藥也情既無隱諍自息也毗尼問中品自言亦滅罪否答如前已示提下可示已上不得問如鈔云若罪在一比丘前懺應至一清淨比丘所而作懺法二三四等皆亦如是文據此一人前懺單提已下為下品二三四等捨墮已下為中品耶答此文通敘起諍不明分品當智分品須約諍情且如雖懺單提若能懺所懺各有朋黨諍競情深可作三現而得滅耶雖懺上篇起諍情輕無黨相援何須五現故義鈔云言犯二諍得通多少人起此言通於中下二品又前引云言犯二諍執情流轉不定用藥無準義可見也上品兩朋鬪諍歷爭情重過犯亦多故用五現草覆滅之用與如經注及記文可見已上決三單諍已下決三事諍問三種單諍義可粗悉各生事諍未知的論古來章藻或云用藥殄諍評議此藥是非成諍為藥上生病也或云用藥殄諍秉法雖己仍諍前事此病上生病也並引疏鈔評量已起羯磨等文證之未如孰是答偏局之見未合教意如前略敘入道之人凡有諍論悉從一切犯制教行上起佛立四諍攝盡教行如疏鈔列敘四諍前一通化制後三局制教四種文相敘事述義四皆不同攝教被機無不整足若為從藥生病則攝教不盡如義鈔云評量已起百一羯磨又云爭其一切已作羯磨為事諍若如彼云除七藥外爭餘羯磨何諍所收耶若從病生病則被機不足如用藥已前諍雖息同和理難別生諍競或因其餘羯磨而起紛諍又囑何耶願窮諍教意不可情裁問謂事諍者從何得名答義鈔云言覓約因犯事從境斯可見也泛論羯磨若不秉行被事只囑於教今諍已秉縱爭餘緣還歸事攝如秉羯磨名為行事又翻羯磨為之辨事從境立名義亦明矣問上云四諍各立事義皆殊復觀疏中三種事諍與三單諍文義亦別既各不同有何意故收歸上三而云言事覓事犯事耶答一則以類相從二則用藥無別戒疏總敘三事云羯磨被事義在順明乃至各執一見事法成壞由斯致諍故曰事諍義鈔總敘云評他已起百一羯磨彼此不和故名事諍文但將一切羯磨僧法三類分之一切懺罪羯磨則歸犯事一切治舉羯磨如七治法並為覔事除此二種其餘羯磨並囑言事但言事則通一通生善滅惡一切僧法二通人法事處四緣是非三通本衆他人皆成言事覔犯則局一局所被一緣二則覓局能舉所舉犯局能懺所懺如義鈔云但使爭其一切已作百一羯磨道理是非事同見異者是言中事作若爭治人舉罪治人則四羯磨舉罪則三舉也能舉證犯所舉諍犯不肯引過者是覔中事作若前人羯磨惡心懈怠心者是犯中事作文詳此鈔文豈非言事則通覓犯則局通局之義下更點顯問九品單諍除言犯下品不秉羯磨爭餘七品殄諍之藥歸何諍攝答義鈔既云百一羯磨百一之言如何不收古人所謂藥與非藥皆生事諍即斯義也如三單諍用藥殄除仍諍不已能舉所舉能懺所懺唯爭所被則歸覔犯二事若餘僧人爭於四緣並歸言事若能所爭餘三緣亦歸言事如疏鈔中覔事只爭治舉三根虗實犯事則爭定罪輕重若爭餘緣乃囑法相道理是非豈非言事前云言事通者是也問前破古人藥病生事皆是偏局今何取用答非無此義但古人唯就藥病生事故成偏局前謂攝教不盡被機不定豈不明耶問若爭言犯下品用藥及爭墮等對首懺法并袈裟等別法何爭所收答並囑單諍準疏鈔中事諍唯據僧法羯磨行宗云若非羯磨並歸上三上通決三事下別決三事問言諍之言為說示教理之言為諍論之言耶答乃說示教理之言化制教門理事行相假言以顯因爭此言為之言諍故義鈔云理不自斑藉言以顯者是也問若評羯磨何亦云言答表彰法事唯據言音豈非言事以類相從得非是乎問覓犯事三亦由言起何不云言答各有起因何得混濫言諍因言覔諍因覔犯諍因犯故也問若不因被事餘時泛論羯磨四緣為囑何諍答此諍法相是非囑草言也問疏云同和理難各執一見文此據本衆若有別衆或外二比丘爭此所秉之法何諍所收答亦歸言事如義鈔云若二比丘爭尼羯磨成與不成在言中事可例明也問覓諍生事其相如何答謂三舉四羯磨法因前人有犯或不見罪或見犯不懺或惡邪不捨或比丘俗人前倒說四事或污家惡行犯該五篇三根顯露衆中具五德人舉來詣僧若聞便伏從此不勞治或有拒逆應須治罰於七治中隨用何法而治罰之前人諱舉不肯引過與五德人遂生諍競未治前諍則囑單覓若經治法則歸覓事若能舉所舉爭餘三緣或有餘人爭於四緣並囑言事下犯事中通局亦爾如前所謂言事通生善滅惡者是也問犯事之相可得聞乎答犯中事諍乃目懺罪能懺所懺爭其輕重若二三人懺法及上篇未羯磨前忽有諍競即囑單犯或懺上篇僧作羯磨其所懺者忽生惡心懈怠爭云犯輕或犯輕罪衆中惡心懈怠心生非法羯磨定罪行懺所懺諍爭故囑犯事問餘時泛諍五篇輕重為囑何收答雖爭罪聚只囑教相還歸單言不因行懺能所評諍故非單犯既非羯磨又非犯事略此敘之餘見疏鈔嘉熙庚子季夏在丹丘日山出
