body:
  text: 衣制格言佛制三衣統於一化凡曰比丘皆須遵奉所謂同一師之氏族等三聖之形儀者也通量局量律有正文長會廣增妄情取捨或愚昧無知或披文不細邪風一扇習熟生常南山芝苑雖久正諸奈何深積弊情卒難悛革今先定尺量次明披著定量則準九十過量三衣戒披著乃本衆學齊整著衣戒以此二文為本却引疏鈔律論明文詳其進否自然明白何勞執諍初定量者戒本云若比丘佛衣等量作若過者波逸提是中量者長佛九搩手廣六搩手是名佛衣等量此戒因六群與佛等作而為制戒緣起至論結罪文約過量問此戒過量約何分齊若據戒本乃過佛衣之量則一丈八尺無乃太過乎答凡佛制戒兼通像末時既遷流身亦漸減故以佛身而為準的故戒疏云弟子無限不可定準世唯一佛故衣是定事鈔釋此戒準多論云佛量丈六常人半之衣量長廣皆應半也鈔又云長姬周尺丈八廣丈二常人九尺六尺戒疏同此今須依此而定持犯又據事鈔二房戒文周以十寸為尺唐尺加周二寸資持云今朝私用周尺公用唐尺文世中造衣無非私用依前多論九六為定問律有通量足可任情何拘尺寸答諸戒成犯各有分齊不定尺寸何論此戒之持犯乎制戒為人人身不定故有通量世昧通意通之太漫丈二長會誤之甚矣準前多論佛身丈六常人折半佛世之人而有八尺之軀末時渺劣身多減小佛慈懸鑑乃制八尺之人而著九六之衣約此為量自下視身長短稱體而作乃為通也故律云通量者度身而衣取足而矣業疏云先以衣財從肩下地踝上四指以為衣身餘分葉相足可相稱請視取足相稱之語實為通中之局又況鈔中引通文已續云雖爾亦須揩準接引十誦等諸部肘量諸文如下引之此顯雖通還依人量但言通則不可過於九六言局則不可定指一文豈宜不究一恣貪情長廣而作以致過量不齊犯長等罪靡所不至乎資持又準多論九六之數約身細算一尺之身則衣長邊得一尺一寸二分半廣邊得七寸五分如是增之則五尺之身衣長得五尺六寸二分半廣得三尺七寸半六尺之身衣長六尺七寸三分廣四尺五寸如是則雅合取足之旨深符相稱之文若此論通無違尺量佛祖之教必無差濫學者粗情而成妄執問且據六尺之人忽得七尺之衣所餘二寸七分而犯過量戒否答如資持云但取九尺已內足可相稱又行宗云已內皆通等過不得準此二文過九方犯已內不成問設有此者還成犯否答又準資持隨身定量若有過者不及九餘但令説淨不犯此戒問鈔引四分云安陀會長四肘約人肘一肘長一尺八寸廣二肘餘二衣長五肘廣三肘十誦上衣長五廣三下衣長四廣二肘半七條在上下之間僧祇二衣各有三品上者長五廣三中下二品次第減之多論三衣長五廣三若極大者長六廣三肘半極小者長四廣二肘半據上諸文衣量不定何拘九六而為限齊答斯皆如來隨機而設以致諸文所出不同祖師引於通文之後為顯通中之局諸文肘量不同即是局中之通請看諸文皆至長五廣三自下短長不定正使任身長短隨用皆得問多論極大長六豈非過限答論文先云長五廣三此是常途之制次明極大極小顯非常途世雖末劫人有異報如孔子身長九尺六寸豈不然耶有此之人合此之量身衣相稱何為過耶既言極大者豈非約人而論亦不違律取足之義若非九尺七寸之身難以濫依多論極大之量如戒疏云若定出量人有長短不稱威儀外不生善內無軌物故隨身分不出定量即用此語判前諸文肘量不同使隨身分非謂不定出量便任妄情也次明披著者如戒本云齊整著三衣應當學此戒正制垂前一角如象鼻相名不齊整而犯吉羅毗奈耶云不得垂三衣前角注云毗奈自注不排著肩上而垂臂肘前事鈔於此文下小注云以垂臂上名象鼻也鈔又引十誦云佛自教比丘施䩙紐法前去緣四指施䩙得去緣八指施紐應如是作準此以左肩上常以衣右角覆等業疏云逼邊緣四指安鉤擬反向後八指取紐以覆左肩等章服儀云良以用衣右角掩覆左肩前鉤後紐收束便易所以西來聖像東土靈儀衣在左肩無垂肘膝等戒本有象鼻之譏毗奈不許垂臂南山本此二文而乃立言垂訓苦言衣角在肩為免垂臂不齊之咎今人違反愚可悲哉至於影在桑榆常感韋天侍衛衣制之所未善律相之所未明天乃備言師皆隨録名感通傳者是也蓋此天深誓弘贊毗尼佛凡制戒無論輕重悉在天懷如袈裟四制諸律未詳非此天無以言非南山無以感故傳云元佛初度五人後及迦葉兄弟並制袈裟左臂坐具在袈裟下西土王臣皆披白氎搭左肩上故佛制衣角居臂異俗此一制也後徒侶漸多年少比丘儀容端美入城乞食多為女愛由是制衣角在肩後為風飄以尼師壇鎮之此二制也後有比丘為外道難言袈裟既為可責有大威靈豈以所坐之布而居其上比丘不能答以事白佛由此佛制還以衣角居于左臂坐具還在衣下此三制也於後比丘著衣不齊整外道譏言狀如淫女猶如象鼻由此始制上安鈎紐令以衣角達于左臂遠即到也置於腋下不得令垂如上過也上並傳文請觀第四達臂置腋之言則靈芝短會有誠據矣亦順毗奈不得在臂之制且免垂角象鼻之愆豈無益乎竊觀靈芝諸記返非救失皆得其實豈此衣訓而非實耶苟以尺量定之亦難過臂如六尺之人搭六尺七寸之衣但足周身將何繞臂況律令度身若長拖肘外何度身之有又令取足止許周身而已臂外餘長豈為取足禪教不知猶為可恕曾正律徒何得自昧汝若考之得實於心無嫌何以右角而藏衣下斯蓋明知非法偽設此端而杜外儀外儀可杜獄苦何窮今更問汝右角藏於衣下出何經律標何祖文既無典據何為世範自陷陷他實可傷也縱妄訓繞為達爭有置腋之語及不得令垂等文又如何耶借使繞臂何預鉤紐究施鉤紐之意正為不容達臂右角無可綴粘故以鉤紐收束請詳前引諸文鉤紐並為衣角而設義甚明矣勸彼學徒公心斫究莫順迷情問既有達臂置腋之文何以疏鈔儀文並令衣角在肩答蓋作疏鈔儀文之時未聞天示且據毗奈耶文而有在肩之訓垂終雖聞天告諸文已廣行世所以不及改正意使依於傳文也問前鉤後紐今何倒之答鉤紐之設意在束衣倒亦無在況是衣外之物何定拘制問長會繞臂有何過耶答一犯過量二不齊整三餘者落長四有不學無知犯因衣生是為罪服結犯歸人人為獄囚況用羅絹體應不如白及青黃色成非法深增貪毒俱犯憲章此若可忍孰不可忍豈不見章服儀云減量而作同儉約之儀過限妄增有成犯之法又云頃載下流驕奢其度至論儉狹未見其人又云衣服立量減開過制者俱抑貪競之情也又業疏云前垂一角為象鼻相人不思罪習以謂法煩惱我執無始常習可是聖法耶聞義即改從諫若流斯上人也疏文慈訓若此那不思之嘉熙辛丑春日山云論分部有圖別行分部一門見戒疏義鈔其文甚詳復指廣於宗輪部執文殊問等諸經論中逮加披撿始末可明但古人章藻凡五六家雖並引誠文不無情計守一於丙子歲寄迹滄洲通究諸典因示小圖以備自忘有不同意執為諍端盈文斥逐繼有黜訛略與辨明時有高範亦順彼情然善誘抑揚雖無可不可恐後學相循有傷教化再伸管見問答釋通識者幸無誚焉問未審結集因何分二答據律文中跋難陀自慶諸外道起謗迦葉親聞而興結集別文有云諸天白告上座迦葉法將頽滅速興結集於是擊犍地於須彌山頂會徒衆於王舍城中遴選耆年極果達教無疑於畢鉢窟內結集法藏餘不在數別於窟外自行結集雖揀人有異而情見無殊雖所集不同而法本無別故宗輪疏云內有五百應真外亦萬餘應果博間三藏之旨結集七葉之岩時雖兩處弘宣然尚混一知見斯文可準也問集法既分二處必應人法兩殊爾後傳弘應成二派耶答二處各集文句雖殊法無異轍一百年內時機純利善達化源稟承一化教主同奉一佛之法不執內外不滯教詮所以五師一味傳通與佛無異如戒疏云教主是一不相是非者是也又行宗云非唯佛在滅後百年尚無乖競等豈不明耶既云教主是一則百年之內迦葉等五躡迹任持為一化教主明矣又云同奉一律必應遵承一佛之法明矣如黜訛文中所引部執宗輪北山録文殊問法華鈔百法鈔等皆明百年已來通奉未分與今戒疏教本無分之文顯然符契也又部執論乃隋朝真諦翻隨出疏釋唐時重譯名宗輪論慈恩有疏正明分部祖師指云三十餘紙間暇看之行宗引云其十八部異執論中育王集會論法成乖等可見疏鈔及記所明分部乃通依衆典惜乎學者不廣討論罔知來致甕雞簷徒自啾啾問迦葉等五皆窟內之同師奉僧祇亦窟內之法不涉窟外何為二部通傳答子不曉通傳之意迷之久矣迦葉等人既是一化教主天下之僧無不歸焉僧祇之名雖屬窟內無非一佛之法百年之內教主是一人無異見但遵一佛之法不分內外之殊通傳之意於斯又顯若爾何以戒疏教本無分文中但説五部不言二部耶答五部在後二部在前五部既説無分二部不言可知也又復五部乃隨機異制輕重不同二部但是別集法實無異異制尚不乖離一法豈分彼此問既云百年通奉初滅各集何為答如前已示揀衆純雜而有二處莫非皆效嗣法之勤問分部各傳起於何時答疏不云乎一百十六年方出異執又義鈔云佛去世後百年始分等是也據宗輪論百法鈔等文所示乃因雞園寺僧名大天黠慧巧辨廣誘徒衆惡業所使邪言濫正大衆斥逐紛諍不已便將朋黨遠承窟外自此一化僧分兩朋法分二部若爾何故疏鈔以佛初滅便分二部耶答時雖分部各傳在後畢竟部文之異根於初集文中且敘根異不説後分請究名體權實雖聞異制不相是非之語方見一百年內二部五部雖各集法未各諍分況是迦葉阿難等佛親付囑任持一化之法則百年之內無有異徒又復明矣若爾何故商那田提二師並化即應非一徒矣答此雖殊方異化而無彼此之心稟一師法如水乳合又復此時資徒分化非獨此人請大思之問曇無德五部所出唯出窟內耶通二部出耶答曉疏鈔教本無分之旨必應五部通一法出無足疑矣或果不從此説且疏鈔所引傳法藏傳及方等文懸記滅後教分五部斯還懸記一化之法分五部耶唯記窟內分五部耶疏云二部是本義通五見者如何説耶若爾何以疏云若據緣本其流上座又云於上座部搜括博要又資持云於根本部中隨己所樂採集成文如是等文皆説唯出窟內耶答迦葉等五乃窟內之人雖為一化教主弘演一佛教門還以窟內之法而為其主故得曇無德等依於窟內採集成文疏推四分緣本故云於上座等百年之內未生異見此等五師但各集法不相是非雖本窟內之文而無異外之見通奉內外如前已明問五部結集百年將滿分派各傳出於何時答大論分部須人法兩殊初集之時教部雖別人同一和後因異派各傳方為分部今之五部結集之後至四百年來於十八部中各因諍競次第分出也問據下記及古人章文引宗輪論疏百法鈔等分二十部皆有時節緣起三百年中於薩婆多部分出一部名曇無德且空有之異矢石相反何以曇無德部出於薩婆多耶答斯乃薩婆多部先行於世曇無德部未有承用忽於一日婆多學徒或議行事或爭法相有謂曇無之是薩婆之非遂與朋黨稟承曇無之法故云從婆多出也但是人從彼分故乃法隨人顯非如五部從僧祇集出也十八部中彌沙迦葉遺等例皆如是有於所學部中見異爭分者如雪轉法上等如百法鈔可見也論僧體且僧體一科自古為難者只由三處祖文少異致使學人情見未融今因對破他文故乃會而釋之問戒疏三上九紙云明僧體者有云僧和以非色心為體又義鈔云上二六紙論云成實非色非心為體今律家辨僧是假名攬四以成僧四外無別體業疏一上云四人假用為僧之體等如斯三文何論同異答三文出體一家建立何有異耶戒疏依論體是非二記家釋云即目人假鈔亦準論先云非二復依律出僧是假名即上人假準上二文乃以人假為僧之體即同業疏云人假為體及濟緣云自推假體故知僧以假為體等是則三文皆無異轍奈緣人假有濫非用如不足數非堪乘御者是也故於業疏終窮教內簡去非用特顯堪為故云假用為僧體也又復對破初師實法無用假人有用故此標顯若爾又成異耶答三文皆同有何所異業疏以假為體體必兼用彼二不言用者如濟緣云人假為體且偏舉耳既云偏舉必須兼用方成僧體若尋常所論體乃用家之體用乃體上之用則體用義別今就僧考體故雙取假用也問依論出體非二便周何須言用答論雖出體律必簡能約律準論出體方周問非二與人假其義如何答諸小乘論以世間一切諸法三科收之一色二心三非色心非二乃攝法聚名聚中有十七種法此十七法體皆非二其間名身一種即攝人假是則人假體即非二義無別也問四分空宗亦名假宗未審此假與人假何異答假體本同於義有異言體同者無非皆是以無立名為之假名言義異者此乃對前色心體是實有故指人為假今四分以五陰法體皆是空故名為假問假之與用其體如何答假即非二如前可見泛論於用乃是作為屬於色法此之言用乃體上功能雖則僧以人假為體要須體相圓淨具成僧之用或有事起稱體為之故業疏云必於説戒等法相順同崇便能隨法待用又云欲者表心無二以應僧體清淨無玷實通假用等此謂不來之人亦具成法之用也如此論用亦無自體還屬非二若推所起用從人假起假從實法起如業疏云而用無別體還以陰本實法為體是也問對首心念一二人法還以假用為體否答據能成業一人亦僧假用為體又復一人乃能成衆之緣故業疏云衆無別體還攬緣成故於緣中分兼衆義等可見也略辨如此餘見別文嘉定八年仲秋在滄洲圓潔齋出雜心論出三有對文分二初結前標後已説記無記十二有對今當説二正出三對分二初略總示十二界有對二界説少分六根六識及心數法並境界對十界五根五塵障礙對也七有對一少分亦然六識意根為七心及一分心數法並緣對説境界有對障礙及與緣二廣簡釋二初示三對正體二初正出三初境界眼耳鼻舌身界及七心界説有對法界少分亦説有對次障礙又十色界説有對三緣對七心界及法界少分亦説有對法界一分四十六心所也次總結問此中説何等有對答説境界有對障礙及與緣三種有對次釋三對名義二初標列境界有對障礙有對緣有對次簡釋三初境界二初釋義二初正敘境界有對者如經所説眼與色對乃至意與法對次結顯已説境界當知已説七心界法界少分是故當知次簡體二初正簡十二界一界少分是有對五外界法界少分是無對次引證如彼經説若視陸則不觀水如此廣説次障礙二初敘義障礙有對謂各各相對各各處障礙若彼有一則無第二住極微聚故障礙故可分別故緣處所故當知次正簡八無對此中廣説七心界法塵三緣對二初敘義緣有對者心心法於境界轉應如是言次簡體二初徵起若法境界有對彼法障礙有對耶次正簡二初相因重簡礙界二初立句總標應作四句次約句正簡或境界有對非障礙有對七心界及心相應法界或障礙有對非境界有對者五外界或境界有對亦障礙有對者五內界或非境界有對亦非障礙有對者法入所攝色無為不相應行次正簡緣對體二初徵起若法境界有對彼法緣有對耶次簡取二初正取謂緣有對是境界有對次簡除或境界有對非緣有對五內界且夫名有召體之能體有應名之實就論尋對名體無差文義不濫言境界者納六根六識取境不濫各有分齊故云境界境即前境界乃限分名雖在所體實取能是故前境並在所簡故文簡云五外界法界小分是無對此云法界小分者即法塵中落謝五塵及無作色不相應行三無為也若法塵中心數法一分自屬此對收論云眼與色對乃至意與法對此正示根識取境不濫之義然取境之功必須心數所以文中兼而明之以五根七心及心數法通有照境取境功能為此對體疏云五根七心記云根識論對並簡除塵境也問疏記不明心數法者答大底起用之心必兼王數文雖不言義須齊具問且取境不濫者前五可爾意根意識通緣一切約何分齊為之不濫答忽爾起心思取前事初念屬根次念屬識功非前五豈非意家取境分齊耶問諸師章門並以六根為能六識為所其義如何答若唯根不能了境既能了境根必須識功用是齊何得強分況復論中所對自是塵境即非以識為所但境在所簡此則唯以有取境照境之能者為之一類以作對體也問取境照境功能之義論疏不明何得加擅答俱舍論云若彼有法此有功能涉法師解云彼法即六境此法即心心及色根有見聞覺知等照境功能即説彼法為此法界彼文此據古人所引不妨親切障礙者即五根五塵體是實質形相方所粗細大小各不通涉故云障礙論以七句釋義極詳文云各各相對疏云能所俱對色據此以言能所不知亦是障礙之一義也正論對體但取色質拘礙者為之一類以應名題七心心數法并法塵並在所簡文極分明疏云五根五塵記云根塵論對並同論文不須他謂問有以五根為能五塵為所義又如何答論疏雖有此義亦是顯於障礙不可據此局論能所如前已示緣對者即七心心數緣慮籌度為體然緣慮之心必托境起故論云心心法於境界轉心即七心法即心數境界即六塵轉即相續展轉籌度之義據此乃塵為所緣但今所論唯取體用五根五塵色無為不相應行體非緣慮並在所揀問何以論中但揀五根餘不言者答境界已揀後不重明況正出體但云七心及法界少分可見餘並簡除也疏云能緣心所緣有對者心即論中七心及心數法緣慮籌度王數功齊疏不言數理自可知但云所緣不明塵境者意在揀除故且克體以應題目問記文云能緣是意所緣即法即非揀除耶答記作斯示深有旨哉恐執文者謂此緣對體但思度非托境起有違論文於境轉義故特出所緣也又俱舍云心法執彼而起彼於心心等名為所緣解云彼即六境等此法證記文所緣即法之語極為分曉問所緣乃塵境記文何云法答召境為法有何不可前引俱舍亦召境為法又復對境緣慮境落法塵疏云一念色聲眼耳所得相續色聲法入所攝意識所得者是也問疏之心字一總七心二總王數記何特異而云意法答非特異也雜心第一自有文云緣有對者意識於一切法也所標意字據文似局一界約義則通諸心一通心意名別體同二通五識起必同時即論云眼識以意界為依者何故不名意識答眼是不共依意是共依以六識體展轉緣生故意界即六識體離是無餘等據標師所引未知何論三通王數緣慮功齊業疏云言思其必是心等如斯點擸疏論記文一無異轍問六識及心數皆有緣慮之功如何取別答前五則局第六乃通故論云於色二識即眼識意識共緣色境等亦據他文所引未知何論文也又復意家根識通緣一切現及過未世出世間有為無為色心非色心等法問有以意根為能對心數為所對其義如何答此但莊對偶之巧而不知義趣之乖且能所之分殊必各專於一義今意根心數緣慮功齊何得強分問有云意根心王為能六識等數為所又如何耶答一者妄分能所如前已破二者大小經論諸師章藻並以意根六識為王思欲念等為數彼以六識在數妄之尤甚問有以七心為能六塵為所如何答一往似順論文以論有心心法於境界轉之語再詳亦無可取何耶且論取體用齊者為之對體塵境體別論已揀除何不詳審問文揀對體唯取用齊何以五根七心及心數法跨涉前後耶答一者五根體是色質故歸障礙又能生識取境亦入境界二者七心心數以照境邊入於境界能緣慮邊又入緣對五塵唯色但入障礙假色無為不相應行體非上三故並不入問取境緣慮深淺如何答若約局論次念取境乃屬界對相續緣慮即是緣對若約通論取境之時豈無緣慮緣慮之時豈無照取是則照取緣慮二心間起但照取時短緣慮時長照取則局緣慮則通局則唯在六塵通則緣一切法又局則唯對現境通則通於過未如此分之不無深殘問三種皆云有對其義如何答障礙中對對即礙義界緣二對約境得名但功取類齊故境在所揀是知對字即類也非對偶之對也如前詳敘豈不明耶問諸師章門定約能所以論有何過失答過失乃多略陳三種一者暗文二昧名體三失疏意且暗文者論疏之文並不局約能所雖有所對各乃揀除詳如前示茲得以略昧名體者境界據取照不濫障礙約色質拘塞緣對取籌慮思度尅名論體用體顯名絲毫不濫若局能所而論則心色不分名體滑混何以顯假色之體失疏意者且疏出三對本非他意只欲顯無作假色之體一非障礙實質二無照取功能三者不能緣慮但緣假色微隱難知故以此三表而出之例如空宗非二各以五義推窮色心非二之體自然見矣然彼諸師不得此意簡易而繁文徑直而迂曲徒涉言語之多終昧假色之體自迷迷他知幾年矣紹定庚寅秋丹丘日山出受緣重關謂依善戒為後方便一重關也立圓受具習後受大兩重關也特與注決事鈔上三受戒篇云毗跋律曰發心我今求道將欲受戒先標所期為求成道此云求道即小乘四果也當救一切衆生衆生皆惜壽命小乘唯專自利此云救生語似利他然護彼命意在全己使無損他還是自利但諸行中護生為要故先標之以此事受是下品耎心志非堅利心無節操又云云何中品若言我今正心向道立志決徹絶無他念故云正心此云向道望前為勝望後為劣如記可見解衆生疑解疑之言非究竟度中品之相於茲可見我為一切作津梁亦能自利復利他人菩薩利他有深有淺諸經論中各有教量受持正戒發心所期戒隨心感又云云何上品若言我今發心受戒為成三聚戒故上品發心期在白四納三聚也後於正羯磨前又云今受此戒成就三聚戒此名上品心妄執者言今白四受為後方便好細詳此文趣三解脫門正求泥洹果即斷惡修善二誓也又以此法引導衆生令至涅槃即度生誓也令法久住行已度生護法此三出家本務三中度生最要所以此文及羯磨經並引多論起慈悲心專在救攝衆生後第三羯磨之前又囑云心緣救攝衆生并護佛法是知度生護法為僧己任庶使正法久住於世今欲受戒若不先建此心何能納法亘周何能起行彌博白四雖是小法發大故即納三聚此本宗通大之義也又羯磨經上卷受戒篇正授戒體前云薩婆多論云凡欲受戒先與説法引導開解令一切境上起慈悲心便得增上戒乃至汝無遮難定得受戒汝當依論發增上心所謂救攝一切衆生等細詳此文引論起慈正為白四受具是為上品心而納上品戒此經立法與鈔一同鈔敘發心而列三品上品一受直納三聚此經不列中下唯明上品引論起慈乃菩薩大心意令即納菩薩大戒文中即無起慈為後方便之義世中妄言之人皆考文之不細也業疏三下釋前經文云此之戒法出家本務素非懷大定難容納深有由矣此文贊美經中引論起慈正合機教教即此宗義當大乘鈔中上品一受正本此義凡大乘明行度生為先機即假宗知權不滯小果直趣菩提然成佛果先須度生據斯機教建立受儀所以先令起慈若不預起慈悲大心何以納菩薩大戒正合出家本志故云深有由矣文令境上起慈悲者以行慈救攝衆生故此釋經起慈受具唯在攝生也如善戒經菩薩戒本七衆所受者是也引經證顯比丘受具即納菩薩大戒七衆既許受菩薩戒今比丘受具受菩薩戒決無疑矣此三句文即是引證之語世人不曉妄謂祖師令依善戒次第而受今之受具為後方便余將經疏參合鈔文從前至後子細詳考即無此義且如鈔中三品發心皆為受具豈上品一受反為後大方便又依律立法為成受具而發心起慈反成後大若謂記中有此義者然今所立唯以祖師之文考定祖師立意記文或得或失未可一槩輒便依用向不緣慈如何容大意在後者此即前素非懷大等義以正受望發心故云向也發心望正受故云後也問鈔明三品發心本何教意答本四分也蓋此律義通深淺本教立法故分三品下品一受即本律兼淺之義可收有門中品正是本律空門之義既達法空融通無滯但此門空義亦通深淺故記主云深取大乘空義故名經部師等淺屬中品深歸上品又復分通之義亦通深淺淺收中品深當上品是則中品亦是大義所以記中將對相空小菩薩位義可見也上品一受全是大乘雖屬分通乃通佛乘故鈔問云此教宗是何乘而發大乘志耶此問正決上品大受答此四分宗義當大乘戒本文云若有為自身欲求於佛道及回施衆生共成佛道據此問答一證上品是本宗分通義二證上品全是大乘問鈔及經文並引多論慈悲之文未知何意答為成上品受也上品三誓為成三聚乃大菩薩之發心必須慈救為先是故引論令先起慈也問慈悲之文遍諸大乘何以獨引多論耶答今立受儀乃依律部故引律論乃顯律中亦有慈濟受大之義也問多論小教而云慈悲未審何意答亦分通義如濟緣云施小為大無非分通故諸部之中時有斯意但四分立教宗旨灼然等是也今上品受正本分通引彼證此不妨合轍問資持云上品心為扶成本宗分通義是何意耶答本宗分通雖全是大不明發心納法之相故立上品明發三誓成三聚戒顯出分通納法究竟也問據大教中受菩薩戒不出二文梵網頓受善戒漸受今依律受大恐成濫作答祖師立法一推教意二體佛懷豈為濫作然教門之頓漸大小皆佛權謀祖師所謂斯並隨機設化當尋本據且諸佛傳授戒唯一乘如來出興亦欲唯以一乘而為化本寂場頓受二乘不被雖鹿苑施小而志唯在於大小智狹劣且令受小智若明利不妨受大於小座席有得大益者亦佛不思議力而使之然既得大益志必遠大不泥法相不圖小果此即四分通大之旨祖師詳此教意豈唯局在別脫故立上品起慈發心而納大戒彼之善戒乃被漸入之機又與四分旨起不同彼乃大中論漸對梵網得名四分受大乃小中論頓對小中漸機得名故所異也如濟緣云假宗知權不住方便者是也問前云業疏引善戒七衆受大而證比丘受具得納三聚且彼經七衆所受自屬方便今上品受即納三聚義與彼別何得引證答據彼經云欲受菩薩戒者先發大乘心受七衆戒既標欲受之心又發大乘之志雖秉五十具不妨自得菩薩戒彼經被漸入之機故以七衆而為方便後秉三聚方為究竟今之引證非彼方便之義乃取七衆便得受大而證今受也問白四言下既納三聚別脫篇聚何時而得答既納三聚何法不收三聚法相如前答芿師文可見豈有別脫而不具耶當知菩薩三聚出家人受為出家戒在家人受為在家戒梵網通在家出家二衆所受善戒唯出家人受所以業疏引善戒為證即此意也但引彼證非依彼受如前已決問上品既納三聚世中何云依善戒為後方便答從古妄傳蓋失考文今特引鈔及經疏受緣之文詳細注釋欲使學者知祖師所立非為後受方便請詳究文疑必釋矣問受緣大受是圓義耶非耶答上品雖是大乘未為圓義乃即本宗分通之大也又復鈔經乃業疏前文雖有明大乘義並非立圓決通之處唯義立圓會小即大唯見業疏出體文中講學之家不細考文凡形言句並無分別良可悲歎問受緣上品若非圓義何以記中約圓消釋答祖師建立義有次第前且依宗立法後方立圓決通若就文考義前後自殊若以後決前前所立法無非圓義記主既得圓意不妨以圓釋通庶使來者依圓行受問上品大受納法既周後更立圓何益其事答上品雖大猶屬分通義雖當大教終屬小又上品之名慈悲之語並出小論故須立圓決偏小教行即一佛乘顯出分大究竟圓妙故濟緣云為成本宗分通義者是也問祖師立圓為通空有唯圓四分耶答據論立圓通圓空有立法既唯依四分所以且據所承為圓四分也又復四分教義兼該深淺所以才圓四分便可兼圓於有門也問業疏立圓之後引律分通文證鈔中上品心後亦引分通文證未知何意答兩文所引其意自別鈔中直引其文文在前引乃證上品即分通義疏中先以圓融會云大小俱心律儀不異方云何況四分通明佛乘等斯謂以圓決小無小不圓何況四分通明佛乘以圓決顯何疑之有是則鈔疏兩引義意天殊問依宗立法尚無後受之疑況又圓決宗旨甚明今時臨受高座廣談或謂依善戒次第而受或引四重樓閣之喻或謂祖師立圓開解受小逗會習後受大學功既淺説不知源玷辱宗門為害不少請為決明使開茅塞答詳考圓宗章中決制法融境緣明作法顯隨行無非以開顯義融會教行開蕩執情使其依前受儀圓導圓開圓受圓持緣境則徹三際亘十方不離當念納法則即三誓納三聚只一唯心豁開五義分通揭倒四重樓閣方見吾祖教門若秋蟾當空了無滯礙矣問或云一乘或云三聚其義若何答一乘據體之廣大三聚約攝法具周究竟廣博故名一軌持運載故云乘三聚之法一一皆究竟廣博一一能軌成運載於差別中了無差別於有相中相不可得微妙圓融絶思絶議前受緣中上品之大雖具斯義而未彰顯後圓宗中決顯受隨無非唯心方彰三聚圓妙之義文有先後義有淺深應須細究
