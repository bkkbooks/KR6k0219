body:
  text: 四難云雙單難辨者㭊云久聞師意唯以制中有開法聽中有制法如離衣造房等方具二持犯如斯立義特捨通而執局唯屈祖而罔時今乃先錄祖文然後立義釋疑戒疏云止持對制門可學事中制必作者如衣鉢體量也言可學法者制必須作如三羯磨等又問云此止持中但得守戒而已若有作者便同作持今明作者豈非合亂答今言制作即成止持若不依行則是作犯今順教作便成止持如三衣一鉢法須具有故制畜之豈非作也望無犯故名為止持依教奉行又是作持乃至云具二持犯其致在茲近有同輩指上一節之文是明心用持犯以下若據教行等文方明教行此無稽之論不足可道行宗云為欲顯示雙持犯義發揮云雙持犯義理在茲矣此二記文並是釋上同答等文之末疏又云若據教行必托境生依教奉行作而無犯何者是耶且如三衣教遣備具夢庵謂此中明三衣等者乃是預出離衣戒持護離失之義今有隨流之者猶以為是豈為識達耶不敢違悔名為止持如教䇿修順行不犯名為作持違此二持便成兩犯又云言可學者並制修學事謂衣鉢等法謂教行等並托事法進用修成而無違犯名為作持不敢違越又是止持又云前對惡法無由可作名為止持此就善法必不違越名為止持鈔中制止門中云如衣鉢體量等制作門中云法謂教行也教謂律藏行謂對治事唯可學衣鉢體量等是云云觀上祖文豈宜偏局須知但是制作聽作善事善法造境䇿修或有違順具二持犯制作事者且如三衣比丘道具制必須作其於臨事營理當須觀量財體染淨色量如非依佛誠教而作即是作持不敢違教即是止持違越而作即是作犯不順教故便成止犯若一向不作但有止犯難成雙義制作法者且如說恣結受等欲行羯磨應須評量人法事處如非審定綱骨緣兆是否撿而行之作持成矣望無違教止持成矣不撿冐為成於作犯懈惰違教成於止犯止作兩犯名異體一二持亦然並就一事相番乃成祖意如此且非臆說制作事法如上可悉不作斯論盡成虗偽聽中事法疏鈔具彰恐有惑者更為明之如疏止持對聽門則以房長淨法等出相作持對聽門復以房長淨法等出相豈非但是聽作善事善法皆具雙持故發揮云順制聽兩教中制作聽作邊說有二持反此無聖教制作聽作者並是單持行宗云是則一切作持其必兼止若但止持未必有作自餘羯磨依鉢等事並見廣律文舉三衣其相甚顯此等誠言與夫疏鈔恰然相同只緣祖師文義坦然致此二記用與無改何故特異反成破斥巧事一時之唇吻搆裝千古之謬辭翳昧後昆誰之過耶彼之徒以為正說此宗義士尚有隨流稍逢如上所錄祖師明文如何消遣問如斯立義亦所未安戒疏明云無聖教聽並是單作豈不然耶答子迷此語故成質礙今為通之自然明曉言無聖教聽者聽即是許有聖教許作者莫非善事法乎並是雙持無聖教許作者無過惡事法矣盡屬單持今文云無聖教聽乃是婬盜殺生等不許作者之謂也反顯衣鉢羯磨等有教聽作者皆具双也疏云可同殺盜有教開作名作持耶會上諸文疑自釋矣已上示通義此下問答及㭊彼義中用別義也問若依通論則制聽二教事法皆然祖師何獨明二十六戒具双持耶答此據戒本有開制羯磨法者故就法上歷顯四行唯二十六有法可歷彰於雙義餘並單論戒疏隨篇精揀數極於此不可妄通故得行宗云此據戒本具雙持犯者餘並單持豈不然耶其於戒疏總義通論持犯則舉衣鉢及諸羯磨者豈非雙持犯不局戒本耶隨篇且據有法總義通論律藏故行宗云自餘羯磨衣鉢等事並見廣律者也源流正傳妙若於此未裔監觴豈宜輙議問過量房戒事上雙持既別無法如何更顯答祖師自云就房事明何關於法所以二十五戒例於法上顯雙持犯唯此一戒重就事明者乃有二義一者事法相對法就處分以明事就度量以顯如疏云此則約其度量顯於違順及論結犯並據房成是犯分齊二者房是聽事就一房事明雙持犯則顯一切聽事並可雙論若爾雨衣瘡衣亦是聽事何不具雙答此之二戒固是聽事戒本不列者無法可歷故所有尺量之文乃約造作邊自成雙持義在通論也又如過量佛衣過量坐具乃是制事尺寸數量自屬制中造作違順明二持犯戒本不出亦歸通中如發揮云制作聽作邊說有二持又資持云教制奉行或事或法或制或聽且如三衣等然斯二記並約通論文義可見為不了者更略示之二十六戒並聽中有制法如造房處分等制中有聽法如離衣羯磨等緣有此法故就法上相從歷顯持犯四行雨衣瘡衣等此聽事也佛衣坐具及毛綿等戒並制事也如是諸戒各於制聽造作順違邊論於雙義是故戒本唯據有法止二十六餘所不出義婦通說問犯雨衣等戒還得一罪耶二罪耶答如上略示諸戒推詳戒本或因求畜違限或因造作乖方既各違教制豈無違教心犯罪耶是則順成二持違得兩犯如前已示可以明也但以無別聽法戒本更不重出也若爾過量房事如何重示答請觀前文具二義故故須別顯四難指尺量即法以成雙義此由不究通論之意故此妄釋問上云二十六戒並就法上歷顯雙義至論結罪還就事耶還就法耶答事法相假乃成本罪且如雖不乞法若不造房難成其犯要須造房事成邊全於不乞之罪如疏云此之不乞及以過量緣雖兩望果由房結離衣入聚等可以例之如云身違事合名作犯等問如上立義須於造境造作違順方成持犯者此領何義答如疏云若據教行必托境生又云並托事法進用修成又云如造房衣鉢達相了知等及諸篇總義皆就造境違順以明持犯行宗釋緣雖兩望果由房結二句云既有二作必兼兩止並望身業造作過量具兼四犯又云業不自有必假行成行即行心無非造作若都不作但是無記焉能成業明文更廣恐繫不引斯示文義次㭊難辭行宗云自餘羯磨衣鉢等事並見廣律四難云若此立義敢問與二十六戒有以異否云云㭊云亦同亦異若二十六戒有開制羯磨則與衣鉢等異若論持犯雙義則同何者且二十六戒則就羯磨法上以顯雙義衣鉢羯磨則就制作度量上以示雙義豈非同耶四難云今不作三衣或體量不如及不行一切羯磨具二犯否若云須具比前諸戒理有不同云云又云今不作三衣則有事上止犯若望不依教邊結法上止犯者二犯同名不成雙義㭊云不作三衣及不行一切羯磨但有止犯不成雙義固不在言須約造境營構或三如違順或四緣是非方成持犯乃有雙義如上立義示相可了云云之文不攻自破四難云若爾疏引衣鉢體量一切教行歷顯雙持那云不具答衣鉢體通單雙須簡故文云若據教行必托境生依教造修作而無犯今不作衣是不造境但有事上番修止犯若論造作如非亦有商量且如衣鉢體須聖制衣以麤布鉢須瓦鐵今用絹木則是體乖聖教正屬作犯既無教聽無法可止故無止犯乃至云此據造作以顯單犯既以造成理須加法今不受持准鈔得吉約義定之此屬止犯既無造作作犯不成既加法已必謹護持有緣聽離要須乞法今既不乞即是止犯違教故離又是作犯方成雙犯若此以明衣鉢行護必具二持前註云夢庵約持護論者文見此也㭊云觀此一節要以疏中衣鉢體量等文即就乞法離衣上明雙持犯乃是預指離衣戒非就造作以論也如此看讀豈為上達如此樹文從費紙墨戒疏明云今言制作即成止持若不依行即是作犯今順教作便成止持如三衣一鉢法須具有故制畜之豈非作也望無犯故名為止持依教奉行又是作持乃至云具二持犯其致在茲若依彼意此等文相如何消釋及撿離衣戒雙持犯義但就羯磨法上歷顯四行則與前文略無相似所言既無聽法故無止犯者且無主房事上雙持豈有法耶可細思之四難云問文云且如三衣教遣備具正據造作豈唯行護答文相含畜裁斷實難若約通論義含造作云云㭊云今詳彼立問雖符義答又乖文疏云不敢違侮名止持彼作二意註之一意云如體乖佛制不敢造作彼文此謂不作名止於義甚疎今與改云佛制三如違則犯罪今欲造作順行不犯也一意云不得羯磨不敢擅離彼文此又不然此制門中於造作邊歷顯雙義妄將聽法註顯可非雜亂耶疏又云依教䇿修名作持彼亦二意註之一意云如體依佛教如法造作彼文此如其理一意云有緣欲離從僧乞法彼文斯由穿鑿全非祖意制聽雜亂如前已明又復彼謂止據不作作據䇿修此論二持名異體別是古師義如三十義門已破今雙持犯止據造作離過作據依教䇿修名體不監今義成矣只由不善思文故有胸談臆說如實自昧其猶可恕知而故違謗法咎深彼又云若約翻犯則造作邊單有作犯無別止犯是何言歟翻上二持以成兩犯四行足矣便顯造作自成雙義如何強云無別止犯此非謗法乎彼文更廣不必盡㭊識者觀之自成無用四難云問離衣有聽可云雙犯房事過量有何聽法答量雖佛制是佛所許雖無現作之法然有尺量之文即此律量便是聽法此法與離衣等戒羯磨不殊㭊云然房之有尺量者乃是聽中制作度量也豈謂尺量便是聽法若便是者聽中又聽是何佛意又復尺量若是聽法者則與處分白二何別若云是同祖師不應事法分二耶且衣鉢亦有度量可是聽法耶疏云就房事論何甞言法全成戲論略無可探繁文雜義顛亂難㭊總究彼文則有二意一惟約有開制法者屬雙持犯局二十六戒餘則不可二將戒疏衣鉢體量等文迃曲釋歸離衣戒非就造作以論其文雖多不過二意如上引文立義明如指掌公心看讀可自鑒之義假文顯莫訝觀縷右㭊雙單難辨竟四難云止作難明者㭊云彼以教行雙持犯隨戒本罪屬於止犯樹文立義云云久矣隱連二師雖詞而闢之其奈狐疑尚擁再有此作誑惑脫生為害不少今亦先謄祖誥然後立義決疑使止作不濫根條自分疏云就房事明依教不越止持撿教知量作持出於教量作犯不順教故止犯次就法辨如法無違止持從僧乞法作持故違不乞作犯即此違教止犯止據無違作據順教乃至問云準此持犯與前既乖約事明作身營可悉故犯僧殘約法明作其相如何答此之過量及以不乞緣雖兩望果由房結對相思事隨有四違纔一舉乎營稱土木即有偷吉四罪隨生安有過量偏屬作犯若如此問後戒無過無作犯矣準此誠例身業是過行宗云此約方便二作犯兩蘭二止犯兩吉又云並望身業造作過量具兼四犯發揮云四罪釋上四違謂作心不乞造過量房結二蘭與行宗同知是妨難二處得二吉與行宗別又云知不乞罪是僧殘鈔云但不依戒相造行成辦悉名作犯所對事法怠懈不學為止犯疏又云如有羯磨說麤罪是作持不違教說名止持無教輙說是作犯抑教不求止犯云云審詳祖意定以教行雙持犯隨戒本罪結屬作犯何者是耶如上所引不乞過量並約身業造作違越而成得二僧殘在文極顯何事遲疑疏中又云出於教量名作犯此戒本云過量作者僧殘是也又云故違不乞名作犯此謂不乞屬作又云由於僧殘有乞無犯反顯不乞犯殘據此二文不乞屬作犯殘明矣正同戒本云不將諸比丘指受處所僧殘者是也疏又云既從僧乞名作持於僧殘罪欲犯不得名止持請以此文翻持說犯豈非犯殘屬作犯耶又如離衣入聚等不乞羯磨不作白知更不離衣又不入聚可獨結法上止犯罪耶由不乞不白擅離擅入約身業輒為成於本罪事法相假此罪屬作止據違教通得吉罪二十六戒及一切制聽事法皆例此明鈔疏文義明如皎日記文申釋意亦無昧彼何特異強生分別剛欲伏從奈道理迃疎從之是難斯提大略問答㭊難更為明之問鈔云止犯心中有作犯如人畜衣過日造房不乞収作歸止屬止明矣又資持云作持止犯但引房長可不然耶答此止犯中列聽作事者乃顯双持犯義但止就離過作就䇿修故為二持犯則反之也如上聽止中以房長出相聽作中亦以房長出相即其義也況引鈔文乃出通塞二犯皆通止作無在若爾戒疏三十義門云九是作持止便成犯據此之文屬止又明答若觀大意文亦無害良由此九具雙持犯隨舉無在何苦執文又復此且一往就䇿修奉行名作持違教不作名止犯及下分釋止作自明如說淨云故違不說名止犯越於期限名作犯至論結戒本罪正據違限故戒本云齊十日不淨施得畜若過者尼薩耆波逸提又取尼衣云番止受納名作犯及於戒本正約貪心受納結於本罪據斯以論教行持犯若就持說則以作持為本如云依教奉說名作持又十三云撿教知量從僧乞法皆名作持若就犯說則以作犯為本如云約事明作身營可悉故犯僧殘又云出於教量名作犯如上云越於期限身違事合又疏前文房衣財食作法而生近表作持遠防作犯等如斯引示作持作犯雖非相番道理當然明文朗義屬作顯矣問戒疏云有人解止犯位中對教不學則唯八句除事法俱識也對事不學九句通有如造房舍衣鉢雖達相了知何妨不乞處分受持加淨皆獲殘提等罪豈非止犯屬於本罪鈔中止門文亦同此答子迷久矣前雖㭊顯猶乃執文且止犯位中所引房長衣鉢由屬雙持故得止作皆列文中雖云不乞乃屬止犯及犯僧殘還據作成如前引示文義甚明衣不加持長不說淨正屬作犯指提顯然何為執此妄云止犯當知此文所引別有其意蓋由造房不乞衣鉢及長不加不說皆因不學愚教疑及不識犯根本殘提更得不學無知下品一句既識達教行但犯根本無有枝條疏鈔特舉為顯下品有本無枝之義須知句法為顯何事豈可將出相之文便同本位結犯只緣教眼不明看讀多滯文相尚有聞義不能從者其奈之何如辨止犯名義中又為明之四難云若謂作犯且四行不乞犯殘判歸止犯云云由此諸戒本屬作持正翻止犯傍収止持翻屬作犯㭊云疏云故違不乞名作犯何云歸止耶由此諸戒並據依教策修為作持違教輙作為作犯如上以示此非相翻道理當然四難云若謂止犯且造房過量足食杖囊等並據作成何云止犯今准行宗定屬作犯故釋二房偷吉云二吉止方便二偷作方便乃至云若作此定之向引明言教相皆有相違㭊云行宗正順明言教相即非相違何耶疏云約事明作身營可悉故犯僧殘乃至云不乞過量緣雖兩望果由房結亦如彼言足食杖囊並據作成非誠言耶四難云故知本罪定屬止犯戒疏文云翻修止犯挓相具九如九十中不作教法輙行輙食輙語輙取等云云㭊云只由不觀疏文大體句法之作是為何事故有妄消文相誑惑學從然不知止犯位中番不解得不學無知番不修得違教之罪此二止犯罪名相監故須顯示如上問答義已條理今此文相連綿重分句讀音逗文云不作教法者此句正得違教之罪屬於本位止犯如疏云抑教不求名止犯是也輙行等四正犯根本乃歸作犯又疏云無教輙說是作犯是也由此諸戒不作教法輙造前事止作雙結止據違教作據身為今位正論止犯必須雙列四輙故結歸云望不作法名止隨作即違名作在文自顯何不釋然四難云若爾諸戒有法可止故名止犯無主房中過量之罪就事論犯犯是作成文云過量作者僧殘准此作犯明矣何云止犯答事雖在房犯還據法乞法驗量皆是作持不乞不驗並屬止犯准此不乞處分不依教量二犯屬止皆結僧殘故違不乞故出教量二犯屬作並結吉罪㭊云所言事雖在房犯還據法者正與明言教相實有相違疏云緣雖兩望果由房結又云纔一舉手營構土木即有偷吉四罪隨生准此不乞過量並就房事成時雙結二犯何言據法耶所言不乞處分屬止結殘故違不乞屬作得吉者兩句不乞是同何強分二又此不乞屬作屬止結殘結吉如此顛亂是何見解祖師明云故違不乞名作犯何言止耶又云即此違教名止犯何甞將不乞屬止耶鈔云若不乞法便結僧殘誰言吉耶彼又云故出教量屬作得吉者是何言歟此乃正就過量房成結作犯殘不應得吉文如前示義亦可領後諸問答盡是如峨投火如蠶作蠒自焚自毀自縛自纏若得上義不㭊自明誠由只攻他短不覺己非祖誥明規不肯依奉輙乃巧生穿鑿樹文立義云云極多既非教意盡是閑言伏請高達審詳祖訓莫看人情右㭊止作難明竟四難云句法難定者今㭊云且事鈔戒疏止作句法破古立今分句節目明如皎日資持行宗依而申釋問答決疑又加分曉如秋水映日表裏明營彼言難者只由不依祖教強生分別使直而却迃明而却昧如日之被雲大地昏暗雲之過也而言新記尚有失者請陳失相且莫背後捻拳浪稱勝負矣右㭊句法難定竟四難云事法難顯者今㭊云所言教行者該乎事法也何耶且制作聽作善事善法等有教令作即教依教行之即行如疏云並托事法進用修成又云莫過事法等云云四難云及論二房乃云事法分二有人准此別立事法雙持犯義乃至云則子所立自成無用等云云今㭊云有人之義未知是誰便依彼立事法雙者亦無大過如上所引可以自通又如就房事明次就法論豈非事法耶言教行則通也言事法則別也収別歸通名於教行從通分別可云事法又復應知就稟教行行說名教行若就造境說名事法立為事法理之有在何強撗攻此門文繁且無急要恐費紙墨更不盡㭊覽者宜詳鑒諸右㭊事法難顯竟徵顯定道二戒定共道具有漏無漏總別解脫諸文之中或就機揀異或發體有無或約證之有聖凡而於修之分理事文義交參學者難曉今為敘之更不分科廣陳由致但直引諸文令知差別略伸問答以決異同業疏三下二紙云定道二戒約心論業別脫一戒從緣發生記云定道二戒不從緣受隨入禪定斷惑證道任運發起故名定共道共亦名禪無漏對下別脫亦名總脫又疏十二紙云八者隨心無作入定慧心無作常起如成論云有人言入定入道有禪無漏律儀出定則無又云出入常有常不為惡善心轉勝等記云定慧心中所發無作兩宗不同兩宗即上成實二義事鈔中一引多論云木叉戒佛在世有希現故勝禪無漏戒一切時有二有漏木叉通情非情寬故言勝餘二局情狹故不如三有漏木叉從慈心發故勝為佛道作因四木叉戒者被及七眾紹續三乘三寶三道住持功德餘二無能故劣五木叉戒者唯佛弟子有餘禪戒者外道亦有記云定道從心為因與定慧二心同時故並言共亦名為俱此辨名也二別定並有漏道共唯無漏別脫欲界業定共上二界業道共非三界業此論體也三別定通凡聖道共唯局聖此位分也四別脫假緣受定道隨心發此明因也五別脫但隨身要期盡形故定道名隨心生死不絕故此示功也又鈔引成論云一日之中受七律儀隨得道處更得律儀而本得不失勝者受名又戒疏一上五紙云如論所引道戒名解脫事戒名別脫等問定道二戒發戒體否若不發者何以前諸文中並云發耶若云發者何有白衣羅漢耶答所言發者乃於昔受體上增發勝解前若不受無體可發如白衣羅漢者是也若爾白衣羅漢全無戒耶若既無戒何生定慧答必有五八之戒為其行本或往世曾受習氣相連入定道時任運離惡故名定道戒也且據今生十具無因故不發體與俗是同故名白衣也若爾破結一受何發戒答此蓋前有要誓期在證果感發具戒不同定道前無方便復無要誓體無從發但於前受增發勝能如前成論云本得不失勝者受名是也問戒以對境防非為義入定入道何得名戒答如入定之心具二義故一者凝寂此即是定二離非惡此即是戒體是一心二不相捨名定共戒又如入道亦具二義一者虗無此即是道二離非染此即是戒二不相捨名道共戒須知戒義由昔曾受別脫無作功力於藏識中任運離惡故名戒也若爾離惡名戒何以前引諸文云發無作耶答前云無作發者由昔戒力隨其道品任運增發無作非謂有心稟受別有體發也如前可見問何無道共定耶答亦有此義入道之時凝寂不散即是定義蓋因修三學果上證道亦具三義隨位進登勝則俱勝問言入定入道者定有出入義則易見道體平等那分出入答小乘所證於事未融其入觀也人法俱亡與道體合故云入道及其出也不無事礙故云出道若爾出觀之後都不合道耶答既證聖位動必合道但不如入觀能所俱亡藥病皆捨猶如虗空了無罣礙正與道體合也若在大乘出入皆如故非所辨若爾前引成論出入常有今何分異答須知小乘增進果位並於入觀見其深淺戒與道俱亦從觀判故分出入增發戒德隨心無絕故言常有也問前引鈔云有漏木叉通情非情定道局情其義如何答有漏木叉五八十具遮性通禁是故戒境通情非情定道離惡境局有情以遮境非情體非惡故問前引資持云別脫欲界業定共上二界業道共非三界業此論體也所言體者未審何體答乃戒之本體也謂別脫戒教限本體只是散善依此所修止生欲界定體凝寂依此而修生上二界道體虗融依此所修得證聖果若爾別脫全非道耶答此有二義若據教限戒即散善若約機修隨其行力有事有理兩凡薄地順戒集業是事亂故若登聖位以觀融行戒屬無漏前引婆論指別脫為有漏木叉又資持云別定並有漏者乃據教限判也如戒疏引伽論云戒是有為有漏世間法者是也問總脫別脫其義若何答定道二戒入定道時總離諸過故云總脫如戒疏云舉法類遣是也木叉一戒對境起持別別離過故云別脫問律儀據教戒乃屬行定道二戒乃據行論可云禪無漏律儀耶答律者法也儀謂軌式定道二戒由昔受戒法無作功力任運軌範防非故亦得名律儀也問道共名無漏律儀何分同異答約位體則同以義推則異何耶道俱及別脫名無漏者並據初果已去此位同也皆以無漏慧為體此體同也道俱乃約入觀之時任運離非以得其名別脫據位見理雖名無漏至論離非還須對境約教以論也如初果故遮悞性等豈不然耶此為義別也問行宗記一上十一以道俱戒指同八正道中語業命三亦是道戒其義如何答不同也豈不曉語業命即是身口意前引業疏定道二戒約心論業入定慧心中任運發起而與身口意戒天然有異何得指同但由初果已去見真諦理所修三學皆得名正亦名聖行亦名無漏功德至於諸戒不同凡地歷事別持約具總論云語業命乃就三業攝一切戒即是在因所受別脫行與理合持無所持業非界繫名無漏戒也問定道二戒既是前受無作發現即與別脫體相是同何以前引鈔中特分優劣答推究來因必由前受功用既別教門不同豈無優劣如上略明一見定道發體無由二知道俱與破結及八正道戒義無相濫三達道俱無漏與別脫無漏名監義別會諸文之異同顯行相之深淺豈無益於學者乎略辨正用相從正用相從者壇上教師入眾白召一白自恣五德出眾和僧一白此二為正用羯磨師對眾問難一白捨墮懺主和僧一白更有上闌懺主和僧一白此三為相從上之五法僧須滿五方堪秉行於五人中四正是僧故不在言今所論者唯論第五秉法一人耳正用據全具僧能相從約少分入數大論僧能略有三種謂能秉能量能忍也如教師白召能秉一也彼受戒事既與教授必量可否能量二也彼既應法事合忍可能忍三也是則教師具足諸能正充僧用五德和白法是能秉彼自恣法亦同量可亦同忍成三能既具正用亦然問既全僧能身外三人便遂前事何須五耶答為釋疑故如白召一法若唯四人則疑三坐一立坐立既乖僧數不滿何秉眾法白和一法四雖皆坐恐疑五德既是所差何足僧數大聖懸鑒欲除疑情制此二法五人方行言相從者如戒師問難懺主受懺既並在眾無宜輙作故須作白告僧量可問僧忍否如戒師白云聽我問難懺主白云聽我受某懺悔義可見也但此白法非別人可秉乃具能秉一義故得相從入僧數攝略述如斯餘義具見疏鈔宜自尋之略議第七非體第七非體古今未定今略出之還對前六次第簡顯方見其的且如初非總括四緣第二唯據人法俱非三下四位亦唯人法如非互作唯第七之非四緣無乖作而依教是故經疏皆標如法也七雖如法至論非體唯據得呵人呵止不止別也故疏云無問情涉違順緣通是非德人吐辭義須依住住則是別法不可非不住乖法人法俱非疏文法雖如法人雖德人想差見別謂是為非臨事迷到聖猶未免況在凡乎疏文情涉違順之語正對古義第四師云約人明呵情不同故此謂能呵情見異也約法不止欲同詳秉此謂眾僧執法為是聞呵不止也今不問彼情之違順既是德呵自合依止不止成非故濟緣云然止順呵故法不非即如法別不止違呵故兼法非同非法別此之兩相即非體矣文問止與不止其義自別何得共為一體答斯謂七下義兼二種及正論體唯歸其一止以如法別為體不止以非法為體問經中但云呵不止羯磨則應一種為體何得兼二答據文求體乃有二種蓋七文下註止不止二義別故所以疏記兼二為體約非考體只有一種謂非法別故得經中但云不止二皆有以問詳斯二義與前相濫若如法別即濫第四非法別者同前第二其義若何答上以前六次第簡顯已見第七與前非濫子猶未達故與此問須知前二白此為彼法體全非七本如法德呵不止故成非法其義自別前四以白此為此為如此七順呵即止為如相亦無濫問法之如非其異可知二四及七皆云別眾豈無濫耶答別雖有濫對法如非前後義殊若就文簡不無少異前之言別具兼不來等三七之言別唯據德呵一種而言也今更因簡前六濫非濫別問中間五非人法二種與初非中人法何異答在文所列前後無濫恐入捨性更略述之二三法非白此為彼如戒場衣界雖白二中事不應一法前後各牒白四單白各牒亦爾若白二牒白四事單白牒白二事並初非攝第四如法反前可見五六二似誦文無差但倒作故此亦白二白四當體自倒不通單白若三羯磨全法增減互倒並歸初非前總後別尋文可見若論人非五種並指三別初非中人自論僧別舉相與五不同又二三兩位非法雖濫人分和別交絡出體人法俱非為第二體法非人是為第三體法是人非為四非體五亦人法俱非六亦法非人是問非法別中德人不忍呵則理當如法別中德人何呵答事法雖如人處有異況呵起情見見有萬差是故呵相不可一定德人既呵或來或欲不欲人乖四準法為非法若爾何名如法答白此為此豈非如法就體立名故標如法約緣定法還入非位略辨如此餘見疏記淳祐壬寅歲華嚴閣下出辨略教結犯略教結犯汶州訥庵脗師章門中第列三家一云未落廣教者但心違三善未犯廣教小罪先犯略教吉羅廣教有犯則無犯略此則但以廣略二犯結有前後以出未落廣教之相又人云略教唯被利機當須常爾一心守護三業勿違三善微有懈怠之心似涉有違之意即結違略之罪又自徵云與瞥爾何異答云瞥爾據初念違略屬重緣又云與律中發心心念何異答發心惡覺乃對前惡境而起今此違略不約對境微有違心即結其罪此約起心對境不對境以出未落廣教之相又人云今此略教利鈍俱攝不可唯約利機以明等未審此師約何明於略廣之義已上三師並未詳究疏記略教結犯之義故此意言皆非可取脗師云違略結犯唯就利機而論廣教約鈍明犯又引四依四開為例上根遵四依本制中下遵四依四開聽教可證上利根唯奉略不稟廣鈍根唯稟廣不稟略此師雖云利鈍各稟未明約位復昧兼通又復四依開聽通被三機俱為道緣廣教一制三根俱奉豈有利機唯稟略耶道緣制法義不相當何得例同今之所立先引疏記後為決明戒疏一下十八云未制廣前有犯略者心違三善不貪不嗔不癡況制廣後而無犯耶據疏所定犯吉羅也行宗問云此明犯者犯在何時有云隨犯廣制更兼犯略細尋諸部及悔法中都無此說未可準的意詳心違三善未落廣教隨七佛偈所詮行相有違即結詳此記文語意通漫學者遲疑今依此文更以四意決而明之一究七偈結犯之相二定稟略是何位人三明二教被機通別四伸問答略決疑擁一初佛偈唯戒忍辱忽被他辱應忍不嗔起嗔返報即是違犯二佛偈制離險惡險惡有二世間來報分之全身修道二皆遠離苟不念離非貪即癡三佛偈戒不謗嫉知足精進謗嫉即貪嗔知足由貪犯精進多癡違四佛偈乞食戒多求違則因貪癡於眾慎增愛返必在貪嗔五佛偈戒輕縱放逸放逸雖通三業以心為業主故偏戒之違多癡慢六佛偈止惡修善常戒觀意苟有縱墮無非三毒七佛偈戒調三業能調是心於心有違即是犯略上且據文以三毒別對諸行若論犯時不無相兼二者諸文雖云略教被利利亦通於淺深更以二意定於稟略位必內凡初且約義佛成道後五年之內善來三語所度之人非聖即凡聖乃初果已去凡即內凡位人故說略教普被聞修次據文定經中初偈明言於忍第五放逸疏判增忍舉二例餘則七偈行相非內凡而不可及也且內凡四位煖頂於行尚有退失業疏引多論云於戒不羸始終堅固知是內凡者乃忍及世第一也前二行淺違略起非故佛為鈍制廣補之若據二教本制之緣略唯被利廣為鈍興末世多鈍略本無用但以時雖不競機變難倫儒中尚云五百年有王者興十室之邑必有忠信況佛法中聞教開解待時托緣悟入前後豈容測量略教末世豈無當機之人故疏云微被少機不可不用又云且順別機故須後說略教行在內凡末世既稀故云少也間有依奉與鈍不同故云別也三者諸文或有二教通被利鈍之語及疏四下云故列七法同成一禁又云通有攝心之能理須齊奉故曰是中應當學文雖云通被而有當機不當機之異雖云齊奉而有結犯不結犯之殊且佛制並陳意使齊奉豈簡利鈍況七佛偈攝心入道之要前機誰不願依但行功既淺力分不堪機教既不相當有違不名為犯不妨微有攝心之益故曰齊奉利是當機聞必依修違定結犯理當然也若論廣教起雖為鈍一制之後聖凡利鈍悉須稟行違教結犯未見開利阿難懺七吉羅豈不明耶四者問內凡利器唯稟略耶兼奉廣耶答廣略俱也豈有上根故違教制如上已明問未落廣教其相如何答鈍根之人略非當機違則無犯故不須論利是當機違有濫廣應究起心對於二教犯相自別犯略之時於廣無違故云未落也或可違略縱心自此滋慢致後犯廣初違略時未即犯廣故云未落也問利機於廣如何持護答據事鈔持犯篇說內凡等人持奉別脫名護根戒此但通攝六根故也問約心持犯為重緣為瞥爾答且據教限為重緣也向在日山曾出今於福源又書且略提利鈍廣略相濫之義餘見疏記以洛北觀音寺之本補寫上本一卷因以彼本校讎悉竟則亦句讀訓點畢旹寶永六秊龍集己丑無射十六日老比丘宗覺誌
