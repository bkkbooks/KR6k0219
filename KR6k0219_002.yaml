body:
  text: 教觀撮要吾祖弘律以妙觀為本蓋準律中佛制比丘觀念對治方能入道故曰常爾一心念除諸蓋違則結犯但律中觀念皆屬權少祖師克究佛懷深符開會直依攝大乘論皈敬儀引知塵無所有空觀通達真真諦知唯識有假觀通達俗俗諦若不達俗無以通真若不通真無以遣俗以俗無別體等義上顯真俗相即為空諦空假不二為中觀立中道妙觀為出家學本於事鈔沙彌篇及業疏受戒篇並云觀事是心等言事即總十界依正色心等法蓋是唯心本具全心變現事即俗諦心即真諦心事不即不離即中諦如此觀事豈思議哉使自沙彌便開妙解達事是理全性成修凡所進用俱成妙行又於鈔疏懺六聚篇乃云諸法外塵本無實唯有識此理深妙等上句真諦下句俗諦俗不離真真不離俗不即不離即是中諦在所為三諦在能為三觀三諦之法微妙圓融故云深妙會上兩文其義即一是則一心即三諦三諦即一心若以一心為能觀則三諦並屬能觀為之一心三觀圓融妙觀若以一心為所觀則三諦並屬所觀為之一心三諦圓融妙境境觀俱明能所互照無能所中能所歷然無差別中差別宛爾復於歸敬儀中能敬無非三業所敬莫過三寶於篇篇事事之下令理事圓融真俗並運上明觀訖立觀既妙在教必圓此宗云教無非律乘若據教限律是偏少究佛本懷諸有所作常為一事百千方便曲功調停皆佛權謀隨他意語至終法華方暢本懷開決偏小即一佛乘涅槃扶談終顯佛性自昔傳律全昧歸源唯我南山高懷卓朗判釋教門空有無濫別凖二經開扶妙旨直顯戒律即是圓乘點顯境緣及受隨行皆即一心無非唯識唯心教行豈不圓妙今更略引諸文使學者知其教也下引戒法處即指於教也如事鈔指戒法云法界塵沙二諦等法法界乃戒法之體塵沙乃戒法之數若以法界為境應須了境即是二諦三諦之法非界言界故云法界當知戒法乃於法界理上假名建立故有差別數等空塵又若河沙故云二諦法也所謂諸佛說法常依二諦者是也二諦非即非離強名中諦故一一教門皆三諦圓融微妙之法故又續云測思明慧觀妙與妙法相應教妙測思能受心也妙法所受法也以微妙心受微妙法能所體同即一實相故曰相應鈔中又云所發戒相乃有無量乃至若隨境論不過情與非情空有二諦滅理涅槃佛說聖教文字卷軸形像塔廟地水火風虗空識等法界為量並是戒體此文以法界結上諸境則一一境皆微妙法界依法界而制諸戒則法界是戒法之體故云並是戒體也要使受者以法界心緣法界境受法界法只一法界無異法界能所泯亡究竟一相故得鈔文又云深戒上善廣周法界文戒法若非體是法界何得云深何云上善況鈔序首云戒德難思等此文雖歎戒功由體微妙故功用難思學者不能如此推究以致屈抑教門情切哀痛又業疏云智知境緣本是心作不妄緣境但唯一識文境是塵境緣即戒法境與戒法既唯一識唯識即是三諦圓融妙理境豈不妙法豈不圓亦欲受者識源達本圓發上心圓納三聚圓成三行故疏又云常思此行即攝律儀用為法佛清淨心也此行即小法律儀即大乘法佛即果德即小是大即因是果小大因果即一淨心無差別也故疏復云大小俱心律儀不異義極明顯圓文妙義具在諸文學不究心鮮能知要吾祖教觀幾至掃地余曾釋圓教五門及答日本芿師疑並三觀塵露等處輙以管見發揮聖言但恐文繁學者難曉今撮要義別書一紙庶易流傳為廣究之蹊徑耳即非沽譽要名也深願同門精研愽究一益自己二化他人二皆契實無忝其裔淳祐壬寅佛忌前一日華嚴閣下出三觀塵露吾祖南山澄照大師跡示四依位階上地妙明一實洞徹兩乘預譯場而辭翰推尊敷講席而天龍拱侍慨律藏實佛法命脉軫戒德乃定慧依因歷三生而偏志弘揚抗六師而廣文流演雖舉宗而持犯為正在進修而理觀兼明或令福智雙行或示化制同稟通依兩典總列三階義趣該羅文辭簡略管闚曷既膚受何窮唯靈芝記主大智律師妙賾真源深研理味律遵南阜而教領南屏位隱西湖而道聞西竺廣明圓行妙演觀文辨㭊淺深輝映今古守一忝繼學徒謾尋文相愚情有擁略義伸明仍決異傳少資己解自愧斗筲量窄螢焰見卑雖竭精誠焉能盡理猶塵露之於山海故題曰三觀塵露者矣大分四科初引本文二略敘釋三示立意四決異傳第一引本文事鈔懺篇云一者諸法性空無我此理照心名為小乘二者諸法本相是空唯情妄見此理照用屬小菩薩三者諸法外塵本無實唯有識此理深妙唯意緣知是大菩薩佛果證行故攝論云唯識通四位等又事鈔沙彌篇業疏受戒篇同云一者小乘人行觀事生滅知無我人善惡等性二者小菩薩行觀事生滅知無我人善惡等相業疏云觀事是空等三者大菩薩行觀事是心意言分別故攝論云從願樂位至究竟位名觀中緣意言分別為境又業疏懺篇云小乘極處人法二觀對我觀析唯見是塵對陰求之但唯名色求人求法了不可得是為空也大乘極處空識為本初淺滯教謂境是空了境本無性唯識也淨心誡觀歸敬儀廣明理觀故不盡錄第二敘釋分二初敘略意詳上諸文莫不以三位極理示於觀體至於心境行相在文皆略備載攝論及道整禪師凡聖行法當時盛行是故諸文並指如彼整師之文近世已亡攝論之義晚學難曉靈芝諸記復指天台摩訶止觀是可投心良由此宗疏鈔正明持犯定慧資修理須旁示恐亂宗途故不繁廣次釋文相就文分三即境理人也一者示境三觀皆云諸法及云觀事若對機見須分廣狹前之性空小機見狹六凡五陰為諸法也後之二觀即指十觀該及三世為之諸法又復動心即事有念皆法諸法及事通收內外至於取境成業無過妄計前二云我人後一云意言皆妄計也捨䟽就親正指妄計為所觀境故記云三理照之乃知顛倒但有妄計又云但破妄計又云謂觀念性等是也上示境竟二言理者理即觀體亦諸法體若就文指即性空相空無我及唯識是心等是也雖分節文相有境理之殊其實句義連綿諸法即理不可分異須知諸法唯是一心究竟圓明平等一相妄計自障貪著輪迴如來隨機或說諸法皆空或謂唯一實相小乘機劣認空為極其間鈍者推㭊法性方見空理利者體法即空後大乘中然有一類雖發大心未窮心本亦但認空以為極理了相即空與前為異志願弘大故云菩薩修唯識者不無利鈍鈍者別修從假入空方達中道利者圓入初後一如因果皆妙後更引明問性相二空唯空人我兼空諸法耶鈔文但云無我不言法空請為明之答文中具明何不詳耶初云諸法性空此空法體性也復云無我即空我人執性也次云諸法相空此空法體相也復云無我即空我人執相也又云觀事生滅法空也知無我人人空也是則性相二空具兼人法業疏甚明記文更顯又復人法之義諸文廣陳學者自知茲不繁累決異傳中又略釋之須知在境為人法二執在觀為人法二智在理為人法二空也問性相二觀鈔文皆云生滅如何分異答初則見相如實從緣生滅次則見相如幻空花水月虗生虗滅初則生滅是實次則生滅是空故業疏云觀事是空者是也文云外塵本無實唯有識此之二句即是三諦圓融中道妙理也塵即諸法皆六塵故對於凡小不了心源故云外也本即元本無乃理體實謂不虗唯乃訓獨本實二字顯知其的今作三義釋此二句一克體釋一切諸法從本以來若體若相泯跡亡形究竟如空微妙莫測即一真如無非實際故云外塵本無蓋是唯心本具全心發生法法皆心塵塵即識究竟指示故云實唯有識識是圓理體亦本無是則無即是識識即是無且就諸法體上強言於無諸法相上假立言識無乃識之體識乃無之相不即不離復不思議故言妙深也二遣情釋言本無者遣著有計本無雖空空非偏空有識假立即是妙有不著二邊不離二邊即是中道故云妙也三修顯釋據梁攝論方便位中先以依他性遣分別性見一切塵空然無體但有意言分別故云外塵本無翻分別性為無相性此中言無但見塵空即空觀成依他性體雖是唯識申智未利但見似像以真實性遣依他性真實性漸顯依他性漸消然後一切法似名似義及似唯識無所從生滅意言分別得無分別智翻依他性為無生性此中言無正示識體乃假觀成真實性體即實相本無可翻欲顯體妙翻無性性言無性之性顯空即識也即中觀成此方顯出唯識圓妙覺方見極圓上論次第非今立意真俗並運空假即中三性圓修初後俱妙是今宗旨如下更明問文唯二句何見三諦圓融三觀圓修之義耶答外塵本無即是真諦亦即空觀實唯識有即是俗諦亦即假觀識即是無空不離假不即不離名為中道是知立觀唯據三諦圓融中道妙理故文結云此理深妙豈不然耶正準攝論敬儀中引云知塵無所有通達真真即真諦知無即是空觀知唯識有通達俗俗即俗諦知識即是假觀若不達俗無以通真上謂通達真時必先達俗是空若不通真無以遣俗以俗無別體故上謂通達俗時必先通真即俗前二句分示觀境後二句正顯圓修吾祖依此論文建立圓觀鈔又云觀事是心者此句即總三諦即示妙理也以由一切境事即是唯心緣生故空一切皆假事既即心空不離假豈非中道乎若了此義則境觀皆如因根俱妙在境為中道妙境在理為中道妙理在觀為中道妙觀斯則祖師括約論中圓義以立圓觀用被圓修始初發心終至究竟妙達意言無非中道故云從願樂位至究竟位名觀中緣意言分別為境有約他宗但中釋此中義者葢不究論文不達祖意故也論中更有圓義今略引明論以金藏土譬於三性分別依他真實三性天台云攝論如土染金之文即是圓意文斯則論中願樂方便位中三性圓修之義論又云菩薩有二種一者凡位二者聖位從初發心訖十信已還並是凡位十解已上悉屬聖位十解即十住也此亦論中初住破惑證聖之文也論又云於一切法實唯有識理中意言分別生等此亦論中圓義也理中意言即體內方便理即妙理中即中道意言分別即初位觀境便達中道妙理豈非圓修義乎歸敬儀中立圓觀已假設外人難云吾聞真俗並觀登住方修如何下凡僭地上聖等此指十住名聖十信已前名凡初師自答云發心畢竟初後心齊乃至不可執文便乖義實等若據此文則十信已前從初發心便修圓觀與後無殊即同前引論云從願樂位至究竟位等義無別也如斯略示則顯疏鈔立觀並準論中圓義以被圓修也近世諸師不善討論妄謂文中外塵識有及意言等乃願樂位中所修觀相不應通於後位蓋彼論於此位中修影像唯識正觀意言遣伏外塵至見道位方達中道此乃諸師執文釋義甚抑祖懷然不知論中具有圓別二義通被利鈍二備願樂意言遣塵等文乃鈍修歷別義也疏鈔所立唯據圓文如前略引義實昭然却於歸敬儀中備明圓別利鈍修進遲速悉準於論如下引明也文云此理照心照用者理即觀也理是能照心之與用皆所照也問資持云若於時中觀心為要若善若惡三理照之是則三皆照心何獨初觀耶答良以機有利鈍觀照乃殊雖皆照心通局有異二乘機鈍唯觀妄心遣我人執縱有事用但照此心令妄不赴至於果上設或利他亦唯照心住空寂理故資持云二乘住寂故但照心小菩薩行機當次利雖亦照心不唯專守利他志廣事用乃多常照事用當相即空故資持云菩薩涉事故云照用有人云前空我人妄計之情故云照心今空五陰假用和合故云照用如斯之義恐為未然須知相空亦空我人妄計之情豈不見鈔云知無我人善惡等相又云本相是空唯情妄見等達者更詳問後唯識觀何不云照答前二根鈍作心對照然後方空後乃利智深解妙理遮照絕待能所圓融何待照耶若爾資持那云照之答此且一往總示三皆云照至後唯識雖有照義智解既妙非照而照故照而常寂寂而常照故不立照名也業疏云對我觀析唯見是塵者記云我即法塵須知法塵有二一者落謝五塵二者心數法我人妄計體是意思即心數法故屬法塵或可塵即是境對境觀度境落法塵故也有人云我人乃於色陰塵大體質上橫起執情今求我人本無有體但見色陰塵大而已次以法空求色陰塵大及餘四陰但見名色彼文識者更詳問觀之與理何以分異答克體言之觀即是理或分因果能所之殊不無其致在因名視在果名理又復觀是能觀理是所顯問觀之與行亦何以分答觀是極理體絕言思行即行心造修履踐觀無行而無以顯行無觀而無以成解行兼濟如目足相資也上示理竟三者指人即三乘也初觀言少乘通収聲聞緣覺後二云菩薩復分大小之別問小乘菩薩等文中或似修觀行人或舉果人彰理如何定當答若據疏鈔懺篇克體立觀唯據極理如云然理大要以此三理等故舉三位果人以彰三理深淺後位菩薩佛果乃重示者一顯非偏二彰圓極也若沙彌篇疏見受戒約行示觀故小乘菩薩即修觀之人如云一者小乘人行等豈不然耶記釋懺篇云持舉深位以彰理妙不妨令轍問如文所示觀據極理復名聖業深位可修在凡無分耶答觀雖是理行通凡聖如小乘人必先聞空理故用空觀歷諸行相行微觀昧見理未明故位在凡行但屬事觀明理顯即證初果觀方契理行名聖業後唯識觀四位通修若圓機上達用觀見理初後一如如攝論中十住名聖自此以後並名聖業若鈍士利修於前願樂雖觀空有未見中道猶在凡位入見道去方得稱聖行名聖業文召理觀名為聖業何妨修奉自通凡下上示人竟又云攝論乃示後觀所出也本釋多譯作圖示之問如上多譯今依何本答梁朝真諦譯本是今所宗問何處文明宗梁攝耶答吾祖所立圓觀正本梁攝知塵無所有通達真等文又鈔云從願樂位至究竟位等亦出彼論若是唐攝初位名勝解行彼謂一向隨聞生勝解故梁攝初位名願樂亦名信樂論云依此境界隨心信樂入信樂位文云願樂宗梁明矣若唯識論五位修證與此不同問梁唐兩攝唯識等論當時並行祖師何意唯宗梁攝答諸祖宗承各有主意如天台示觀乃依中論然唐攝等論南山同時翻譯方就承用者稀真諦所翻理圓行妙深契祖懷故所承用問三觀之立通依兩乘何得後觀唯專梁攝答理觀行相經但泛明故諸論師廣遵眾典自成一家示體立行條流有歸故今所宗通則一代大乘局則梁朝攝論前二觀行所本之教於後決異傳中略辨明之第三示立意者又二即通別也初通意者吾祖宗闡毗尼觀明極理者深有旨焉蓋由佛所設教下至三歸十善莫不被三乘修學為成出離之益況律令比丘衣食四儀語默動靜常爾一心念除諸蓋違則結犯又戒疏云為道制戒本非世福戒乃事行非假理慧何云為道且為道之言義該深淺若據毗尼教限則曰為求四果故制增戒學若究佛懷為成一實祖師弘闡亦本聖心若不然者何以逃數寶之訶得免徒勞之責乎但以教為機設機有利鈍理有偏圓略分三位以顯教殊的詳祖意唯在不徧性相圓修唯識庶使出家五眾受納體隨持奉諸行日用軌儀一一皆與圓理相應一家部文示觀明理導於受隨義見諸文故略引之故事鈔云測思明慧冥會前法與彼妙法相應及令發心唯明上品且上品心非理觀而何又業疏云智知境緣本是心作不妄緣境但唯一識等斯並示受者令以妙觀融會前法能所一如究竟微妙也又顯隨行云希思此行即篇聚小行也即是三聚即大乘圓行也又云今識前緣此指已受篇聚戒法終歸大乘故須域心於處以一實妙理為指皈之處又通括教源云意唯拯拔一人指歸為顯一理斯乃用實相慧受小戒即大戒以實相慧持律行即妙行智解既明法無不妙正如智論以八十誦即尸羅波羅蜜勝鬘以毗尼即大乘學大集謂五部雖異不妨諸佛法界涅槃斯則皆以戒律為一乘妙行不由妙解何由然乎亦如天台止觀云用中道慧遍入諸法故經云式叉式叉名大乘戒也荊溪云以此中慧融一切法故使一止一作無非法界等須知法華涅槃之後凡有弘闡判教淺深絲毫不濫被機修奉大小融通無不圓妙故知吾祖弘律以妙觀為宗亦由不此斯是吾輩用心之處不可不明多見講學不善深究屈喪祖懷故略敘引不覺繁累次別意者事鈔及業疏懺六聚篇中廣明化制行儀盛羅理事懺法制唯羯磨則獨據律文化兼理事則通遵經論復於理懺具陳三觀使化制俱遵理事並運者矣又事鈔沙彌篇及業疏受戒篇廣陳凡聖行法該列福道兩修復上於聖道行中備明三種理觀意使初心修奉有從域心得處出家學本義不虗設也第四決異傳又二即總別也初總決三觀者問有人云南山教部但通律相那示觀法乎此說如何答不然也如靈芝云三藏為一人而設三學為一人而修又云據行則雖通兼濟在教則各有司存文焉有出家修道而但專一行撰集流通而不明理事乎但以據進修而必須相資在弘通而用分旁正諸祖疏鈔莫不皆然又如四分等諸部律中明五停四念一切行相又涅槃等諸部經中列五篇七治一切律事斯蓋如來說法被機理須通示至於諸祖約教判文義有條貫若律中示定慧等行判為隨律之經經明戒律之文判為隨經之律如斯攝屬行有所歸然今一家約教釋文則唯歸律藏被機修奉而觀行兼明苟若各專一隅何為高達者乎問輔行云南山亦云無生懺法總別三種如前所列乃至云南山此文雖則有據然第一判屬小乘小乘且無懺重之理況復此位已隔初心第二第三復屬菩薩及以佛果凡夫欲依措心無地乃至云判位太高初心無分高位無罪何須列之等文此文傳久其義如何答荊谿尊者一代宗師人天眼目教門抑揚無非利物豈悠悠者而可議哉然晚學相承故多妄說既忝學徒無宜緘默今略敘明知我心者無咎加焉初云小乘無懺重理者此語自謂依律羯磨懺初篇罪不復本淨故云小乘無懺重理彼以此義而行立觀兩無交涉蓋不曉化制之殊也問律有羯磨許懺初重何得言無答祖師云就律文中懺重之相雖非足數有可収理盡形學悔等靈芝云律開懺者為同財法及障來報若望壞體無任僧用不復本位猶同不懺故云無也非謂不許等問懺之既淨何不足數答事鈔云懺本清淨理當足數如得作說戒自恣羯磨等但由情過深厚不任僧用故云來否隨意也問既不足數開懺何為答若不求懺財法兩亡僧須滅擯由懺淨故得入僧中同於財法但不足數又除九百二十一億六十千歲地獄之苦頓然清淨豈得無益耶問上引荊谿謂南山小乘理懺不滅重罪立之無益其義如何答荊谿意謂欲滅四重五逆之罪須依普賢方等大乘理懺故行此位立而無益然不知四重等律制之罪設依大懺亦所不滅小教無生不滅可知矣而荊谿不曉南山立意妄為破斥然南山依律示六聚懺法而懺制罪據經列三位理觀為除化業意使化制雙行罪業俱遣何甞獨以空慧而懺四重耶今更因明化制犯懺相須略分二意一者犯意二者懺意言犯意者且婬殺等過體是十惡本有之愆化教亦禁佛為出家又加制約而成篇聚五眾有犯一違本有化業二犯篇聚制罪故鈔云重增聖制者是也二懺意者祖師云佛法東流行此法者亦小縱有行懺則棄小取大依佛名方等而懺者余意之所未安由心懷厭忻未合大道但篇聚則依教自滅業道則任自靜思又鈔云五眾犯罪則理事兩緣事則順教無違唯識理則達妄外塵本無記云事則順教者謂作律懺歷事緣境常照起心知唯本識隨緣流動趣向於理故云無違唯識也又云達法皆真何妨泯淨了真即用豈礙修行是故悟理則萬行齊修涉事則一毫不立自非通鑑餘復何言又云化行二教罪懺相須若唯依化懺則制罪不亡若專據制科則業道全在故當化行齊用則使業制俱除又問云若依理事懺已制罪滅否答滅否難知須準教判化滅心業制懺違教准知制罪不滅上資持文問化懺觀成道圓業遣若制罪不滅應更墮獄耶答上云制據違教設證聖位亦須懺悔焉有聖人故違佛制阿難道證四果懺七吉羅可以准知且阿難既經開顯已達中道豈同愚小耶又據大教觀成理顯如翻大地罪業皆枯豈有制罪而不清淨但是違教理難覆藏又復先犯戒失今雖階聖還依律懺復本戒體又復妙解既發備修萬行豈有過犯而不求懺吾祖雙立二懺正被圓機若鈍劣者事尚不同何能合理若據天台諸文三種懺法皆滅制罪及荊谿記文各詞異辭今略引之以通大見光明文句云作法懺成違無作罪滅而性罪不除云云取相懺能滅性罪違無作罪亡云云無生懺能除無明如覆大地云云止觀云事懺懺苦道業道理懺懺煩惱道文云虗空藏經文也犯沙彌戒乃至大比丘戒若不還生無有是處即懺業道文也眼耳諸根清淨即懺苦道文也第七日見十方佛聞法得不退轉即懺煩惱道文也又百錄通示三懺云四重五逆若依大教則許懺悔等文然上天台諸文乃准虗空藏經依化教理事行懺並滅制罪至荊谿文中初決作法不滅制罪不堪足數次決取相無生可滅可足亦因略引又加隨決輔行引虗空藏經云若比丘至心方等誦陀羅尼一千四百遍乃一懺如是次第八十七日行道若諸菩薩八百遍一懺六十七日行道乃至尼眾須大僧為主如是懺者皆論夷罪犯此罪竟佛法死人今復清淨戒體還生悔法若成罪無不滅上依經示下彼自決然小乘教門尚不開懺雖曰還生無任僧用沙彌犯已懺成進具大乘所許事可通行倘聽大僧招姦來詐實梁誠制足數無文信大小區分聽制條別小無懺重之說仍成重罪未亡安用大教懺夷以足小乘僧數依大懺已內進已道何須混濫以惑時情又引虗空藏云知法者須教八百日塗廁日日告言汝作不淨事一心塗廁勿令人知塗已洗浴禮三十五佛𫁉虗空藏名乃至文殊普賢為證白四羯磨如前更受此亦是犯重失戒之文若不失者如何懺已令其更受上並荊谿決作法懺不滅制罪之文彼又引經云虗空藏頂有天冠冠中有如意珠冠中有三十五佛現是菩薩結跏趺坐或時現作一切色像行者若於夢中若坐禪中見此相時以摩尼珠印印行者臂上作罪滅字若得此相還入僧中如法說戒若准此意足數可矣故付法藏中滅重罪已時人名為清淨律師已上是荊谿決取相滅制罪也今曰彼見經中云若得此相還入僧中如法說戒更決取相能滅制罪可以足數然恐經中乃謂得相好已化滅制輕可容同法而云如法說戒未必便應足數又引付法藏文切詳彼文恐是依律羯磨懺已名為清淨雖名清淨未必足數彼又云凡下欲用大乘懺重罪者當依方等普賢觀等已上是荊谿決無生滅制罪也今曰彼意欲以大乘理懺通滅化制之罪便為清淨足數諒恐未然如前引示可以自明問制罪滅否如前可曉未知依化教理事二懺滅業道罪其相如何答天台懺分三種作法取相無生南山悔列二科理事文義深廣卒難道盡略而言之事但伏業理可除愆但教有偏圓懺分大小大則觀妙理圓見罪邊際無非一實初心分見妙覺極圓懺悔位長諸文具廣小乘觀顯覔罪叵得但免惡道不無別報故業疏云若論別報無學未免故有貫惱之苦碎身之痛獄火燒身餓饑切體等若爾小乘觀成業不盡遣是則南山性空一位立之無益荊谿之斥理有可從答如前已決何為再問蓋彼引語斥文不明化制一不可從小乘理懺雖非究竟經論所載理須引示令識偏圓指歸得處天台亦云亦有觀空懺即真空也見百錄文彼不究此二不可從南山約教立觀雖分三位結勸指歸唯在唯識敬儀誡觀廣明妙解已上略引可以自知彼又不究三不可從已上斥初二句文竟輔行又云況復此位已隔初心乃至初心無分等今決此文總有二失一者不究南山教門被機無局二者不曉文中舉人顯理今略引文決令無壅且此宗墳典理事行儀結勸指歸並令下凡隨心忻慕修捨有從焉有立觀而獨被深位不為下凡乎如事鈔云以此三理任智強弱隨事觀緣等歸敬儀云聖道遠而難希淨心近而易惑為山基於一簣為佛起於初念故萬里之剋離初步而不登三劫之功非始心而罔就是知行人發足常步此心等又云發心畢竟初後心齊唯識四位凡聖通學今則在凡不學何有剋聖之期等又云此解微妙唯聖達知位在下凡不宜不解不修習也請觀上文豈祖師立觀唯被深位觀位階降理事淺深具在疏鈔敬儀等文非積學而莫盡玄微也決初失意又事鈔云然理大要不出三種又云以此三理等則知立觀乃據極理故舉三位果人用彰三觀分齊意令初心行者操心信樂妙達偏圓以理照心漸階極位而彼不曉此意乃將文中菩薩等文屬觀法所被稟教修奉之人故有判位太高之責靈芝雖曾決云特舉深位以彰理妙晚學尚昧故特明之幾悛舊執決次失竟輔行又云深位無罪何須列等且吾祖立觀不專深位如前可知等覺已還皆須懺悔經中具明何云無罪已上決輔行文問有人云南山何不依天台觀法而別立何為答此愚者之執不足與議然不知建宗判教意各有由焉可抑此而同彼乎如扶新論云佛法譬如通都大邑東西南北隨人往來果如彼見必使天下之人同遵一路而行其可得乎後學公心莫循彼說問天台觀經疏以心觀為宗靈芝新疏以觀佛為宗其意若何答竊觀二文各有其意天台定宗單就能觀使開妙解達境唯心新疏觀佛具兼能所意簡餘經然能觀通於諸行凡一切諸行須以妙觀為主此佛祖之意開解習在餘時如新疏云故諸行者先開智解通達無礙然後晨夕念念繫想彼方至於依經起行必體經文正宗諸經正宗行相各各不同如新疏以五例精簡使無通濫此經正宗十六觀為能觀十六境為所觀觀雖十六無非一心境雖十六言佛便足故得題云觀無量壽佛經也新疏覧題考義能所合𫁉故以觀佛為宗使行者妙識經宗不濫餘行故也問心觀即妙理觀佛涉境事理事兼妙霄壤之殊毀斥者多如何明決答斯蓋學之不固見之不深以口爾之傳妄生毀斥且天台單能非無所觀彼疏云佛是所觀勝境舉正報以収依報述化主以包徒眾觀雖十六言佛便周十疑論天台作也云凡求生者希心起想緣阿彌陀佛相好光明又觀彼土七寶莊嚴如無量壽十六觀等並彼全文蓋此經示觀言略列境文繁恐諸行者滯於境事故疏特以妙觀為宗令開妙解使熾然求生達於生體了不可得故也靈芝新疏教觀俱圓能所皆妙今略引明以通大見故疏云準知一代彌陀教觀皆是圓頓一佛乘法引慈雲云今談淨土唯是大乘了義中了義法也經曰十方諦求更無餘乘唯一佛乘斯之謂矣上慈雲文靈芝準顯言了義者了彼淨土即我自心非他法也達彼彌陀即我自性非他佛也如此則迴神億剎實生乎自己心中孕質九蓮豈逃乎剎那際內故經云是心作佛是心是佛即是開示眾生佛之知見大乘了義豈復過此乃至云即知淨穢身土悉是眾生自心祇由心體虗融故使往來無礙心性包徧遂使取捨無妨等又示修云一者能觀心即以現前識心想念為體下云當起想念諦觀於日是也二者所觀境即以彌陀依正莊嚴為體能所相資方成觀行又問云起心取境那名理觀答了此心境皆因緣生緣生無性體非生滅即無生理乃至云以緣生心觀緣生境心境雖殊緣生不異能觀是心所觀即佛心法佛法皆不思議故華嚴云心佛眾生三無差別即斯義也上並疏文疏中義廣請自觀之細詳新疏前明教觀教圓觀妙後段示修能觀所觀皆不思議則與天台所立無殊何分理事麤妙之別又如四明妙宗云若此觀法及般舟三昧拕彼安養依正之境用微妙觀專就彌陀顯真佛體雖託彼境須知依正同居一心心性遍周無法不造無法不具若一毫法從心外生則不名為大乘觀也等請觀此文則與靈芝血脉相通何是此而非彼乎見云心觀便為高妙全不假境見云觀佛便斥麤淺若然四種三昧無非歷事託境應非妙耶如此傳演念念我人心心我見非唯昏亂學徒抑亦自揚寡陋斧在口中誰之過也次別決文三即唯識性相初中問有人准占察經義謂真如理觀唯識事觀斥今家所立乃唯識事觀此說傳久請為明之答斯乃道聽唯識之名以對占察之義屬事屬理議論紛紜一旦謄於方䇿末代播為口實非唯滅裂前賢亦且翳昏後學然吾祖所立何甞局名唯識觀耶如前引云外塵本無即真如觀實唯有識即唯識觀若利根所修理事圓融真俗並運因果皆妙初後一如若鈍根所修先修唯識後修真如焉有利修而不涉事鈍修而不達理況乎唯識得名非局或就體得名即是一實妙理如論云唯識理等又前引云唯識通四位斯以中道唯識為之觀體故通四位或就行得名行有深淺觀分理事故攝論中或云似唯識觀或云真唯識觀占察所明修唯識觀人入願樂位修有利鈍故分二觀鈍根之人歷一切事達唯是識故得輔行云唯識歷事此之言事豈理外之事占察輔行二觀之義並見下引惜乎晚學不曾討論妄將破斥實可痛心又不知吾宗所立若在疏鈔唯明圓觀如前略示若在歸敬儀淨心誡觀據一實妙理而為觀體約機修利鈍觀分真俗與占察同今欲塞彼妄傳故詳引會分為二科初明觀體體唯是一即前鈔云此理深妙業疏云大乘極處又云要識心本是大乘理其體清淨妙用虗通等歸敬儀云是知修道行人常觀此理即唯識妙理也又云自昔已來此乘無權諸文廣談三諦圓融一性平等為能觀觀體占察經云善男子欲向大乘者應當先知最初根本所謂依止一實境界一實境界亦即唯識妙理以修信解乃至言一實境界者謂眾生心體從本以來不生不滅自性清淨無障無礙猶如虗空離分別故平等普遍無所不至圓滿十方究竟一相云云此乃經中先示觀體以開妙解前如天台云初心修觀以上品寂光而為觀體者是也次約機修修有利鈍行分真俗即歸敬儀云真俗並運又云然則性識昏明推步通局等又云見雖是色了色心生心外無塵名為真觀言從心起實唯識有名為俗觀漸次增明念念無絕時功既積熏習逾增觀道修明不迷緣假名願樂位修道人焉占察經云依一實境界修信解者四位修觀信解即初位論名信樂又名願樂收信住行向四十心人應當學習二種觀道一者唯心識觀二者真如實觀學唯心識觀者所謂於一切時一切處隨身口意所有作業悉當觀察知唯是心乃至有所緣念還當使心隨逐彼念令心自知自生想念非一切境界有念有分別等乃至當知如是唯心識觀名為最上智慧之門云云二學真實觀者思惟心性無生無滅不住見聞學知永離一切分別之相乃至離諸障礙懃修不癈展轉能入心寂三昧又云修學如上信解者又有二種一者利根二者鈍根其利根者先已能知一切外諸境界唯心所作虗狂不實如夢如幻等決定無有疑慮陰蓋輕微散亂心少如是等人應學真如實觀其鈍根者先未能知一切諸外境界悉是唯心虗誑不實染著情厚蓋障數起心難調伏應當先學唯心識觀等如前比擬則經文祖義所立無殊後學我人故多妄說又靈芝云識即真識即是常住本淨真心亦即中道一實境界上示觀體然修觀有二一者直爾總觀謂觀念性即是真識其體清淨平等周徧含攝諸法出生無盡究竟一相寂然常住二者歷事別觀一切時中隨緣動念衣食四儀若善若惡皆能了知一識流變上明利鈍二修與前祖義經文是同又輔行云當知修三昧者於四十二途一不可癈故占察云觀有二種一者准識謂一切准心二者實相謂觀真如准識歷事真如觀理指要鈔云實相觀者即於心識體其本寂三千宛然即空假中准識觀者照於起心變造十界即空假中據此之文只以體其本寂照於起心而分其異二觀皆云即空假中即空假中乃圓觀也但利者觀念即真念起即俗鈍機歷事知無是真知識是俗則前占察真如准識雖對利鈍必應真俗相須但深淺有異耳斯葢利者入願樂時先已了達諸法究竟一相能觀所觀無非中道念念真如心心泯寂此人位雖在初智圓惑遣如華嚴云初發心時便成正覺等又如敬儀初後心齊等又如論云從願樂至究竟名觀中等始從初心終至後心無分別智念念增明破惑亦利見理亦速不歷僧祇涉位究竟鈍根之者雖已聞妙理能發大心但知未明利入願樂時始知諸法體是唯識但有意言思惟分別種種差異於此位中修影像唯識觀遣意言分別伏外諸塵准論謂之依他性遣分別性證無相性時經長劫漸漸明利然後方達一切唯真唯實論中謂之以真實性遣依他性證無生性翻真實性為無性性謂之從假入空照假無生故見中道得無分別智位入見道如是則雖利鈍明昧遲速有異必真俗兩緣歷位無別也然上所引占察南山真觀靈芝總觀唯利根所修占察南山唯識俗觀及靈芝別觀乃鈍根所修利者智圓能了俗即真觀別是總故隱俗別之號唯彰真總之名鈍者智劣由俗顯真因別歸總故揚俗別之稱乃隱真總之目已上皆謂修唯識願樂位人雖利鈍小異真俗無殊問既利鈍二機證有遲速所歷階位為同為異答同也如前引敬儀云由解行之遠近致利鈍之乖異菩薩約位具列五十餘階等是知唯識四位俱歷但遲速異耳問有人以今家觀位初住破惑列圖行世又有人謂觀雖是圓斷必初地唯據儀文三賢十聖三祇三劫等文如斯諸說其義如何答由不究諸文理事兩緣利鈍皆被之義故此妄立初師則褒於鈍漸一混上流次師抑於圓修涉時長遠文云推步通局解行遠近等何不詳取而妄意偏判溺喪祖懷其可得乎問祖師於疏鈔以利鈍二機分對相空唯識如云鈍見空時不分別色智知唯識不分別空今唯識一觀通被利鈍何耶答若三觀相望性空是鈍唯識最利相空望前為利望後為鈍若三觀別論則各被利鈍略分如此義見諸文非學不知也問近多判大菩薩乃是行大非位大破靈芝說地上為大菩薩故使荊谿有判位大高之責殊不知今家所謂大菩薩者蓋指乎修唯識觀者對前相空為小故稱大爾資持反謂特舉深位以彰理妙未免將錯就錯等此義請為決之既納三聚何須後增菩薩等乃是修唯識觀人故有判位太高深位無罪之斥前二師亦謂大菩薩者乃是行大圓觀唯識之者正是將錯就錯何以此語而責資持耶蓋由鈔疏中觀示三種極理故舉三位果人證此觀行乃是聖道故也至於行位在文皆略並指論文及凡聖行法資持豈不知唯識四位凡聖通學如云論文自云唯識通四位那責南山判耶此蓋特舉深位以彰理妙當知悔法正為下凡故下勸令任智強弱隨事觀緣豈令佛果而悔罪耶此是資持全文故特引之庶使見者知其意焉問既云深位應是十地資持那得又云大菩薩者初地已去耶答若在賢位未見真理顯觀非妙初地已去破無明證中道顯理觀之高深令行者之忻慕既云已去明知非局次決相空問業疏既云經中乃多要分三位未審此位本何經耶學者議論紛紜未見定指答吾祖聖師神慧卓朗通經通律立事立言非考之實錄得之自心必無妄示此位所未說者無唯今依業疏云初淺滯教謂境是空等又靈芝云雖發大心未窮心本故設此觀空諸塵境如諸般若所被初心等文今且以諸部般若中通被大乘初心淺破諸法之相滯住空理者即此位教意如靈感傳天神告南山云但是無相離我我所即入般若等又原人論分般若共不共別不共乃唯被菩薩共則通被三乘又成實云若滅五陰相爾時乃名空相具足等是知般若通被淺深兩機相空該於大小二典當須優柔教意不可妄心穿鑿問業疏何云大乘極處空識為本耶答小菩薩既發大心亦名大乘雖但見空理於彼當教亦為極處問未審此觀斷證位次如何答有人依大品中乾慧等地祖師無定指之文又不見整師凡聖行法故未敢定論請更詳之問相空觀位屬大耶小耶答如上所示屬大明矣但緣失考諸文故有異說今通引疏鈔明文方見判攝不濫如云觀事是空又云謂境是空又云鈍見空時等據此但見空理則與二乘是同如云小菩薩又云大乘極處等據此又屬大乘尋觀靈芝諸記分對極明如云由小菩薩涉於大小小據觀智大約志求大小雖異並菩薩乘故且一往通収大中又云相空通大小又云前二性相雖殊皆以空為理後一以心為理若權實往分前二為權後一是實若大小相對前一是小後二屬大又云上之三觀前二小乘後一大乘等云云斯皆約志求収大約觀智歸小大卛修行志願為要故此一位必屬大攝近有我見不融見云前二小乘便謂靈芝判此觀位不合屬小廣有毀斥云云久矣今謂管窺者即此人也然不知此文總判三理大小有歸故云前二小耳苟通究諸文則妄執必釋也問會正記釋小菩薩云即地前加行三賢增暉云修影像唯識者又有云信解行向四十心人又有判同台宗別教列圖流行又有判同台宗通教等云云如何答准攝論中地前修影像唯識為願樂位収信解行向等人然此行者皆知妙理發心究竟修唯識觀但智未圓明未證中道故在賢位而小菩薩者南山謂之初淺滯教靈芝謂之未窮心本以空慧證空理與唯識願樂行相天別判同別教者且別教修次第三觀破無明證中道比之淺滯之教空相之人遠之又遠自悞悞他師資相授非一日矣判同通教者一往覧文不無其致細詳今立理恐未然何耶此之性相唯識皆本教詮之有殊彼之藏通別圓各明觀行之乃異雖三四之不等攝大小而皆同苟以彼通而同此相則何異續鳧而載鶴乎須知性空一位通被利鈍該乎體扸切詳義趣可以収彼藏通二乘如資持等記可以准知相空一觀文通深淺如前引般若成實等是也此位觀行亦通大小如前引資持云大小雖異並菩薩乘等是也約義斟酌可収彼藏通菩薩唯識雖圓機修乃異亦如前引疏鈔諸記理事總別敬儀誡觀利鈍遲速等大觀文理可以収彼別圓二門如此分對方見祖師立教被機兩皆周足問資持謂相空云若對三宗即當四分同觀空理故云小也志慕佛乘故云菩薩相召佛子即為明例有人云資持將三觀配三宗故以四分屬小菩薩不知性空一觀正出成論那得四分屬小菩薩等云云此破資持文義極廣如何疎決答蓋彼人不體此位義通又昧四分旨趣但隨他宗教門以局今家觀行未免展轉有過若據天台所判以小乘諸律成實等論盡鹿苑三藏教収故不可以相屬空觀位配屬四分然吾祖遵一代時教大小淺深總示三觀三宗文義既齊攝屬何失若執文云觀事是空本相是空等語謂不可比對四分者然此部計達諸法相緣生故空一切皆假故名空宗亦曰假宗捨財用非重相召為佛子皆大乘義沓婆厭小行專利他又成論中先以生空不見我人後以法空不見色性乃至不見識性又云若滅五陰相爾時乃名空相具足是知四分成實乘非愚小行兼利他觀不唯明㭊拙人匪局號二乘教蘊分通義該深淺淺屬性空深歸相位況復相空又通深淺淺収四分成實等深収般若大空又乃性空亦具深淺淺収十誦雜心等深収四分成實等前引成實具有破性破相之語豈不明耶廣在諸文義非臆說三決性空問性空者請示其體以決諸疑答言性者即橫執之情如瑜伽論云性者情也執情之義如前略釋請白披之問性空一觀本何教義答觀依經立理假言詮雖文無定指必義有所歸既觀明空理位結小乘約義定文即阿含等經成雜等論四十等律但有明㭊法破性體法破性者皆此宗教意破人法執情之性故得性名永異先哲問性空一觀屬有門耶空門耶答空有齊収如資持云言性空者須分利鈍利者體色即空鈍者㭊法見空文准此利即空門鈍即有門深淺配對如前可見問資持云或云有宗唯證人空假宗人法二空其義如何答據南山敬儀誡觀業疏等文人法二空大小同證空有俱修但深淺有異若我人執性空有並破實法體性盡不盡別如四明云有門說存隣虗空門說破隣虗今更議之有門計我是空計法是實本證人空蓋於諸法窮逐我人故得破法麤相分證法空微細色心不能窮盡所謂觀色至於極微觀心至於一念空門計我人實法體皆空寂但觀諸法我人何立行圓果滿空皆究竟也如上略敘可謂以螺酌海不知分量也嘉定庚辰仲秋滄洲座司出
